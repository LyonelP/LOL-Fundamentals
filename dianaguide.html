<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LoL Fundamentals – Diana Mid Guide</title>
<style>
  /* 1. Shell Core Styles */
  :root{ --gold:#c9aa71; --bg:#0a0f14; --card:#161b22; }
  body { font-family:"Beaufort for LOL",Arial,sans-serif; background:var(--bg); color:#e6edf3; margin:0; line-height:1.6; }
  header { background:linear-gradient(90deg,#0a0f14,#1b2838); border-bottom:2px solid var(--gold); padding:14px 20px; color:var(--gold); font-weight:bold; text-transform:uppercase; text-align:center; font-size:20px; letter-spacing:1px; }
  .loading-status { text-align:center; color:var(--gold); font-size:1.2rem; margin-top:100px; font-weight:bold; }

  /* 2. Original Guide Layout CSS Classes */
  .section { padding:20px 20px 40px; max-width:1000px; margin:auto; text-align:center; }
  .card-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:22px; align-items:start; }
  .card { position:relative; background:#161b22; border:2px solid #c9aa71; border-radius:12px; padding:20px; text-decoration:none; color:#e6edf3; height:230px; display:flex; flex-direction:column; justify-content:center; align-items:center; overflow:hidden; transition:transform .25s,box-shadow .25s; }
  .card h3 { color:#c9aa71; margin:0 0 8px; z-index:2; font-size:1.25rem; }
  .card p { margin:0; font-size:0.95rem; line-height:1.3; z-index:2; text-align:center; opacity:0.95; }
  .card::before { content:""; position:absolute; inset:0; width:100%; height:100%; background-size:cover; background-position:center; opacity:.15; z-index:0; border-radius:10px; }
  
  /* Feel free to drop any additional custom classes down here */
</style>
</head>
<body>

<header>Diana Mid Guide</header>

<!-- Completely empty core workspace that shows nothing but verification status initially -->
<div id="guideContent" class="loading-status">Verifying membership status...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCFRcEV7wdivqONnkjJubAZOjPMixrHMBI",
  authDomain: "lol-fundamentals.firebaseapp.com",
  projectId: "lol-fundamentals",
  storageBucket: "lol-fundamentals.firebasestorage.app",
  messagingSenderId: "1038440427584",
  appId: "1:1038440427584:web:a82207151fd370dbedefa5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const firestore = getFirestore(app);

document.addEventListener("DOMContentLoaded", () => {
  onAuthStateChanged(auth, async user => {
    const contentContainer = document.getElementById("guideContent");

    if (!user) {
      window.location.href = 'index.html';
    } else {
      try {
        const docRef = doc(firestore, "premiumContent", "diana_mid_guide");
        const snap = await getDoc(docRef);
        
        if (snap.exists()) {
          contentContainer.className = ""; // Drop the heavy loading alignment
          contentContainer.innerHTML = snap.data().text; // Purely inject the layout from database
        } else {
          contentContainer.innerHTML = "<div class='loading-status'>Guide record not found in database.</div>";
        }
      } catch (error) {
        console.error("Access blocked:", error);
        contentContainer.innerHTML = `
          <div style="text-align:center; padding:80px 20px;">
            <h2 style="color:#f94144; font-size:2rem; margin-bottom:10px;">Access Denied</h2>
            <p style="color:#cfe1ee;">An active premium account is required to view this content.</p>
            <a href="index.html" style="color:var(--gold); text-decoration:none; font-weight:bold; display:inline-block; margin-top:15px; border:1px solid var(--gold); padding:10px 20px; border-radius:6px;">Return Home</a>
          </div>
        `;
      }
    }
  });
});
</script>

</body>
</html>
