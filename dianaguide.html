<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LoL Fundamentals - Premium Guide</title>

<style>
:root{
    --gold:#c9aa71;
    --bg:#0a0f14;
    --card:#161b22;
    --text:#e6edf3;
    --muted:#9da7b3;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
}

.loading-screen{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--gold);
    font-size:22px;
    font-weight:bold;
}

#app{
    display:none;
}

header{
    background:linear-gradient(90deg,#0a0f14,#16222f);
    border-bottom:2px solid var(--gold);
    padding:18px;
    text-align:center;
    color:var(--gold);
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
}

.layout{
    display:flex;
    min-height:calc(100vh - 65px);
}

.sidebar{
    width:240px;
    background:#0d1218;
    border-right:2px solid var(--gold);
    padding:20px 0;
    overflow-y:auto;
    flex-shrink:0;
}

.sidebar-title{
    color:var(--muted);
    font-size:11px;
    padding:12px 20px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.sidebar a{
    display:block;
    padding:11px 20px;
    color:white;
    text-decoration:none;
    cursor:pointer;
    transition:.2s;
}

.sidebar a:hover,
.sidebar a.active{
    background:rgba(201,170,113,.08);
    border-left:3px solid var(--gold);
    color:var(--gold);
}

.content{
    flex:1;
    max-width:1000px;
    padding:40px;
}

.guide-section{
    display:none;
}

.guide-section.active{
    display:block;
}

img{
    max-width:100%;
}

table{
    width:100%;
}

pre{
    white-space:pre-wrap;
}

@media(max-width:900px){

.layout{
    flex-direction:column;
}

.sidebar{
    width:100%;
    border-right:none;
    border-bottom:2px solid var(--gold);
}

.content{
    padding:20px;
}

}
</style>

</head>
<body>

<div id="loading" class="loading-screen">
    Loading Guide...
</div>

<div id="app">

<header id="guideTitle">
    Premium Guide
</header>

<div class="layout">

    <div class="sidebar">

        <div class="sidebar-title">
            Guide Contents
        </div>

        <div id="sidebarLinks"></div>

    </div>

    <div class="content" id="guideContent">

    </div>

</div>

</div>

<script>
function switchTab(id){

    document
        .querySelectorAll(".guide-section")
        .forEach(x=>x.classList.remove("active"));

    document
        .querySelectorAll(".sidebar a")
        .forEach(x=>x.classList.remove("active"));

    const section=document.getElementById("section-"+id);

    if(section){

        section.classList.add("active");

        const btn=document.getElementById("btn-"+id);

        if(btn) btn.classList.add("active");

        window.scrollTo({
            top:0,
            behavior:"smooth"
        });

    }

}
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
    apiKey:"YOUR_API_KEY",
    authDomain:"YOUR_AUTH_DOMAIN",
    projectId:"YOUR_PROJECT_ID",
    storageBucket:"YOUR_BUCKET",
    messagingSenderId:"YOUR_SENDER_ID",
    appId:"YOUR_APP_ID"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);

const guide=params.get("guide");

if(!guide){

    document.getElementById("loading").innerHTML="No guide specified.";

    throw new Error("Guide missing");

}

onAuthStateChanged(auth,async(user)=>{

    if(!user){

        location.href="index.html";

        return;

    }

    try{

        const snap=await getDoc(doc(db,"premiumContent",guide));

        if(!snap.exists()){

            document.getElementById("loading").innerHTML="Guide not found.";

            return;

        }

        const data=snap.data();

        document.getElementById("guideTitle").innerText=data.title || "Premium Guide";

        document.getElementById("guideContent").innerHTML=data.text;

        const sidebar=document.getElementById("sidebarLinks");

        const sections=document.querySelectorAll(".guide-section");

        sections.forEach(section=>{

            const id=section.id.replace("section-","");

            const title=section.dataset.title || id;

            const link=document.createElement("a");

            link.id="btn-"+id;

            link.innerText=title;

            link.onclick=()=>switchTab(id);

            sidebar.appendChild(link);

        });

        document.getElementById("loading").style.display="none";

        document.getElementById("app").style.display="block";

        if(sections.length){

            switchTab(
                sections[0].id.replace("section-","")
            );
        }

    }

    catch(err){

        console.error(err);

        document.getElementById("loading").innerHTML="Failed to load guide.";

    }

});

</script>

</body>
</html>
