<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana Guide – Runes</title>
<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  background: #0a0f14;
  color: #e6edf3;
  text-align: center;
}

/* Header */
header {
  background: #0d1117;
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 28px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 20px auto 10px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before {
  content: "← ";
}
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Skill selector */
#skill-select-container {
  margin: 20px auto;
}
#skill-select {
  padding: 10px 15px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #0f1722;
  color: #c9aa71;
  cursor: pointer;
}

/* Skill display */
#skill-info {
  margin: 30px auto;
  max-width: 900px;
  background: #0d1117;
  border: 1px solid #2f81f7;
  padding: 20px;
  border-radius: 10px;
  text-align: left;
  color: #c9aa71;
  min-height: 150px;
}

/* Hover effect for skills */
#skill-info:hover {
  box-shadow: 0 0 15px rgba(47,129,247,0.5);
}

#skill-info ul {
  list-style: none;
  padding: 0;
}
#skill-info li {
  display: flex;
  align-items: flex-start;
  margin-bottom: 10px;
}
#skill-info li img {
  width: 40px;
  height: 40px;
  margin-right: 10px;
}

@media (max-width: 500px) {
  header { font-size: 22px; padding: 15px 5px; }
  #skill-select { font-size: 14px; padding: 8px 10px; }
}
</style>
</head>
<body>

<header>Diana Guide – Runes</header>

<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div id="skill-select-container">
  <select id="skill-select">
    <option disabled selected>Pick a skill</option>
    <option value="Runes">Runes</option>
  </select>
</div>

<div id="skill-info">
  <p>Select a skill above to view details.</p>
</div>

<script>
// Require login
if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
  window.location.href = 'index.html'; // redirect to login
}

// Show selected skill
const select = document.getElementById('skill-select');
select.addEventListener('change', () => {
  const skillInfo = document.getElementById('skill-info');
  if (select.value === "Runes") {
    skillInfo.innerHTML = `
      <h2>Runes</h2>
      <ul>
        <li>
          <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/perk/GraspOfTheUndying.png" alt="Grasp Of The Undying">
          <span><strong>Grasp Of The Undying:</strong> This is the only rune and tree that allows Diana to play the way she’s intended to be played. It gives her the potential to win every matchup while not falling off as hard as Phase Rush.</span>
        </li>
        <li>
          <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/perk/ShieldBash.png" alt="Shield Bash">
          <span><strong>Shield Bash:</strong> Will out damage most other runes, and Diana can proc it twice with W.</span>
        </li>
        <li>
          <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/perk/BonePlating.png" alt="Bone Plating">
          <span><strong>Bone Plating:</strong> Best sustain tool in lane. Runes like Aery, Scorch, First Strike, and Comet all proc multiple plates. Gives the best chance to survive ganks and win duels later.</span>
        </li>
        <li>
          <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/perk/SecondWind.png" alt="Second Wind">
          <span><strong>Second Wind:</strong> Only worth considering against Yasuo and Yone. Bone Plating is often preferred for better scaling and survivability.</span>
        </li>
        <li>
          <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/perk/Overgrowth.png" alt="Overgrowth">
          <span><strong>Overgrowth:</strong> Best way for Diana to gain health besides Grasp. Provides bonus health scaling for shield strength.</span>
        </li>
        <li>
          <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/perk/ManaflowBand.png" alt="Manaflow Band">
          <span><strong>Manaflow Band:</strong> Covers Diana’s mana needs to pressure side lanes and jungle camps effectively. Essential for multi-rotation damage.</span>
        </li>
        <li>
          <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/perk/Transcendence.png" alt="Transcendence">
          <span><strong>Transcendence:</strong> Provides crucial ability haste and efficient cooldown reduction for mid/late teamfights.</span>
        </li>
      </ul>
    `;
  }
});
</script>

</body>
</html>
