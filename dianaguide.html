<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LoL Fundamentals – Diana Mid Guide</title>
<style>
  :root{ --gold:#c9aa71; --bg:#0a0f14; --card:#161b22; --muted:#9da7b3; }
  body { font-family:"Beaufort for LOL",Arial,sans-serif; background:var(--bg); color:#e6edf3; margin:0; line-height:1.6; }
  .loading-status { text-align:center; color:var(--gold); font-size:1.2rem; margin-top:100px; font-weight:bold; }

  /* Hidden until user is authenticated */
  #appWrapper { display: none; }
  #appWrapper.authorized { display: block; }

  header { background:linear-gradient(90deg,#0a0f14,#1b2838); border-bottom:2px solid var(--gold); padding:14px 20px; color:var(--gold); font-weight:bold; text-transform:uppercase; text-align:center; font-size:20px; letter-spacing:1px; }
  .layout-container { display: flex; min-height: calc(100vh - 54px); }
  
  /* Sidebar styles */
  .sidebar { width: 240px; background: #0d1218; border-right: 2px solid var(--gold); padding: 20px 0; flex-shrink: 0; }
  .sidebar-title { font-size: 11px; color: var(--muted); padding: 10px 20px; text-transform: uppercase; letter-spacing: 1px; }
  .sidebar a { display: block; padding: 10px 20px; color: #e6edf3; text-decoration: none; cursor: pointer; font-size: 14px; }
  .sidebar a:hover, .sidebar a.active { background: rgba(201, 170, 113, 0.1); color: var(--gold); border-left: 3px solid var(--gold); }
  
  /* Content formatting */
  .content-pane { flex: 1; padding: 40px; max-width: 900px; }
  .guide-section { display: none; }
  .guide-section.active { display: block; }

  .card-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:22px; align-items:start; margin-top: 20px; }
  .card { position:relative; background:#161b22; border:2px solid #c9aa71; border-radius:12px; padding:20px; text-decoration:none; color:#e6edf3; min-height:150px; display:flex; flex-direction:column; justify-content:center; align-items:center; overflow:hidden; }
  .card h3 { color:#c9aa71; margin:0 0 8px; z-index:2; font-size:1.25rem; }
  .card p { margin:0; font-size:0.95rem; line-height:1.3; z-index:2; text-align:center; opacity:0.95; }
</style>
</head>
<body>

<div id="loadingScreen" class="loading-status">Verifying membership status...</div>

<div id="appWrapper">
  <header>Diana Mid Guide</header>
  
  <div class="layout-container">
    <div class="sidebar">
      <div class="sidebar-title">Core Setup</div>
      <a onclick="switchTab('intro')" id="btn-intro" class="active">Intro</a>
      <a onclick="switchTab('runes')" id="btn-runes">Runes</a>
      <a onclick="switchTab('build')" id="btn-build">Build Paths</a>
      <a onclick="switchTab('combos')" id="btn-combos">Combos</a>
      
      <div class="sidebar-title">Gameplay</div>
      <a onclick="switchTab('laning')" id="btn-laning">Laning Phase</a>
      <a onclick="switchTab('teamfighting')" id="btn-teamfighting">Teamfighting</a>
    </div>

    <!-- The database HTML drops directly in here -->
    <div class="content-pane" id="rawContentStorage"></div>
  </div>
</div>

<script>
  window.switchTab = function(sectionId) {
    // Hide all sections
    document.querySelectorAll('.guide-section').forEach(el => el.classList.remove('active'));
    // Show selected section
    const targetSection = document.getElementById(`section-${sectionId}`);
    if (targetSection) targetSection.classList.add('active');

    // Toggle sidebar highlights
    document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
    const targetBtn = document.getElementById(`btn-${sectionId}`);
    if (targetBtn) targetBtn.classList.add('active');
  };
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCFRcEV7wdivqONnkjJubAZOjPMixrHMBI",
  authDomain: "lol-fundamentals.firebaseapp.com",
  projectId: "lol-fundamentals",
  storageBucket: "lol-fundamentals.firebasestorage.app",
  messagingSenderId: "1038440427584",
  appId: "1:1038440427584:web:a82207151fd370dbedefa5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const firestore = getFirestore(app);

document.addEventListener("DOMContentLoaded", () => {
  onAuthStateChanged(auth, async user => {
    if (!user) {
      window.location.href = 'index.html';
    } else {
      try {
        const docRef = doc(firestore, "premiumContent", "diana_mid_guide");
        const snap = await getDoc(docRef);
        
        if (snap.exists()) {
          // Drop the raw HTML directly into our container wrapper
          document.getElementById("rawContentStorage").innerHTML = snap.data().text;
          
          // Reveal the layout setup
          document.getElementById("loadingScreen").style.display = "none";
          document.getElementById("appWrapper").classList.add("authorized");
          
          // Load default view panel frame
          window.switchTab('intro');
        } else {
          document.getElementById("loadingScreen").innerText = "Guide data record missing.";
        }
      } catch (error) {
        console.error("Firebase Error:", error);
        document.getElementById("loadingScreen").innerText = "An error occurred fetching data.";
      }
    }
  });
});
</script>
</body>
</html>
