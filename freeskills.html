<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub (Free)</title>

<style>
/* ===== EXISTING STYLES (UNCHANGED) ===== */
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  background: url('https://64.media.tumblr.com/594ac290bec6d5e9ad98b5f53404f00b/245c4c3ee469f81d-e4/s1280x1920/1cda4284320eb2031758a9859dfe14ff8bbc50ba.jpg') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(10,15,20,0.25);
  z-index:-1;
}
header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #c9aa71;
  padding: 20px;
  font-size: 26px;
  text-align: center;
  color: #c9aa71;
  font-weight: bold;
}
.back-button {
  display:block;
  margin:20px auto;
  padding:10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color:#000;
  border-radius:8px;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
}

/* Tabs */
.tabs { display:none; justify-content:center; gap:10px; margin:20px 0; flex-wrap:wrap;}
.tab {
  padding:10px 18px;
  border:2px solid #c9aa71;
  border-radius:12px;
  background:#000c;
  color:#c9aa71;
  cursor:pointer;
}
.tab.active {
  background:linear-gradient(135deg,#c9aa71,#e0c77b);
  color:#000;
}

/* Dropdown */
#section-select-container { text-align:center; margin:20px; }
#section-select {
  padding:8px;
  background:#0f1722;
  color:#c9aa71;
  border:none;
}

/* Desktop vs mobile */
@media(min-width:701px){
  .tabs{display:flex;}
  #section-select-container{display:none;}
}

/* Progress */
.progress-wrap{text-align:center;margin-bottom:20px;}
.progress-bar{height:10px;background:#111;border-radius:20px;overflow:hidden;}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,#c9aa71,#e6c77f);}

/* Skills */
.skill-list{list-style:none;padding:0;}
.skill-list li{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px auto;
  width:56vw;
  max-width:900px;
  background:#000c;
  border:2px solid #c9aa71;
  border-radius:12px;
  padding:14px;
}
.skill-list li a{flex:1;text-align:center;color:#fff;text-decoration:none;}
.skill-list li a.locked{opacity:0.7; cursor:pointer;}
.skill-list li a.locked:hover{opacity:1;}
.checkmark{
  width:26px;height:26px;
  border:2px solid #c9aa71;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.checkmark.completed{background:#c9aa71;color:#000;}

/* ===== NEW MODAL ===== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal-content {
  background: #0a0f14;
  border: 2px solid #c9aa71;
  border-radius: 16px;
  padding: 30px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 0 25px rgba(201,170,113,0.3);
}
.modal h2 {
  color: #c9aa71;
  margin-bottom: 10px;
}
.modal p {
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: 20px;
}
.modal button {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}
.cta {
  background: linear-gradient(135deg,#c9aa71,#e0c77b);
  color:#000;
}
.close {
  margin-top:10px;
  background:#222;
  color:#fff;
}
</style>

</head>

<body>

<header>Skills Hub (Free)</header>

<a href="https://lolfundamentals.com" class="back-button">Back</a>

<div class="tabs" id="tabs"></div>

<div id="section-select-container">
  <select id="section-select"></select>
</div>

<div class="progress-wrap">
  <div id="progressLabel">0% Total Mastery</div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<ul class="skill-list" id="skill-list"></ul>

<footer style="text-align:center;padding:20px;">© 2026 LoL Fundamentals</footer>

<!-- MODAL -->

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Unlock All Skills</h2>
    <p>This skill is part of the full Fundamentals system.<br><br>
    Get access to all lessons, guides, and rank up faster.</p>
    <button class="cta" onclick="window.location.href='https://lolfundamentals.com'">Upgrade Now</button>
    <br>
    <button class="close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const skillData = {
  "Pre Game": ["Champion Select","Mouse Accuracy","Summoner Spells","Matchups","Communication","Build"],
  "Early Game": ["Level 1","Farming","Trading","Wave Control","Back Timings","Power Spikes","Pathing","Laning","Map Awareness","Ganking","Roaming"],
  "Mid Game": ["Teamwork","Split Pushing","Sieging","Baiting","Lane Assignments","Vision"],
  "Late Game": ["Damage","Target Selection","Tab Screen","Win Conditions","Rotations"],
  "Advanced": ["Animation Cancelling","Reading Players","Kiting","Positioning"],
  "Out of Game": ["Setup","Mindset","Not Raging/Blaming","Reaction Time","Meta"]
};

const tabs = document.getElementById('tabs');
const select = document.getElementById('section-select');
const list = document.getElementById('skill-list');
const fill = document.getElementById('progressFill');
const label = document.getElementById('progressLabel');
const modal = document.getElementById('modal');

let progress = JSON.parse(localStorage.getItem("skillProgressFree") || "{}");

Object.keys(skillData).forEach(sec=>{
  progress[sec]=progress[sec]||{};
  skillData[sec].forEach(s=>progress[sec][s]??=false);
});

function save(){localStorage.setItem("skillProgressFree",JSON.stringify(progress));}

function update(){
  let t=0,d=0;
  Object.values(progress).forEach(sec=>{
    Object.values(sec).forEach(v=>{t++;if(v)d++;});
  });
  let pct=Math.round(d/t*100);
  fill.style.width=pct+"%";
  label.textContent=pct===100?"🏆 Fundamentals Mastered":pct+"% Total Mastery";
}

function openModal(){ modal.style.display="flex"; }
function closeModal(){ modal.style.display="none"; }

function render(section){
  list.innerHTML=skillData[section].map(skill=>{
    let done=progress[section][skill];
    let locked=skill!=="Champion Select";

    return `
    <li>
      <a href="${locked?'#':'https://lolfundamentals.com/freechampionselect'}"
         class="${locked?'locked':''}"
         onclick="${locked?'openModal();return false;':''}">
         ${skill}
      </a>
      <div class="checkmark ${done?'completed':''}"
        onclick="toggle('${section}','${skill}',this)">
        ${done?'✔':''}
      </div>
    </li>`;
  }).join('');
  update();
}

function toggle(sec,skill,el){
  progress[sec][skill]=!progress[sec][skill];
  el.classList.toggle("completed");
  el.innerHTML=el.classList.contains("completed")?"✔":"";
  save();update();
}

function setSection(sec){
  render(sec);
  select.value=sec;
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.section===sec);
  });
  localStorage.setItem("lastSectionFree",sec);
}

/* build tabs + dropdown */
tabs.innerHTML=Object.keys(skillData).map(s=>`<div class="tab" data-section="${s}">${s}</div>`).join('');
select.innerHTML=Object.keys(skillData).map(s=>`<option>${s}</option>`).join('');

tabs.onclick=e=>{
  if(e.target.classList.contains('tab')) setSection(e.target.dataset.section);
};
select.onchange=()=>setSection(select.value);

/* init */
let start=localStorage.getItem("lastSectionFree")||"Pre Game";
setSection(start);
</script>

</body>
</html>
