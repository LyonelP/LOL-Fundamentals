<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub (Free)</title>

<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  background: url('https://64.media.tumblr.com/594ac290bec6d5e9ad98b5f53404f00b/245c4c3ee469f81d-e4/s1280x1920/1cda4284320eb2031758a9859dfe14ff8bbc50ba.jpg') no-repeat center center fixed;
  background-size: cover;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

body::before {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(10,15,20,0.25);
  z-index: -1;
}

header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #c9aa71;
  padding: 20px;
  font-weight: bold;
  font-size: 26px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
  text-align: center;
}

.back-button {
  display: inline-block;
  margin: 20px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 16px;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
}

/* Tabs */
.tabs {
  display: none;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin: 20px 0;
}

.tab {
  padding: 10px 18px;
  border-radius: 12px;
  border: 2px solid #c9aa71;
  background: rgba(0,0,0,0.85);
  color: #c9aa71;
  font-weight: bold;
  cursor: pointer;
}

.tab.active {
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
}

/* Dropdown */
#section-select-container { margin: 20px auto; text-align: center; }
#section-select {
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #0f1722;
  color: #c9aa71;
  cursor: pointer;
}

/* Desktop = tabs */
@media(min-width: 701px){
  .tabs { display: flex; }
  #section-select-container { display: none; }
}

/* Mobile = dropdown */
@media(max-width: 700px){
  .tabs { display: none; }
}

.progress-wrap {
  width: 260px;
  margin: 0 auto 20px;
  text-align: center;
}
.progress-bar {
  height: 10px;
  background: #0f1722;
  border-radius: 20px;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #c9aa71, #e6c77f);
}

.skill-list { list-style: none; padding: 0; }
.skill-list li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.85);
  border: 2px solid #c9aa71;
  border-radius: 12px;
  padding: 14px 18px;
  margin: 0 auto 20px auto;
  width: 56vw;
  max-width: 900px;
}

.skill-list li a {
  text-decoration: none;
  color: #fff;
  flex-grow: 1;
  text-align: center;
}

.skill-list li a.locked::after {
  content: " 🔒";
}

.checkmark {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid #c9aa71;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
.checkmark.completed {
  background: #c9aa71;
  color: #000;
}

footer {
  margin-top: auto;
  text-align: center;
  padding: 18px;
}
</style>

</head>

<body>

<header>Skills Hub (Free)</header>

<a href="https://lolfundamentals.com" class="back-button">Back to LoL Fundamentals</a>

<!-- Tabs -->

<div class="tabs" id="tabs"></div>

<!-- Dropdown (mobile only) -->

<div id="section-select-container">
  <select id="section-select"></select>
</div>

<div class="progress-wrap">
  <div id="progressLabel">0%</div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<ul class="skill-list" id="skill-list"></ul>

<footer>© 2026 LoL Fundamentals</footer>

<script>
const skillData = {
  "Pre Game": ["Champion Select","Mouse Accuracy","Summoner Spells","Matchups","Communication","Build"],
  "Early Game": ["Level 1","Farming","Trading","Wave Control","Back Timings","Power Spikes","Pathing","Laning","Map Awareness","Ganking","Roaming"],
  "Mid Game": ["Teamwork","Split Pushing","Sieging","Baiting","Lane Assignments","Vision"],
  "Late Game": ["Damage","Target Selection","Tab Screen","Win Conditions","Rotations"],
  "Advanced": ["Animation Cancelling","Reading Players","Kiting","Positioning"],
  "Out of Game": ["Setup","Mindset","Not Raging/Blaming","Reaction Time","Meta"]
};

const tabs = document.getElementById('tabs');
const select = document.getElementById('section-select');
const skillList = document.getElementById('skill-list');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');

let skillProgress = JSON.parse(localStorage.getItem("skillProgressFree") || "{}");

Object.keys(skillData).forEach(section => {
  skillProgress[section] = skillProgress[section] || {};
  skillData[section].forEach(skill => skillProgress[section][skill] ??= false);
});

function save() {
  localStorage.setItem("skillProgressFree", JSON.stringify(skillProgress));
}

function updateProgress(section) {
  const skills = skillProgress[section];
  const total = Object.keys(skills).length;
  const done = Object.values(skills).filter(v => v).length;
  const pct = Math.round(done / total * 100);
  progressFill.style.width = pct + "%";
  progressLabel.textContent = pct + "%";
}

function renderSkills(section) {
  skillList.innerHTML = skillData[section].map(skill => {
    const completed = skillProgress[section][skill] ? "completed" : "";
    const locked = skill !== "Champion Select";

    return `
      <li>
        <a href="${locked ? "#" : "https://lolfundamentals.com/freechampionselect"}"
           class="${locked ? "locked" : ""}"
           ${locked ? "onclick='alert(\"Sign up to unlock this skill\"); return false;'" : ""}>
          ${skill}
        </a>
        <div class="checkmark ${completed}"
          onclick="toggle('${section}','${skill}', this)">
          ${completed ? "✔" : ""}
        </div>
      </li>
    `;
  }).join('');

  updateProgress(section);
}

function toggle(section, skill, el){
  skillProgress[section][skill] = !skillProgress[section][skill];
  el.classList.toggle("completed");
  el.innerHTML = el.classList.contains("completed") ? "✔" : "";
  save();
  updateProgress(section);
}

function setSection(section){
  renderSkills(section);

  // sync dropdown
  select.value = section;

  // sync tabs
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.section === section);
  });

  localStorage.setItem("lastSectionFree", section);
}

/* Build Tabs */
tabs.innerHTML = Object.keys(skillData)
  .map(s => `<div class="tab" data-section="${s}">${s}</div>`)
  .join('');

tabs.addEventListener('click', e=>{
  if(e.target.classList.contains('tab')){
    setSection(e.target.dataset.section);
  }
});

/* Build Dropdown */
select.innerHTML = Object.keys(skillData)
  .map(s => `<option value="${s}">${s}</option>`)
  .join('');

select.addEventListener('change', ()=>{
  setSection(select.value);
});

/* Init */
const start = localStorage.getItem("lastSectionFree") || "Pre Game";
setSection(start);
</script>

</body>
</html>
