<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana Jungle Guide – Members Hub</title>
<style>
body {
margin: 0;
font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
background: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Diana_0.jpg') no-repeat center center fixed;
background-size: cover;
color: #e6edf3;
text-align: center;
overflow-x: hidden;
}

body::before {
content: "";
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(10,15,20,0.75);
z-index: -1;
}

header {
background: rgba(13,17,23,0.9);
border-bottom: 2px solid #c9aa71;
padding: 20px 10px;
font-weight: bold;
font-size: 26px;
text-transform: uppercase;
color: #c9aa71;
letter-spacing: 1px;
}

.back-button {
display: inline-block;
margin: 20px auto 10px;
padding: 10px 20px;
background: linear-gradient(135deg, #c9aa71, #e0c77b);
color: #000;
text-decoration: none;
border-radius: 8px;
font-weight: bold;
transition: all 0.3s;
box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }

#section-select-container { margin: 20px auto; }

#section-select {
padding: 10px 15px;
font-size: 16px;
border-radius: 6px;
border: none;
background: #0f1722;
color: #c9aa71;
cursor: pointer;
}

#section-info {
margin: 20px auto;
max-width: 900px;
background: rgba(13,17,23,0.95);
border: 1px solid #2f81f7;
padding: 15px 20px;
border-radius: 10px;
text-align: left;
color: #fff;
min-height: 200px;
}

#section-info h3 { color: #c9aa71; }
.icon {
width: 36px; height: 36px;
vertical-align: middle;
border-radius: 6px;
margin-right: 6px;
}
.rune-container { display: flex; flex-direction: column; gap: 12px; }
.rune-info { display: flex; align-items: center; }
.rune-row { display: flex; gap: 12px; }

.card-container { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
.card {
background: rgba(20,25,35,0.85);
border: 1px solid #c9aa71;
border-radius: 10px;
padding: 15px;
text-align: center;
}
.build-flow {
display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
}
.build-flow div {
border: 1px solid #c9aa71;
border-radius: 8px;
padding: 10px 12px;
min-width: 120px;
text-align: center;
}

@media (max-width: 600px) {
.build-flow { flex-direction: column; }
}
</style>
</head>

<body>

<header>Diana Jungle – Members Hub Guide</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div id="section-select-container">
<select id="section-select">
<option disabled selected>Select a section</option>
<option>Intro</option>
<option>Runes</option>
<option>Build</option>
<option>Summoner spells</option>
<option>Level 1</option>
<option>Pathing</option>
<option>Hardest matchups</option>
<option>Team fighting</option>
<option>Closing out the game</option>
<option>Pros & Cons</option>
</select>
</div>

<div id="section-info">
<p>Select a section from above to view details.</p>
</div>

<script>
const sectionSelect = document.getElementById('section-select');
const sectionInfo = document.getElementById('section-info');

sectionSelect.addEventListener('change', () => {
let value = sectionSelect.value;
let header = `<h3>${value}</h3>`;
let content = "";

if(value === "Intro"){
content = `
${header}
<p>Diana Jungle is one of the fastest full-clear junglers in the game. She excels at:</p>
<ul>
<li>Fast and healthy clears</li>
<li>Multiplying tempo through full clears</li>
<li>Devastating level 6 ganks</li>
<li>Insane objective damage</li>
</ul>
<p>Option B playstyle: <strong>Conqueror, full clear, Nashor → Rocketbelt</strong>.</p>
`;
}

if(value === "Runes"){
content = `
${header}
<div class="rune-container">
<div class="rune-info">
<img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Precision/Conqueror/Conqueror.png" class="icon">
<span><strong>Conqueror:</strong> Best for sustained jungle fights & full clears.</span>
</div>
<div class="rune-info">
<img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Precision/Triumph.png" class="icon">
<span><strong>Triumph:</strong> Helps in 2v2/3v3 skirmishes.</span>
</div>
<div class="rune-info">
<img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Precision/LegendAlacrity/LegendAlacrity.png" class="icon">
<span><strong>Alacrity:</strong> Speeds up attack/cast cadence for clears and duels.</span>
</div>
<div class="rune-info">
<img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Precision/CoupDeGrace.png" class="icon">
<span><strong>Coup de Grace:</strong> Helps secure kills during dives.</span>
</div>
<div class="rune-info">
<img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/MagicalFootwear/MagicalFootwear.png" class="icon">
<span><strong>Magical Footwear:</strong> Free boots to help with early mobility.</span>
</div>
<div class="rune-info">
<img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/CosmicInsight/CosmicInsight.png" class="icon">
<span><strong>Cosmic Insight:</strong> Extra summoner spell cooldown and item haste.</span>
</div>
<div class="rune-row">
<div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsAttackSpeedIcon.png" class="icon">AS</div>
<div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsAdaptiveForceIcon.png" class="icon">AP</div>
<div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsHealthScalingIcon.png" class="icon">HP</div>
</div>
</div>
`;
}

if(value === "Build"){
content = `
${header}
<div class="card-container">
<div class="card"><strong>Starting items</strong>
<div class="build-flow">
<div><img src="https://raw.communitydragon.org/latest/game/assets/items/icons2d/1103_jungle_t1_mosstomperseedling.png" class="icon">Mosstomper</div>
<div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/1082.png" class="icon">Dark Seal</div>
</div>
</div>

<div class="card"><strong>Core items</strong>
<div class="build-flow">
<div><img src="https://raw.communitydragon.org/latest/game/assets/items/icons2d/3115_nashorstooth.png" class="icon">Nashor's</div>
<div><img src="https://raw.communitydragon.org/latest/game/assets/items/icons2d/3152_rocketbelt.png" class="icon">Rocketbelt</div>
<div><img src="https://raw.communitydragon.org/latest/game/assets/items/icons2d/3157_zhonyashourglass.png" class="icon">Zhonya</div>
</div>
</div>

<div class="card"><strong>Final items</strong>
<div class="build-flow">
<div><img src="https://raw.communitydragon.org/latest/game/assets/items/icons2d/3135_voidstaff.png" class="icon">Void Staff</div>
<div><img src="https://raw.communitydragon.org/latest/game/assets/items/icons2d/3089_rabadonsdeathcap.png" class="icon">Rabadon’s</div>
</div>
</div>
</div>
`;
}

if(value === "Summoner spells"){
content = `
${header}
<p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/SummonerFlash.png" class="icon"><strong>Flash</strong></p>
<p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/SummonerSmite.png" class="icon"><strong>Smite</strong></p>
`;
}

if(value === "Level 1"){
content = `
${header}
<p>Start <strong>Red Buff every game</strong> unless invaded.</p>
<p>Red → Krugs → Raptors is her strongest opening.</p>
`;
}

if(value === "Pathing"){
content = `
${header}
<p><strong>Blue Side:</strong></p>
<ul>
<li>Red → Krugs → Raptors → Wolves → Blue → Gromp → Scuttle</li>
</ul>
<p><strong>Red Side:</strong></p>
<ul>
<li>Blue → Gromp → Wolves → Raptors → Red → Krugs → Scuttle</li>
</ul>
<p>This is the fastest full clear in the game at high skill.</p>
`;
}

if(value === "Hardest matchups"){
content = `
${header}
<p>Difficult opponents:</p>
<ul>
<li>Olaf</li>
<li>Udyr</li>
<li>Trundle</li>
<li>Volibear</li>
</ul>
<p>They beat her early and ignore her burst.</p>
`;
}

if(value === "Team fighting"){
content = `
${header}
<p>Diana’s best teamfighting is:</p>
<ul>
<li>Flanking from fog</li>
<li>Q tagging multiple targets</li>
<li>R hitting 2+ priority targets</li>
</ul>
<p>Never front-to-back. Engage from angle.</p>
`;
}

if(value === "Closing out the game"){
content = `
${header}
<p>Diana excels at Baron setups, objective DPS, and AoE fights.</p>
<p>After Baron, hover mid → push sides → group for tower dives with R.</p>
`;
}

if(value === "Pros & Cons"){
content = `
${header}
<p><strong>Pros:</strong></p>
<ul>
<li>Fast jungle clears</li>
<li>Strong level 6 ganks</li>
<li>High AoE damage and objective control</li>
<li>Scales well into mid/late game with items</li>
</ul>
<p><strong>Cons:</strong></p>
<ul>
<li>Weak early dueling vs tanky junglers (Olaf, Udyr)</li>
<li>Requires good positioning for teamfights</li>
<li>Vulnerable to invades before level 6</li>
<li>Dependent on landing Q for full combos</li>
</ul>
`;
}

sectionInfo.innerHTML = content;
});
</script>

</body>
</html>
