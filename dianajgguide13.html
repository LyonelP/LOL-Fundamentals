<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana Jungle Guide – Members Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  background: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Diana_0.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #e6edf3;
  text-align: center;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(10,15,20,0.78);
  z-index: -1;
}

header {
  background: rgba(13,17,23,0.92);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 26px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
}

.back-button {
  display: inline-block;
  margin: 20px auto 10px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}

.back-button::before {
  content: "← ";
}

.back-button:hover {
  box-shadow: 0 0 15px rgba(255,215,0,0.7);
}

#section-select-container {
  margin: 20px auto;
}

#section-select {
  padding: 10px 15px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #0f1722;
  color: #c9aa71;
  cursor: pointer;
}

#section-info {
  margin: 20px auto;
  max-width: 950px;
  background: rgba(13,17,23,0.96);
  border: 1px solid #2f81f7;
  padding: 20px 24px;
  border-radius: 12px;
  text-align: left;
  color: #fff;
  min-height: 220px;
}

#section-info h3 {
  color: #c9aa71;
  margin-top: 0;
  font-size: 24px;
}

#section-info p {
  line-height: 1.7;
}

.icon {
  width: 36px;
  height: 36px;
  vertical-align: middle;
  border-radius: 6px;
  margin-right: 6px;
}

.rune-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.rune-info {
  display: flex;
  align-items: center;
}

.rune-row {
  display: flex;
  gap: 14px;
  margin-top: 12px;
}

.card-container {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 20px;
}

.card {
  background: rgba(20,25,35,0.85);
  border: 1px solid #c9aa71;
  border-radius: 10px;
  padding: 16px;
}

.card strong {
  color: #e0c77b;
}

.build-flow {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
}

.build-flow div {
  border: 1px solid #c9aa71;
  border-radius: 8px;
  padding: 10px 12px;
  min-width: 120px;
  text-align: center;
}

.build-flow span {
  color: #c9aa71;
  font-size: 18px;
}

.tip {
  margin-top: 15px;
  padding: 12px;
  border-left: 3px solid #c9aa71;
  background: rgba(255,255,255,0.04);
}

@media (max-width: 600px) {

  .build-flow {
    flex-direction: column;
  }

  .build-flow span {
    display: none;
  }

  .rune-row {
    flex-direction: column;
  }

}
</style>
</head>

<body>

<header>Diana Jungle Guide</header>

<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div id="section-select-container">
<select id="section-select">
<option disabled selected>Select a section</option>
<option>Intro</option>
<option>Runes</option>
<option>Build</option>
<option>Summoner spells</option>
<option>Abilities</option>
<option>Combos</option>
<option>Level 1</option>
<option>Pathing</option>
<option>Hardest matchups</option>
<option>Team fighting</option>
<option>Closing out the game</option>
<option>Pros & Cons</option>
</select>
</div>

<div id="section-info">
<p>Select a section from above to view details.</p>
</div>

<script>

const sectionSelect = document.getElementById('section-select');
const sectionInfo = document.getElementById('section-info');

sectionSelect.addEventListener('change', () => {

let value = sectionSelect.value;
let header = `<h3>${value}</h3>`;
let content = "";

if(value === "Intro"){

content = `
${header}

<p>Why Diana jungle? Diana has an extremely fast clear because her passive AP ratio is currently sitting at 270% AP. Taking Diana into the jungle also enables her to take the rune Conqueror which opens a variety of different builds. She is able to take conqueror in the jungle and not mid lane because she doesn’t require the runes necessary to lane in the junge and can take full advantage of runes like alacrity.</p>

`;

}

if(value === "Runes"){

content = `
${header}

<div class="rune-container">

<div class="rune-info">
<img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Precision/Conqueror/Conqueror.png" class="icon">

</div>

<img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Precision/Triumph.png" class="icon">

</div>

<div class="rune-info">

<img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/MagicalFootwear/MagicalFootwear.png" class="icon">
<span><strong>Magical Footwear:</strong> Free boots allow faster item spikes.</span>
</div>

<div class="rune-info">
<img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/CosmicInsight/CosmicInsight.png" class="icon">

Scaling Health
</div>

</div>

</div>

`;

}

if(value === "Build"){

content = `
${header}

<div class="card-container">

<div class="build-flow">

 <img src="https://ddragon.leagueoflegends.com/cdn/13.23.1/img/item/3152.png" class="icon">

</div>

<span>/</span>

<div>

</div>

<div class="build-flow">

Deathcap

Void Staff
</div>

<p><strong>Sorcerer's Shoes:</strong> Diana's best default boots. Her base damages are still extremely important and magic penetration massively increases burst.</p>

<p><strong>Mercury Treads:</strong> Buy against heavy AP and CC comps, especially when you already purchased an early Null Magic Mantle.</p>

<p><strong>Plated Steelcaps:</strong> Only buy these, if the enemy team is truly 5 AD otherwise Sorc Shoes + Hourglass is significantly stronger. AD champions have the DPS do deal with armor so you need damage to be a threat.</p>

</div>

<div class="card">

<strong>Build Explanation</strong>

<p>Hextech Rocketbelt is the most efficient AP item currently and allows Diana to Rocketbelt into a gank and then Q E a target. It also gives her extra mobility in the jungle which she desperatly needs.</p>

<p>Hourglass is still Diana's most core item and delaying it all doesn't make sense in most situations.</p>

<p>Banshee's Veil pairs the best with pen boots and gives Diana more safety when roaming through the jungle. It also helps guarantee her engage.</p>

</div>

</div>

`;

}

if(value === "Summoner spells"){

content = `
${header}

<p>
<img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/SummonerFlash.png" class="icon">

</p>

<p>

<p><strong>Passive – Moonsilver Blade:</strong> Diana gains attack speed and cleave damage every third auto. Space abilities to take full advantage of this.</p>

<p><strong>Q – Crescent Strike:</strong> Use Q to pull camps and jump to with E.</p>

<p><strong>W – Pale Cascade:</strong> Shield that gives Diana a healthy clear.</p>

<p><strong>E – Lunar Rush:</strong> Can wait to E if you're already on the camp to regain the passive attack speed.</p>

<p><strong>R – Moonfall:</strong> Only form of CC but can easily be flashed so keep track of timers.</p>

`;

if(value === "Combos"){

content = `

<p><strong>Flash → E → W →R → Q → Hourglass:</strong> Fast engage combo.</p>

<p><strong>Rocketbelt → Q → E → R:</strong> Main gank combo.</p>

`;

}

if(value === "Level 1"){

content = `
${header}

<p>Raptor/Red start is almost always preferred because Red Buff is significantly stronger for early fighting and healthier clears.</p>

<p>Ward against early invades before camps spawn and be careful against aggressive level 1 junglers.</p>

`;

}

if(value === "Pathing"){

content = `
${header}

<p><strong>Main Full Clear:</strong></p>

<ul>
<li>Raptors → Krugs → Red → Wolves → Blue → Gromp → Scuttle</li>
</ul>

<p>This is Diana's strongest and most consistent clear path.</p>

<p><strong>Alternative Paths:</strong></p>

<ul>
<li>Raptors → Red → Krugs → Reset for Dark Seal → Wolves → Blue → Gromp → Scuttle</li>
</ul>

<ul>
<li>Blue → Gromp → Wolves → Raptors → Red → Krugs → Scuttle</li>
</ul>

<p>Use this route if the enemy team threatens your red side level 1.</p>

`;

}


if(value === "Hardest matchups"){

content = `
${header}

<ul>
<li>Kindred</li>

</ul>

if (value === "Team fighting") {

content = `
${header}

if(value === "Pros & Cons"){

content = `
${header}
