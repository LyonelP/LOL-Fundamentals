<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
</head>
<body style="font-family: Arial; background:#0a0f14; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh;">

  <div style="text-align:center; max-width:400px;">
    <h2>Reset Your Password</h2>

    <input id="newPassword" type="password" placeholder="New password"
      style="width:100%; padding:10px; margin:10px 0;" />

    <button id="resetBtn" style="padding:10px 20px; cursor:pointer;">
      Update Password
    </button>

    <p id="msg" style="margin-top:15px;"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      verifyPasswordResetCode,
      confirmPasswordReset
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCFRcEV7wdivqONnkjJubAZOjPMixrHMBI",
      authDomain: "lol-fundamentals.firebaseapp.com",
      projectId: "lol-fundamentals",
      storageBucket: "lol-fundamentals.firebasestorage.app",
      messagingSenderId: "1038440427584",
      appId: "1:1038440427584:web:a82207151fd370dbedefa5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get("oobCode");

    const msg = document.getElementById("msg");
    const btn = document.getElementById("resetBtn");

    if (!oobCode) {
      msg.textContent = "Invalid reset link.";
      btn.disabled = true;
    }

    btn.onclick = async () => {
      const newPassword = document.getElementById("newPassword").value;

      try {
        await verifyPasswordResetCode(auth, oobCode);
        await confirmPasswordReset(auth, oobCode, newPassword);

        msg.style.color = "lightgreen";
        msg.textContent = "Password updated successfully! You can now log in.";

      } catch (err) {
        console.error(err);
        msg.style.color = "red";

        if (err.code === "auth/expired-action-code") {
          msg.textContent = "This reset link has expired.";
        } else if (err.code === "auth/invalid-action-code") {
          msg.textContent = "Invalid or already used reset link.";
        } else {
          msg.textContent = "Something went wrong.";
        }
      }
    };
  </script>

</body>
</html>
