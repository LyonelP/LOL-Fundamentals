<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password – LoL Fundamentals</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  verifyPasswordResetCode,
  confirmPasswordReset
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCFRcEV7wdivqONnkjJubAZOjPMixrHMBI",
  authDomain: "lol-fundamentals.firebaseapp.com",
  projectId: "lol-fundamentals",
  storageBucket: "lol-fundamentals.firebasestorage.app",
  messagingSenderId: "1038440427584",
  appId: "1:1038440427584:web:a82207151fd370dbedefa5",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const params = new URLSearchParams(window.location.search);
const oobCode = params.get("oobCode");

let verifiedEmail = "";

window.onload = async () => {
  const msg = document.getElementById("msg");

  if (!oobCode) {
    msg.style.color = "#f94144";
    msg.textContent = "Invalid reset link.";
    return;
  }

  try {
    verifiedEmail = await verifyPasswordResetCode(auth, oobCode);

    msg.style.color = "#c9aa71";
    msg.textContent = `Reset password for: ${verifiedEmail}`;
  } catch (err) {
    console.error(err);
    msg.style.color = "#f94144";
    msg.textContent = "This reset link is invalid or has expired.";
  }
};

window.setNewPassword = async function () {
  const msg = document.getElementById("msg");
  const newPassword = document.getElementById("password").value;

  if (!newPassword || newPassword.length < 6) {
    msg.style.color = "#f2994a";
    msg.textContent = "Password must be at least 6 characters.";
    return;
  }

  try {
    await confirmPasswordReset(auth, oobCode, newPassword);

    msg.style.color = "#90be6d";
    msg.textContent = "Password successfully updated! You can now log in.";

  } catch (err) {
    console.error(err);

    msg.style.color = "#f94144";
    msg.textContent = "Failed to reset password. Try again.";
  }
};
</script>

<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, sans-serif;
  background: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Diana_0.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #e6edf3;
  text-align: center;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(10,15,20,0.85);
  z-index: -1;
}

header {
  background: rgba(13,17,23,0.95);
  border-bottom: 2px solid #c9aa71;
  padding: 20px;
  font-weight: bold;
  font-size: 26px;
  color: #c9aa71;
  text-transform: uppercase;
}

.container {
  max-width: 450px;
  margin: 80px auto;
  background: rgba(13,17,23,0.95);
  border: 1px solid #2f81f7;
  border-radius: 12px;
  padding: 30px;
  box-shadow: 0 0 15px rgba(47,129,247,0.3);
}

h2 {
  color: #c9aa71;
}

input {
  width: 85%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 6px;
  border: none;
  text-align: center;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  background: #1f6feb;
  color: white;
}

button:hover {
  background: #4a8fff;
}

#msg {
  margin-top: 15px;
  font-weight: bold;
}

.back {
  display: inline-block;
  margin-top: 20px;
  color: #c9aa71;
  text-decoration: none;
}
</style>
</head>

<body>

<header>Reset Password</header>

<div class="container">
  <h2>Create a new password</h2>

  <input type="password" id="password" placeholder="New password" />

  <br/>
  <button onclick="setNewPassword()">Update Password</button>

  <p id="msg"></p>

  <a class="back" href="index.html">← Back to Login</a>
</div>

</body>
</html>
