<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Tierlist</title>
<style>
body {
  margin: 0;
  font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
  background: #0a0f14;
  color: #e6edf3;
  line-height: 1.6;
  text-align: center;
  display: none; /* Hide content until login verified */
}

/* Header */
header {
  background: linear-gradient(90deg, #0a0f14, #1b2838);
  border-bottom: 2px solid #c9aa71;
  padding: 15px 20px;
  font-weight: bold;
  font-size: 24px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #c9aa71;
}

/* Section */
.section {
  padding: 60px 20px;
  max-width: 1000px;
  margin: 40px auto;
}

/* Tierlist grid */
.tierlist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  justify-items: center;
  margin-top: 30px;
}

/* Champion card */
.champ-card {
  background: #161b22;
  border: 2px solid #c9aa71;
  border-radius: 12px;
  padding: 10px;
  width: 100%;
  max-width: 150px;
  transition: transform 0.3s, box-shadow 0.3s;
  text-decoration: none;
  color: #e6edf3;
}
.champ-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(47,129,247,0.3);
}
.champ-card img {
  width: 100%;
  border-radius: 6px;
}

/* Logout Button */
#logoutBtn {
  display: block;
  margin: 80px auto 20px auto;
  padding: 8px 20px;
  background: #f94144;
  color: #fff;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}
#logoutBtn:hover {
  background: #ff5959;
}

/* Footer */
footer {
  text-align: center;
  padding: 30px;
  color: #8b949e;
  font-size: 14px;
  background: #0a0f14;
  border-top: 1px solid #1f2937;
}
footer a {
  color: #c9aa71;
  text-decoration: none;
}
footer a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<header>LoL Fundamentals – Tierlist</header>

<section class="section">
<h2>Champion Tierlist</h2>
<p>See the strongest to weakest champions in the current meta.</p>

<div class="tierlist-grid" id="tierlistContainer">
  <!-- Champion cards will be injected here via JavaScript -->
</div>

<button id="logoutBtn">Logout</button>
</section>

<footer>
© 2025 LoL Fundamentals · Contact:
<a href="mailto:arcsecond@lolfundamentals.com">arcsecond@lolfundamentals.com</a>
</footer>

<script>
// Require login before showing anything
if(localStorage.getItem('lolfundamentals_logged_in') !== 'true'){
  window.location.href = 'index.html';
} else {
  document.body.style.display = "block"; // Show content after login check
}

// Logout button
document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('lolfundamentals_logged_in');
  window.location.href = 'index.html';
});

// Example champions for Tierlist (replace or extend as needed)
const champions = [
  { name: "Ahri", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Ahri.png", tier: "S" },
  { name: "Akshan", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Akshan.png", tier: "A" },
  { name: "Diana", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Diana.png", tier: "S" },
  { name: "Ekko", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Ekko.png", tier: "B" }
];

const container = document.getElementById('tierlistContainer');
champions.forEach(champ => {
  const card = document.createElement('a');
  card.href = "#"; 
  card.className = "champ-card";
  card.innerHTML = `<img src="${champ.img}" alt="${champ.name}"><h4>${champ.name}</h4><p>Tier: ${champ.tier}</p>`;
  container.appendChild(card);
});
</script>
</body>
</html>
