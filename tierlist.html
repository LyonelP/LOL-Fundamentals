<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Tierlist</title>
<style>
body {
  margin: 0;
  font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
  background: #0a0f14;
  color: #e6edf3;
  line-height: 1.6;
  text-align: center;
}
header {
  background: linear-gradient(90deg, #0a0f14, #1b2838);
  border-bottom: 2px solid #c9aa71;
  padding: 15px 20px;
  font-weight: bold;
  font-size: 24px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #c9aa71;
}

/* Gold Back Button with arrow */
.back-button {
  display: inline-block;
  margin: 20px auto 15px auto;
  padding: 10px 25px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
}

#roleSelect {
  margin: 10px 0 25px 0;
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #161b22;
  color: #e6edf3;
}

.tierlist {
  display: flex;
  flex-wrap: wrap;
  max-width: 1000px;
  margin: 0 auto 40px auto;
  justify-content: center;
}
.champion-card {
  width: 100px;
  text-align: center;
  font-size: 0.85em;
  margin: 8px;
}
.champion-card img {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  display: block;
  margin: 0 auto 5px auto;
}
.rank-badge {
  font-weight: bold;
  margin-top: 2px;
}
</style>
</head>
<body>

<header>LoL Fundamentals – Tierlist</header>

<a href="membershub.html" class="back-button">Back to Members Hub</a>

<select id="roleSelect">
  <option value="Top">Top</option>
  <option value="Jungle">Jungle</option>
  <option value="Mid">Mid</option>
  <option value="ADC">ADC</option>

let champions = [];

// Load CSV
fetch(csvURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.trim().split("\n").map(r => r.split(","));
    const headers = rows[0].map(h => h.trim().replace(/["']/g,""));
    champions = rows.slice(1).map(row => {
      let champ = {};
      headers.forEach((h,i) => champ[h] = row[i] ? row[i].trim() : "");
      return champ;
    });
    renderTierlist("Top");
  });

// Render champions
function renderTierlist(role){
  const container = document.getElementById("tierlistContainer");
  container.innerHTML = "";

  const filteredChamps = champions.filter(ch => ch[role] && ch[role] !== "X");

  filteredChamps.forEach(ch => {
    const champName = ch["Champion"];
    const rank = ch[role];
    const imgFile = championImages[champName] || "placeholder.png";

    const card = document.createElement("div");
    card.className = "champion-card";
    card.innerHTML = `
      <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/${imgFile}" alt="${champName}">
      <div>${champName}</div>
      <div class="rank-badge">${rank}</div>
    `;
    container.appendChild(card);
  });
}

// Role selector
document.getElementById("roleSelect").addEventListener("change",(e)=>{
  renderTierlist(e.target.value);
});
