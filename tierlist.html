<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LoL Fundamentals – Tierlist</title>
<style>
body {
  margin: 0;
  font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
  background: #0a0f14;
  color: #e6edf3;
  line-height: 1.6;
  text-align: center;
}

/* Header */
header {
  background: linear-gradient(90deg, #0a0f14, #1b2838);
  border-bottom: 2px solid #c9aa71;
  padding: 15px 20px;
  font-weight: bold;
  font-size: 24px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #c9aa71;
}

/* Gold Back Button */
.back-button {
  display: inline-block;
  margin: 20px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before {
  content: "← ";
}
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Role selector */
#roleSelect {
  margin: 15px auto 40px auto;
  padding: 8px 15px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #161b22;
  color: #e6edf3;
}

/* Tier container */
.tier-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;
}
.tier-divider {
  text-align: center;
  font-weight: bold;
  font-size: 20px;
  margin-bottom: 15px;
  color: #c9aa71;
}

/* Cards inside each tier group */
.tier-cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  max-width: 1000px;
}

/* Champion Card */
.card {
  background: #161b22;
  border: 2px solid #c9aa71;
  border-radius: 10px;
  width: 120px;
  padding: 10px;
  text-align: center;
  color: #e6edf3;
  transition: transform 0.3s, box-shadow 0.3s;
}
.card img {
  width: 100px;
  height: 100px;
  border-radius: 8px;
  margin-bottom: 5px;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 5px 15px rgba(201,170,113,0.5);
}
.champ-name {
  font-weight: bold;
  margin-bottom: 2px;
}
.champ-rank {
  font-size: 0.9em;
  color: #c9aa71;
}

/* Footer */
footer {
  text-align: center;
  padding: 30px;
  color: #8b949e;
  font-size: 14px;
  background: #0a0f14;
  border-top: 1px solid #1f2937;
}
footer a {
  color: #c9aa71;
  text-decoration: none;
}
footer a:hover {
  text-decoration: underline;
}
</style>
</head>

<a href="membershub.html" class="back-button">Back to Members Hub</a>

.then(res => res.text())
.then(csv => {
  const lines = csv.split('\n');
  const headers = lines[0].split(',');
  lines.slice(1).forEach(line => {
    const cols = line.split(',');
    const champName = cols[0];
    champRanks[champName] = {};
    for(let i=1;i<headers.length;i++){

function renderCards() {
  const role = document.getElementById('roleSelect').value;
  const container = document.getElementById('championCards');
  container.innerHTML = "";

  const rankOrder = ["OP","S","A","B","C","D"];
  rankOrder.forEach(rank => {
    const tierChamps = champions.filter(champ => champ.role===role && (champRanks[champ.name]?.[role]||"-") === rank);
    if(tierChamps.length>0){
      const tierGroup = document.createElement("div");
      tierGroup.className = "tier-group";

      const divider = document.createElement("div");
      divider.className = "tier-divider";
      divider.textContent = rank;
      tierGroup.appendChild(divider);

      const tierCards = document.createElement("div");
      tierCards.className = "tier-cards";

      tierChamps.forEach(champ=>{
        const imgName = champ.name.replace(/\s/g,'').replace(/'/g,"").replace(/&/g,"").replace(/\./g,"");
        const imgURL = `https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/${imgName}.png`;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${imgURL}" alt="${champ.name}">
          <div class="champ-name">${champ.name}</div>
          <div class="champ-rank">${rank}</div>
        `;
        tierCards.appendChild(card);
      });

      tierGroup.appendChild(tierCards);
      container.appendChild(tierGroup);
    }
  });
}

document.getElementById('roleSelect').addEventListener('change', renderCards);
