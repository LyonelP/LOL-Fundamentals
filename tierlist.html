<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Tierlist</title>
<style>
body {
  margin: 0;
  font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
  background: #0a0f14;
  color: #e6edf3;
  line-height: 1.4;
  text-align: center;
}

/* Header */
header {
  background: linear-gradient(90deg, #0a0f14, #1b2838);
  border-bottom: 2px solid #c9aa71;
  padding: 15px 20px;
  font-weight: bold;
  font-size: 24px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #c9aa71;
}

/* Back Button */
.back-button {
  display: block;
  width: max-content;
  margin: 20px auto 15px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Role Dropdown */
#roleSelect {
  margin: 15px auto 30px auto;
  padding: 8px 15px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

/* Champion Cards */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  max-width: 1000px;
  margin: auto;
}
.card {
  width: 120px;
  border-radius: 10px;
  background: #161b22;
  border: 2px solid #2f81f7;
  padding: 10px;
  box-shadow: 0 0 8px rgba(47,129,247,0.2);
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 15px rgba(47,129,247,0.5);
}
.card img {
  width: 100px;
  height: 100px;
  border-radius: 8px;
}
.card .champ-name {
  margin: 5px 0 0 0;
  font-weight: bold;
  font-size: 14px;
}
.card .champ-rank {
  font-size: 13px;
  color: #c9aa71;
  margin-top: 2px;
}

/* Tier Divider */
.tier-divider {
  width: 100%;
  text-align: left;
  font-weight: bold;
  font-size: 18px;
  margin: 30px 0 10px 10px;
  color: #c9aa71;
}

/* Footer */
footer {
  text-align: center;
  padding: 25px;
  font-size: 14px;
  color: #8b949e;
  background: #0a0f14;
  border-top: 1px solid #1f2937;
}
footer a {
  color: #c9aa71;
  text-decoration: none;
}
footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>LoL Fundamentals – Tierlist</header>

<a href="membershub.html" class="back-button">Back to Members Hub</a>

<select id="roleSelect">
  <option value="Top">Top</option>
  <option value="Jungle">Jungle</option>
  <option value="Mid">Mid</option>
  <option value="ADC">ADC</option>
  <option value="Support">Support</option>
</select>

<div class="cards" id="championCards">
  <!-- Champion cards will be injected here -->
</div>

<footer>
© 2025 LoL Fundamentals · Contact: <a href="mailto:arcsecond@lolfundamentals.com">arcsecond@lolfundamentals.com</a>
</footer>

<script>
// Require login
if(localStorage.getItem('lolfundamentals_logged_in') !== 'true'){
  window.location.href = 'index.html';
}

// Champion data
const champions = [
  {name:"Aatrox", role:"Top"}, {name:"Ahri", role:"Mid"}, {name:"Akali", role:"Mid"},
  {name:"Akshan", role:"ADC"}, {name:"Alistar", role:"Support"}, {name:"Amumu", role:"Jungle"},
  {name:"Anivia", role:"Mid"}, {name:"Annie", role:"Mid"}, {name:"Aphelios", role:"ADC"},
  {name:"Ashe", role:"ADC"}, {name:"Aurelion Sol", role:"Mid"}, {name:"Azir", role:"Mid"},
  {name:"Bard", role:"Support"}, {name:"Blitzcrank", role:"Support"}, {name:"Brand", role:"Mid"},
  {name:"Braum", role:"Support"}, {name:"Caitlyn", role:"ADC"}, {name:"Camille", role:"Top"},
  {name:"Cassiopeia", role:"Mid"}, {name:"Cho'Gath", role:"Top"}, {name:"Corki", role:"ADC"},
  {name:"Diana", role:"Mid"}, {name:"Dr. Mundo", role:"Top"}, {name:"Draven", role:"ADC"},
  {name:"Ekko", role:"Mid"}, {name:"Elise", role:"Jungle"}, {name:"Evelynn", role:"Jungle"},
  {name:"Ezreal", role:"ADC"}, {name:"Fiddlesticks", role:"Jungle"}, {name:"Fiora", role:"Top"},
  {name:"Fizz", role:"Mid"}, {name:"Galio", role:"Mid"}, {name:"Gangplank", role:"Top"},
  {name:"Garen", role:"Top"}, {name:"Gnar", role:"Top"}, {name:"Gragas", role:"Jungle"},
  {name:"Graves", role:"Jungle"}, {name:"Gwen", role:"Top"}, {name:"Hecarim", role:"Jungle"},
  {name:"Heimerdinger", role:"Top"}, {name:"Illaoi", role:"Top"}, {name:"Irelia", role:"Top"},
  {name:"Ivern", role:"Jungle"}, {name:"Janna", role:"Support"}, {name:"Jarvan IV", role:"Jungle"},
  {name:"Jax", role:"Top"}, {name:"Jayce", role:"Top"}, {name:"Jhin", role:"ADC"},
  {name:"Jinx", role:"ADC"}, {name:"Kaisa", role:"ADC"}, {name:"Kalista", role:"ADC"},
  {name:"Karma", role:"Support"}, {name:"Karthus", role:"Mid"}, {name:"Kassadin", role:"Mid"},
  {name:"Katarina", role:"Mid"}, {name:"Kayle", role:"Top"}, {name:"Kayn", role:"Jungle"},
  {name:"Kennen", role:"Top"}, {name:"Kha'Zix", role:"Jungle"}, {name:"Kindred", role:"Jungle"},
  {name:"Kled", role:"Top"}, {name:"Kog'Maw", role:"ADC"}, {name:"LeBlanc", role:"Mid"},
  {name:"Lee Sin", role:"Jungle"}, {name:"Leona", role:"Support"}, {name:"Lillia", role:"Jungle"},
  {name:"Lissandra", role:"Mid"}, {name:"Lucian", role:"ADC"}, {name:"Lulu", role:"Support"},
  {name:"Lux", role:"Mid"}, {name:"Malphite", role:"Top"}, {name:"Malzahar", role:"Mid"},
  {name:"Maokai", role:"Top"}, {name:"Master Yi", role:"Jungle"}, {name:"Miss Fortune", role:"ADC"},
  {name:"Mordekaiser", role:"Top"}, {name:"Morgana", role:"Support"}, {name:"Nami", role:"Support"},
  {name:"Nasus", role:"Top"}, {name:"Nautilus", role:"Support"}, {name:"Neeko", role:"Mid"},
  {name:"Nidalee", role:"Jungle"}, {name:"Nilah", role:"ADC"}, {name:"Nocturne", role:"Jungle"},
  {name:"Nunu & Willump", role:"Jungle"}, {name:"Olaf", role:"Jungle"}, {name:"Orianna", role:"Mid"},
  {name:"Ornn", role:"Top"}, {name:"Pantheon", role:"Top"}, {name:"Poppy", role:"Top"},
  {name:"Pyke", role:"Support"}, {name:"Qiyana", role:"Mid"}, {name:"Quinn", role:"Top"},
  {name:"Rakan", role:"Support"}, {name:"Rammus", role:"Jungle"}, {name:"Rek'Sai", role:"Jungle"},
  {name:"Rell", role:"Support"}, {name:"Renekton", role:"Top"}, {name:"Rengar", role:"Jungle"},
  {name:"Riven", role:"Top"}, {name:"Rumble", role:"Top"}, {name:"Ryze", role:"Mid"},
  {name:"Samira", role:"ADC"}, {name:"Sejuani", role:"Jungle"}, {name:"Senna", role:"Support"},
  {name:"Seraphine", role:"Support"}, {name:"Sett", role:"Top"}, {name:"Shaco", role:"Jungle"},
  {name:"Shen", role:"Top"}, {name:"Shyvana", role:"Jungle"}, {name:"Singed", role:"Top"},
  {name:"Sion", role:"Top"}, {name:"Sivir", role:"ADC"}, {name:"Skarner", role:"Jungle"},
  {name:"Sona", role:"Support"}, {name:"Soraka", role:"Support"}, {name:"Swain", role:"Mid"},
  {name:"Sylas", role:"Mid"}, {name:"Syndra", role:"Mid"}, {name:"Tahm Kench", role:"Support"},
  {name:"Taliyah", role:"Mid"}, {name:"Talon", role:"Mid"}, {name:"Taric", role:"Support"},
  {name:"Teemo", role:"Top"}, {name:"Thresh", role:"Support"}, {name:"Tristana", role:"ADC"},
  {name:"Trundle", role:"Jungle"}, {name:"Tryndamere", role:"Top"}, {name:"Twisted Fate", role:"Mid"},
  {name:"Twitch", role:"ADC"}, {name:"Udyr", role:"Jungle"}, {name:"Urgot", role:"Top"},
  {name:"Varus", role:"ADC"}, {name:"Vayne", role:"ADC"}, {name:"Veigar", role:"Mid"},
  {name:"Vel'Koz", role:"Mid"}, {name:"Vex", role:"Mid"}, {name:"Vi", role:"Jungle"},
  {name:"Viego", role:"Jungle"}, {name:"Viktor", role:"Mid"}, {name:"Vladimir", role:"Mid"},
  {name:"Volibear", role:"Top"}, {name:"Warwick", role:"Jungle"}, {name:"Xayah", role:"ADC"},
  {name:"Xerath", role:"Mid"}, {name:"Xin Zhao", role:"Jungle"}, {name:"Yasuo", role:"Mid"},
  {name:"Yone", role:"Mid"}, {name:"Yorick", role:"Top"}, {name:"Yuumi", role:"Support"},
  {name:"Zac", role:"Jungle"}, {name:"Zed", role:"Mid"}, {name:"Ziggs", role:"Mid"},
  {name:"Zilean", role:"Support"}, {name:"Zoe", role:"Mid"}, {name:"Zyra", role:"Support"}
];

// Pull tier data from Google Sheet
const tierCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRtIJeggpJ6cjGJt0OOds4OZDuHMMUxHCWzMiU1Bd4gJ8EvfZMXPE9p0X1K3yyeZs7bpFyQZHhHpnsu/pub?output=csv";
let champRanks = {}; // { "Ahri": {Top:"-", Jungle:"-", Mid:"S", ...} }

fetch(tierCSV)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1); // skip header
    rows.forEach(r => {
      const [name, top, jungle, mid, adc, support] = r.split(",");
      champRanks[name.trim()] = {Top: top, Jungle: jungle, Mid: mid, ADC: adc, Support: support};
    });
    renderCards();
  })
  .catch(err => console.error(err));

function renderCards() {
  const role = document.getElementById('roleSelect').value;
  const container = document.getElementById('championCards');
  container.innerHTML = "";

  const rankOrder = ["OP","S","A","B","C","D"];
  rankOrder.forEach(rank => {
    const tierChamps = champions.filter(champ => champ.role===role && (champRanks[champ.name]?.[role]||"-") === rank);
    if(tierChamps.length>0){
      // Divider
      const divider = document.createElement("div");
      divider.className = "tier-divider";
      divider.textContent = rank;
      container.appendChild(divider);

      tierChamps.forEach(champ=>{
        const imgName = champ.name.replace(/\s/g,'').replace(/'/g,"").replace(/&/g,"").replace(/\./g,"");
        const imgURL = `https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/${imgName}.png`;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${imgURL}" alt="${champ.name}">
          <div class="champ-name">${champ.name}</div>
          <div class="champ-rank">${rank}</div>
        `;
        container.appendChild(card);
      });
    }
  });
}

document.getElementById('roleSelect').addEventListener('change', renderCards);
</script>

</body>
</html>
