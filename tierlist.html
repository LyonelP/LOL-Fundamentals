<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Tierlist</title>
<style>
body {
 margin: 0;
 font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
 background: #0a0f14;
 color: #e6edf3;
 text-align: center;
}
header {
 background: #0d1117;
 border-bottom: 2px solid #c9aa71;
 padding: 20px;
 font-weight: bold;
 font-size: 26px;
 text-transform: uppercase;
 color: #c9aa71;
 letter-spacing: 1px;
}
.back-btn {
 display: inline-block;
 margin: 10px 0;
 padding: 8px 16px;
 background: #c9aa71;
 color: #0d1117;
 text-decoration: none;
 border-radius: 6px;
 font-weight: bold;
}
.tierlist-table {
 margin: 20px auto 60px;
 border-collapse: collapse;
 width: 95%;
 max-width: 1200px;
}
.tierlist-table th, .tierlist-table td {
 border: 1px solid #2f81f7;
 text-align: center;
 vertical-align: middle;
 padding: 6px 8px;
}
.tierlist-table th {
 background: #0f1722;
 color: #c9aa71;
 font-size: 14px;
 border-bottom: 2px solid #2f81f7;
}
.tierlist-table td {
 height: 50px;
}
.tierlist-table th:first-child,
.tierlist-table td:first-child {
 width: 120px;
 text-align: left;
 padding-left: 8px;
}
.tierlist-table th:nth-child(n+2),
.tierlist-table td:nth-child(n+2) {
 width: 90px;
 min-width: 90px;
}
.role-header img {
 width: 28px;
 height: 28px;
 display: block;
 margin: 0 auto 2px;
}
.role-header div {
 font-size: 12px;
 margin-top: 2px;
 color: #c9aa71;
}
/* Champion cell */
.champion-cell {
 display: flex;
 align-items: center;
 gap: 6px;
}
.champion-cell img {
 width: 32px;
 height: 32px;
 border-radius: 6px;
 object-fit: cover;
}
.champion-cell div {
 font-size: 0.95em;
 font-weight: 500;
 color: #c9aa71;
}
/* Tier colors */
.tier-op { background: linear-gradient(135deg, #FFD700, #00BFFF); color: #000; } 
.tier-s  { background: linear-gradient(135deg, #FF0000, #C0C0C0); color: #000; } 
.tier-a  { background: linear-gradient(135deg, #A020F0, #D8BFD8); color: #fff; } 
.tier-b  { background: linear-gradient(135deg, #00BFFF, #E0FFFF); color: #000; } 
.tier-c  { background: linear-gradient(135deg, #CD7F32, #C0C0C0); color: #000; } /* Bronze → Silver */
</style>
</head>
<body>

<header>LoL Fundamentals – Tierlist</header>
<a href="members-hub.html" class="back-btn">← Back to Members Hub</a>

<table class="tierlist-table" id="tierlist">
 <thead>
 <tr class="role-header">
 <th>Champion</th>
 <th><img src="https://static.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/npe-ft-role-icon-top.png" alt="Top"><div>Top</div></th>
 <th><img src="https://static.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/npe-ft-role-icon-jungle.png" alt="Jungle"><div>Jungle</div></th>
 <th><img src="https://static.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/npe-ft-role-icon-mid.png" alt="Mid"><div>Mid</div></th>
 <th><img src="https://static.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/npe-ft-role-icon-bot.png" alt="ADC"><div>ADC</div></th>
 <th><img src="https://static.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/npe-ft-role-icon-support.png" alt="Support"><div>Support</div></th>
 </tr>
 </thead>
 <tbody></tbody>
</table>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRtIJeggpJ6cjGJt0OOds4OZDuHMMUxHCWzMiU1Bd4gJ8EvfZMXPE9p0X1K3yyeZs7bpFyQZHhHpnsu/pub?output=csv";
const tierMap = { 'OP':'tier-op','S':'tier-s','A':'tier-a','B':'tier-b','C':'tier-c' };

async function loadTierlist() {
 const res = await fetch(csvUrl);
 const text = await res.text();
 const lines = text.split("\n").filter(l => l.trim() !== "");
 const tbody = document.querySelector("#tierlist tbody");

 lines.forEach((line, index) => {
 if(index === 0) return;
 const [champion, top, jungle, mid, adc, support] = line.split(",");
 const row = document.createElement("tr");

 const champCell = document.createElement("td");
 champCell.classList.add("champion-cell");
 const champName = champion.trim();
 const champUrlName = champName.normalize("NFD").replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'');
 const champImage = `https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/${champUrlName}.png`;
 champCell.innerHTML = `<img src="${champImage}" alt="${champName}"><div>${champName}</div>`;
 row.appendChild(champCell);

 [top,jungle,mid,adc,support].forEach(tier => {
   const cell = document.createElement("td");
   if(tier) {
     const cleanTier = tier.trim().toUpperCase();
     cell.textContent = cleanTier;
     cell.className = tierMap[cleanTier] || '';
   }
   row.appendChild(cell);
 });

 tbody.appendChild(row);
 });
}

loadTierlist();
</script>

</body>
</html>
