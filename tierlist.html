<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Tierlist</title>
<style>
body {
  margin: 0;
  font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
  background: #0a0f14;
  color: #e6edf3;
  line-height: 1.6;
  text-align: center;
  display: none; /* hide until login check */
}

header {
  background: linear-gradient(90deg, #0a0f14, #1b2838);
  border-bottom: 2px solid #c9aa71;
  padding: 15px 20px;
  font-weight: bold;
  font-size: 24px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #c9aa71;
}

.back-button {
  display: block;
  width: max-content;
  margin: 20px auto 30px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
  text-align: center;
}
.back-button::before {
  content: "← ";
}
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

.section {
  padding: 40px 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.role-select {
  margin-bottom: 30px;
  font-size: 16px;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid #c9aa71;
  background: #161b22;
  color: #e6edf3;
  font-weight: bold;
}

.tierlist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 20px;
  justify-items: center;
}

.champ-card {
  background: #161b22;
  border: 2px solid #c9aa71;
  border-radius: 12px;
  padding: 10px;
  width: 160px;
  text-decoration: none;
  color: #e6edf3;
  transition: transform 0.3s, box-shadow 0.3s;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.champ-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(201,170,113,0.4);
}
.champ-card img {
  width: 100px;
  height: 100px;
  border-radius: 6px;
  margin-bottom: 6px;
}
.champ-card h4 {
  margin: 0;
  font-size: 16px;
  font-weight: bold;
}
.champ-card p {
  margin: 4px 0 0 0;
  font-size: 14px;
}

footer {
  text-align: center;
  padding: 30px;
  color: #8b949e;
  font-size: 14px;
  background: #0a0f14;
  border-top: 1px solid #1f2937;
}
footer a {
  color: #c9aa71;
  text-decoration: none;
}
footer a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

<header>LoL Fundamentals – Tierlist</header>

<a href="membershub.html" class="back-button">Back to Members Hub</a>

<section class="section">
<h2>Champion Tierlist</h2>

<select class="role-select" id="roleSelect">
  <option value="top">Top</option>
  <option value="jungle">Jungle</option>
  <option value="mid" selected>Mid</option>
  <option value="adc">ADC</option>
  <option value="support">Support</option>
</select>

<div class="tierlist-grid" id="tierlistContainer"></div>
</section>

<footer>
© 2025 LoL Fundamentals · Contact:
<a href="mailto:arcsecond@lolfundamentals.com">arcsecond@lolfundamentals.com</a>
</footer>

<script>
// Require login
if(localStorage.getItem('lolfundamentals_logged_in') !== 'true'){
  window.location.href = 'index.html';
} else {
  document.body.style.display = 'block';
}

// Example champions array with role flags (x = exclude)
const champions = [
  { name: "Ahri", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Ahri.png", tier: "S", roles: {top: "x", jungle: "x", mid: "✓", adc: "x", support: "x"} },
  { name: "Akshan", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Akshan.png", tier: "A", roles: {top: "x", jungle: "x", mid: "x", adc: "✓", support: "x"} },
  { name: "Diana", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Diana.png", tier: "S", roles: {top: "x", jungle: "x", mid: "✓", adc: "x", support: "x"} },
  { name: "Ekko", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Ekko.png", tier: "B", roles: {top: "x", jungle: "✓", mid: "✓", adc: "x", support: "x"} },
  // add more champions here
];

// Order for tiers
const tierOrder = { S: 1, A: 2, B: 3, C: 4, D: 5 };

function renderTierlist(role){
  const container = document.getElementById('tierlistContainer');
  container.innerHTML = "";
  
  champions
    .filter(champ => champ.roles[role] !== "x")
    .sort((a,b) => tierOrder[a.tier] - tierOrder[b.tier])
    .forEach(champ => {
      const card = document.createElement('a');
      card.href = "#"; 
      card.className = "champ-card";
      card.innerHTML = `<img src="${champ.img}" alt="${champ.name}">
                        <h4>${champ.name}</h4>
                        <p>Tier: ${champ.tier}</p>`;
      container.appendChild(card);
    });
}

// Initial render
renderTierlist('mid');

// Update on dropdown change
document.getElementById('roleSelect').addEventListener('change', (e) => {
  renderTierlist(e.target.value);
});
</script>
</body>
</html>
