<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LoL Fundamentals – Tierlist</title>
<style>
  body {
    margin: 0;
    font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
    background: #0a0f14;
    color: #e6edf3;
    text-align: center;
  }
  header {
    background: linear-gradient(90deg, #0a0f14, #1b2838);
    border-bottom: 2px solid #c9aa71;
    padding: 15px 20px;
    font-weight: bold;
    font-size: 24px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #c9aa71;
  }
  .back-button {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #c9aa71;
    color: #0a0f14;
    font-weight: bold;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 30px auto 10px;
    transition: 0.3s;
  }
  .back-button:hover {
    background: #d9c483;
  }
  select {
    margin: 20px auto 30px;
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid #c9aa71;
    background: #161b22;
    color: #e6edf3;
    font-size: 16px;
    cursor: pointer;
  }
  .tier-section {
    margin: 50px 0;
  }
  .tier-title {
    font-size: 28px;
    color: #c9aa71;
    text-align: center;
    margin-bottom: 20px;
  }
  .champion-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 20px;
    justify-items: center;
    max-width: 1000px;
    margin: 0 auto;
  }
  .champion-card {
    background: #161b22;
    border: 2px solid #c9aa71;
    border-radius: 10px;
    padding: 10px;
    transition: 0.3s;
    width: 110px;
  }
  .champion-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 15px rgba(201, 170, 113, 0.5);
  }
  .champion-card img {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    object-fit: cover;
  }
  .champion-name {
    margin-top: 8px;
    font-size: 14px;
    color: #e6edf3;
  }
</style>
</head>
<body>
<header>LoL Fundamentals – Tierlist</header>

<button class="back-button" onclick="window.location.href='membershub.html'">← Back to Members Hub</button>

<div>
  <select id="roleSelect">
    <option value="Top">Top Lane</option>
    <option value="Jungle">Jungle</option>
    <option value="Mid">Mid Lane</option>
    <option value="ADC">ADC</option>
    <option value="Support">Support</option>
  </select>
</div>

<div id="tierlistContainer"></div>

<script>
// Champion image name fixes
const IMG_NAME_OVERRIDES = {
  "Bel'Veth": "Belveth",
  "Bel'Beth": "Belveth",
  "Cho'Gath": "Chogath",
  "Kha'Zix": "Khazix",
  "Kai'Sa": "Kaisa",
  "LeBlanc": "Leblanc",
  "Wukong": "MonkeyKing",
  "Renata Glasc": "Renata",
  "Mel": "Mel", // local fallback
  "Dr. Mundo": "DrMundo",
  "Aurelion Sol": "AurelionSol",
  "Jarvan IV": "JarvanIV",
  "Kog'Maw": "KogMaw",
  "Master Yi": "MasterYi",
  "Miss Fortune": "MissFortune",
  "Rek'Sai": "RekSai",
  "Tahm Kench": "TahmKench",
  "Twisted Fate": "TwistedFate",
  "Xin Zhao": "XinZhao",
  "Lee Sin": "LeeSin",
  "Vel'Koz": "Velkoz"
};

// Load from Google Sheet
async function loadTierlist() {
  const sheetURL =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRtIJeggpJ6cjGJt0OOds4OZDuHMMUxHCWzMiU1Bd4gJ8EvfZMXPE9p0X1K3yyeZs7bpFyQZHhHpnsu/pub?output=csv";
  const res = await fetch(sheetURL);
  const text = await res.text();

  const rows = text.split("\n").map((r) => r.split(","));
  const headers = rows[0];
  const data = rows.slice(1).map((r) => {
    const obj = {};
    headers.forEach((h, i) => (obj[h.trim()] = r[i] ? r[i].trim() : ""));
    return obj;
  });
  return data;
}

function createChampionCard(name, rank) {
  const imgName = IMG_NAME_OVERRIDES[name] || name.replace(/\s|['.]/g, "");
  const imgURL =
    imgName === "Mel"
      ? "./images/mel.png"
      : `https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/${imgName}.png`;

  return `
    <div class="champion-card">
      <img src="${imgURL}" alt="${name}">
      <div class="champion-name">${name}</div>
    </div>
  `;
}

function renderTierlist(data, role) {
  const container = document.getElementById("tierlistContainer");
  container.innerHTML = "";

  const tiers = ["OP", "S", "A", "B", "C"];

  tiers.forEach((tier) => {
    const champs = data.filter((c) => c[role] && c[role].toUpperCase() === tier);
    if (champs.length > 0) {
      const section = document.createElement("div");
      section.className = "tier-section";
      section.innerHTML = `
        <div class="tier-title">${tier}</div>
        <div class="champion-grid">
          ${champs.map((c) => createChampionCard(c.Champion, c[role])).join("")}
        </div>
      `;
      container.appendChild(section);
    }
  });
}

// Require login
if (localStorage.getItem("lolfundamentals_logged_in") !== "true") {
  window.location.href = "index.html";
}

// Load and render
loadTierlist().then((data) => {
  const roleSelect = document.getElementById("roleSelect");
  renderTierlist(data, roleSelect.value);
  roleSelect.addEventListener("change", () => {
    renderTierlist(data, roleSelect.value);
  });
});
</script>
</body>
</html>
