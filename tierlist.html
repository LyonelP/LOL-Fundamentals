<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Tierlist</title>
<style>
body {
  margin: 0;
  font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
  background: #0a0f14;
  color: #e6edf3;
  line-height: 1.6;
  text-align: center;
}

/* Header */
header {
  background: linear-gradient(90deg, #0a0f14, #1b2838);
  border-bottom: 2px solid #c9aa71;
  padding: 15px 20px;
  font-weight: bold;
  font-size: 24px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #c9aa71;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 20px auto;
  padding: 10px 25px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
}
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
}

/* Role selector */
#roleSelect {
  margin: 20px 0;
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #161b22;
  color: #e6edf3;
}

/* Tierlist grid */
.tierlist {
  display: flex;
  flex-direction: column;
  max-width: 1000px;
  margin: 0 auto 40px auto;
}
.tier-section {
  margin-bottom: 40px;
}
.tier-section h2 {
  margin-bottom: 15px;
  color: #c9aa71;
  font-size: 1.5em;
  text-align: left;
}
.champion-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
}
.champion-card {
  width: 100px;
  text-align: center;
  font-size: 0.85em;
}
.champion-card img {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  display: block;
  margin: 0 auto 5px auto;
}
</style>
</head>
<body>

<header>LoL Fundamentals – Tierlist</header>

<a href="membershub.html" class="back-button">Back to Members Hub</a>

<select id="roleSelect">
  <option value="Top">Top</option>
  <option value="Jungle">Jungle</option>
  <option value="Mid">Mid</option>
  <option value="ADC">ADC</option>
  <option value="Support">Support</option>
  <option value="All">All Roles</option>
</select>

<div id="tierlistContainer" class="tierlist"></div>

<script>
// Require login
if(localStorage.getItem('lolfundamentals_logged_in') !== 'true'){
  window.location.href = 'index.html';
}

// Tier order
const tierOrder = ["OP","S","A","B","C","D"];

// Normalize champion names for image URLs
function normalizeChampion(name){
  return name.replace(/[\s.'’]/g,"").replace(/é/g,"e").replace(/ü/g,"u").replace(/ø/g,"o");
}

// CSV URL
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRtIJeggpJ6cjGJt0OOds4OZDuHMMUxHCWzMiU1Bd4gJ8EvfZMXPE9p0X1K3yyeZs7bpFyQZHhHpnsu/pub?output=csv";

let champions = [];

// Load CSV
fetch(csvURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.trim().split("\n").map(r => r.split(","));
    const headers = rows[0].map(h => h.trim());
    champions = rows.slice(1).map(row => {
      let champ = {};
      headers.forEach((h,i)=> champ[h] = row[i] ? row[i].trim() : "");
      return champ;
    });
    renderTierlist("Top"); // Default: Top lane
  });

// Render champions grouped by tier
function renderTierlist(role){
  const container = document.getElementById("tierlistContainer");
  container.innerHTML = "";

  // Filter champions by role
  const filteredChamps = champions.filter(ch => {
    if(role === "All") return true;
    return ch[role] && ch[role] !== "X";
  });

  tierOrder.forEach(tier => {
    const champsInTier = filteredChamps.filter(ch => {
      if(role === "All"){
        return Object.entries(ch).some(([k,v]) => tierOrder.includes(v) && k !== "Champion" && v === tier);
      } else {
        return ch[role] === tier;
      }
    });
    if(champsInTier.length === 0) return;

    const section = document.createElement("div");
    section.className = "tier-section";
    section.innerHTML = `<h2>${tier}</h2>`;

    const grid = document.createElement("div");
    grid.className = "champion-grid";

    champsInTier.forEach(ch => {
      const imgName = normalizeChampion(ch["Champion"]);
      const champTier = role === "All" ? Object.entries(ch).find(([k,v])=>tierOrder.includes(v) && k!=="Champion")[1] : ch[role];
      const card = document.createElement("div");
      card.className = "champion-card";
      card.innerHTML = `
        <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/${imgName}.png" alt="${ch["Champion"]}">
        <div>${ch["Champion"]} (${champTier})</div>
      `;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

// Role selector
document.getElementById("roleSelect").addEventListener("change",(e)=>{
  renderTierlist(e.target.value);
});
</script>

</body>
</html>
