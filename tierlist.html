<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Tierlist</title>
<style>
body {
 margin: 0;
 font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
 background: #0a0f14;
 color: #e6edf3;
 text-align: center;
}
/* Header */
header {
 background: #0d1117;
 border-bottom: 2px solid #c9aa71;
 padding: 25px 20px;
 font-weight: bold;
 font-size: 26px;
 text-transform: uppercase;
 color: #c9aa71;
 letter-spacing: 1px;
}
/* Table styling */
.tierlist-table {
 margin: 60px auto;
 border-collapse: collapse;
 width: 90%;
 max-width: 1100px;
 background: #0d1117;
}
.tierlist-table th, .tierlist-table td {
 border: 1px solid #2f81f7;
 text-align: center;
 vertical-align: middle;
 padding: 10px;
}
.tierlist-table th {
 background: #0f1722;
 color: #c9aa71;
 font-size: 1em;
 border-bottom: 2px solid #2f81f7;
}
.tierlist-table td {
 height: 50px;
}
/* Champion column */
.tierlist-table th:first-child,
.tierlist-table td:first-child {
 width: 140px; /* narrower width */
 text-align: left;
 padding-left: 12px;
}
/* Role columns equal size */
.tierlist-table th:nth-child(n+2),
.tierlist-table td:nth-child(n+2) {
 width: 90px;
 min-width: 90px;
}
/* Role header images */
.role-header img {
 width: 28px;
 height: 28px;
 display: block;
 margin: 0 auto 4px;
 filter: brightness(1.2);
}
/* Champion cell */
.champion-cell {
 display: flex;
 align-items: center;
 gap: 8px;
}
.champion-cell img {
 width: 32px;
 height: 32px;
 border-radius: 6px;
 object-fit: cover;
}
.champion-cell div {
 font-size: 0.95em;
 font-weight: 500;
 color: #c9aa71;
}
/* Tier colors */
.tier-op { background: linear-gradient(135deg, #FFD700, #00BFFF); color: #000; } /* OP shiny gold/blue */
.tier-s { background: linear-gradient(135deg, #FF0000, #C0C0C0); color: #000; } /* S Grandmaster red/silver */
.tier-a { background: linear-gradient(135deg, #A020F0, #D8BFD8); color: #fff; } /* A Master purple shades */
.tier-b { background: linear-gradient(135deg, #00BFFF, #E0FFFF); color: #000; } /* B Diamond blue/white */
.tier-c { background: linear-gradient(135deg, #CD7F32, #B87333); color: #000; } /* C Bronze gradient */
</style>
</head>
<body>

<header>LoL Fundamentals – Tierlist</header>

<table class="tierlist-table" id="tierlist">
 <thead>
 <tr class="role-header">
 <th>Champion</th>
 <th><img src="https://static.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/npe-ft-role-icon-top.png" alt="Top"><div>Top</div></th>
 <th><img src="https://static.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/npe-ft-role-icon-jungle.png" alt="Jungle"><div>Jungle</div></th>
 <th><img src="https://static.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/npe-ft-role-icon-mid.png" alt="Mid"><div>Mid</div></th>
 <th><img src="https://static.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/npe-ft-role-icon-bot.png" alt="ADC"><div>ADC</div></th>
 <th><img src="https://static.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/npe-ft-role-icon-support.png" alt="Support"><div>Support</div></th>
 </tr>
 </thead>
 <tbody></tbody>
</table>

<script>
// CSV source
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRtIJeggpJ6cjGJt0OOds4OZDuHMMUxHCWzMiU1Bd4gJ8EvfZMXPE9p0X1K3yyeZs7bpFyQZHhHpnsu/pub?output=csv";

// Tier to class map
const tierMap = {
 'OP': 'tier-op',
 'S': 'tier-s',
 'A': 'tier-a',
 'B': 'tier-b',
 'C': 'tier-c'
};

async function loadTierlist() {
 const res = await fetch(csvUrl);
 const text = await res.text();
 const lines = text.split("\n").filter(l => l.trim() !== "");
 const tbody = document.querySelector("#tierlist tbody");

 lines.forEach((line, index) => {
 if(index === 0) return; // skip header
 const [champion, top, jungle, mid, adc, support] = line.split(",");
 const row = document.createElement("tr");

 // Champion cell
 const champCell = document.createElement("td");
 champCell.classList.add("champion-cell");
 const champName = champion.trim();
 const champUrlName = champName
 .normalize("NFD")
 .replace(/[\u0300-\u036f]/g, '')
 .replace(/[^a-zA-Z0-9]/g, '');
 const champImage = `https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/${champUrlName}.png`;
 champCell.innerHTML = `<img src="${champImage}" alt="${champName}"><div>${champName}</div>`;
 row.appendChild(champCell);

 // Role cells
 [top, jungle, mid, adc, support].forEach(tier => {
 const cell = document.createElement("td");
 if(tier) {
 const cleanTier = tier.trim().toUpperCase();
 cell.textContent = cleanTier;
 cell.className = tierMap[cleanTier] || '';
 }
 row.appendChild(cell);
 });

 tbody.appendChild(row);
 });
}

loadTierlist();
</script>

</body>
</html>
