<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Tierlist</title>
<style>
body {
  margin: 0;
  font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
  background: #0a0f14;
  color: #e6edf3;
  line-height: 1.6;
  text-align: center;
  display: none; /* hide until login check */
}

/* Header */
header {
  background: linear-gradient(90deg, #0a0f14, #1b2838);
  border-bottom: 2px solid #c9aa71;
  padding: 15px 20px;
  font-weight: bold;
  font-size: 24px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #c9aa71;
}

/* Gold Back Button */
.back-button {
  display: block;
  width: max-content;
  margin: 20px auto 30px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
  text-align: center;
}
.back-button::before {
  content: "← ";
}
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Section */
.section {
  padding: 40px 20px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Tierlist grid */
.tierlist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  justify-items: center;
}

/* Champion card (gold style) */
.champ-card {
  background: #161b22;
  border: 2px solid #c9aa71;
  border-radius: 12px;
  padding: 20px 15px;
  width: 100%;
  transition: transform 0.3s, box-shadow 0.3s;
  text-decoration: none;
  color: #e6edf3;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  position: relative;
  overflow: hidden;
}
.champ-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(201,170,113,0.4);
}
.champ-card img {
  width: 100%;
  border-radius: 6px;
  margin-bottom: 10px;
}

/* Footer */
footer {
  text-align: center;
  padding: 30px;
  color: #8b949e;
  font-size: 14px;
  background: #0a0f14;
  border-top: 1px solid #1f2937;
}
footer a {
  color: #c9aa71;
  text-decoration: none;
}
footer a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

<header>LoL Fundamentals – Tierlist</header>

<a href="membershub.html" class="back-button">Back to Members Hub</a>

<section class="section">
<h2>Champion Tierlist</h2>
<p>Filtered by role and ranked by tier.</p>

<div class="tierlist-grid" id="tierlistContainer">
  <!-- Champion cards will be dynamically inserted here -->
</div>
</section>

<footer>
© 2025 LoL Fundamentals · Contact:
<a href="mailto:arcsecond@lolfundamentals.com">arcsecond@lolfundamentals.com</a>
</footer>

<script>
// Require login
if(localStorage.getItem('lolfundamentals_logged_in') !== 'true'){
  window.location.href = 'index.html';
} else {
  document.body.style.display = 'block';
}

// Example champions array with role flags (x = exclude)
const champions = [
  { name: "Ahri", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Ahri.png", tier: "S", roles: {top: "x", jungle: "x", mid: "✓", adc: "x", support: "x"} },
  { name: "Akshan", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Akshan.png", tier: "A", roles: {top: "x", jungle: "x", mid: "x", adc: "✓", support: "x"} },
  { name: "Diana", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Diana.png", tier: "S", roles: {top: "x", jungle: "x", mid: "✓", adc: "x", support: "x"} },
  { name: "Ekko", img: "https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Ekko.png", tier: "B", roles: {top: "x", jungle: "✓", mid: "✓", adc: "x", support: "x"} },
  // add all other champions here
];

// Specify which role you want to display for this page
const displayRole = "mid"; // can be top, jungle, mid, adc, support

const container = document.getElementById('tierlistContainer');
champions.forEach(champ => {
  if(champ.roles[displayRole] !== "x") {
    const card = document.createElement('a');
    card.href = "#"; 
    card.className = "champ-card";
    card.innerHTML = `<img src="${champ.img}" alt="${champ.name}"><h4>${champ.name}</h4><p>Tier: ${champ.tier}</p>`;
    container.appendChild(card);
  }
});
</script>
</body>
</html>
