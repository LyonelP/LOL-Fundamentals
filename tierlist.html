<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Tierlist</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    text-align: center;
  }

  header {
    padding: 20px;
  }

  .back-button {
    display: inline-flex;
    align-items: center;
    background-color: #d4af37;
    color: #000;
    font-weight: bold;
    border: none;
    padding: 10px 20px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    margin-bottom: 20px;
    transition: 0.2s;
  }

  .back-button:hover {
    transform: scale(1.05);
  }

  .back-button svg {
    margin-right: 8px;
  }

  .role-select {
    background: transparent;
    color: #fff;
    border: 2px solid #fff;
    padding: 10px 15px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 40px;
  }

  .role-select option {
    background: #0d1117;
    color: #fff;
  }

  .tier-section {
    margin-top: 30px;
  }

  .tier-header {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 15px;
  }

  .tier-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-bottom: 50px;
  }

  .champion-card {
    width: 90px;
    text-align: center;
  }

  .champion-card img {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    border: 2px solid #444;
  }

  .champion-card p {
    margin-top: 5px;
    font-size: 14px;
    color: #e6edf3;
  }
</style>
</head>
<body>

<header>
  <button class="back-button" onclick="window.location.href='membershub.html'">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>
    Back to Members Hub
  </button>

  <br>

  <select id="roleSelect" class="role-select" onchange="filterRole()">
    <option value="top">Top</option>
    <option value="jungle">Jungle</option>
    <option value="mid">Mid</option>
    <option value="adc">ADC</option>
    <option value="support">Support</option>
  </select>
</header>

<main id="tierListContainer"></main>

<script>
  const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRtIJeggpJ6cjGJt0OOds4OZDuHMMUxHCWzMiU1Bd4gJ8EvfZMXPE9p0X1K3yyeZs7bpFyQZHhHpnsu/pub?output=csv';

  const championImages = {
    "Mel": "https://raw.communitydragon.org/latest/game/assets/characters/mel/hud/mel_square.png",
    "Renata Glasc": "https://raw.communitydragon.org/latest/game/assets/characters/renata/hud/renata_square.png",
    // Example: fill in other champion names mapped to their communitydragon images
  };

  async function fetchTierList() {
    const res = await fetch(sheetUrl);
    const data = await res.text();
    const rows = data.split('\n').map(r => r.split(','));
    const headers = rows[0];
    const champions = rows.slice(1).map(r => {
      return {
        name: r[0]?.trim(),
        role: r[1]?.trim().toLowerCase(),
        tier: r[2]?.trim().toUpperCase()
      };
    });
    return champions;
  }

  async function displayTierList(role = 'top') {
    const champions = await fetchTierList();
    const container = document.getElementById('tierListContainer');
    container.innerHTML = '';

    const tiers = ['OP', 'S', 'A', 'B', 'C'];
    tiers.forEach(tier => {
      const tierGroup = champions.filter(c => c.role === role && c.tier === tier);
      if (tierGroup.length > 0) {
        const section = document.createElement('div');
        section.classList.add('tier-section');

        const header = document.createElement('div');
        header.classList.add('tier-header');
        header.textContent = tier;
        section.appendChild(header);

        const list = document.createElement('div');
        list.classList.add('tier-list');

        tierGroup.forEach(champ => {
          const card = document.createElement('div');
          card.classList.add('champion-card');
          const img = document.createElement('img');
          img.src = championImages[champ.name] || `https://raw.communitydragon.org/latest/game/assets/characters/${champ.name.toLowerCase().replace(/['\s]/g, '')}/hud/${champ.name.toLowerCase().replace(/['\s]/g, '')}_square.png`;
          img.alt = champ.name;
          const name = document.createElement('p');
          name.textContent = champ.name;
          card.appendChild(img);
          card.appendChild(name);
          list.appendChild(card);
        });

        section.appendChild(list);
        container.appendChild(section);
      }
    });
  }

  function filterRole() {
    const selectedRole = document.getElementById('roleSelect').value;
    displayTierList(selectedRole);
  }

  displayTierList();
</script>

</body>
</html>
