<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Tierlist</title>
<style>
body {
  margin: 0;
  font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
  background: #0a0f14;
  color: #e6edf3;
  line-height: 1.6;
  text-align: center;
}
header {
  background: linear-gradient(90deg, #0a0f14, #1b2838);
  border-bottom: 2px solid #c9aa71;
  padding: 15px 20px;
  font-weight: bold;
  font-size: 24px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #c9aa71;
}
.section {
  padding: 40px 20px;
  max-width: 1200px;
  margin: auto;
}
#roleSelect {
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #c9aa71;
  margin-bottom: 30px;
  background: #161b22;
  color: #e6edf3;
  cursor: pointer;
}
.champion-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 20px;
  justify-items: center;
}
.champ-card {
  background: #161b22;
  border: 2px solid #c9aa71;
  border-radius: 12px;
  width: 140px;
  padding: 10px;
  text-align: center;
  transition: transform 0.3s, box-shadow 0.3s;
}
.champ-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(47,129,247,0.3);
}
.champ-card img {
  width: 80px;
  height: 80px;
  border-radius: 8px;
}
.champ-card h4 {
  color: #c9aa71;
  margin: 8px 0 4px 0;
  font-size: 16px;
}
.champ-card p {
  margin: 0;
  font-size: 14px;
}
.back-button {
  display: inline-block;
  margin: 20px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before {
  content: "← ";
}
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}
footer {
  text-align: center;
  padding: 30px;
  color: #8b949e;
  font-size: 14px;
  background: #0a0f14;
  border-top: 1px solid #1f2937;
}
footer a {
  color: #c9aa71;
  text-decoration: none;
}
footer a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

<header>LoL Fundamentals – Tierlist</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<section class="section">
<h2>Champion Tierlist</h2>
<p>Select a role to view champions:</p>
<select id="roleSelect" onchange="changeRole(this.value)">
  <option value="Top">Top</option>
  <option value="Jungle">Jungle</option>
  <option value="Mid">Mid</option>
  <option value="ADC">ADC</option>
  <option value="Support">Support</option>
</select>

<div class="champion-grid" id="champGrid"></div>
</section>

<footer>
© 2025 LoL Fundamentals · Contact:
<a href="mailto:arcsecond@lolfundamentals.com">arcsecond@lolfundamentals.com</a>
</footer>

<script>
// Require login
if(localStorage.getItem('lolfundamentals_logged_in') !== 'true'){
  window.location.href = 'index.html';
}

// Tier order
const tierOrder = ["OP","S","A","B","C","D"];

// Map Google Sheet name to Dragon key
function normalizeChampion(name){
  return name.replace(/[\s.'"]/g,"").replace(/é/g,"e");
}

const tierCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRtIJeggpJ6cjGJt0OOds4OZDuHMMUxHCWzMiU1Bd4gJ8EvfZMXPE9p0X1K3yyeZs7bpFyQZHhHpnsu/pub?output=csv";
let champions = [];
let selectedRole = "Top";

fetch(tierCSV)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").map(r => r.split(","));
    const headers = rows.shift();
    champions = rows.map(r => {
      const champ = {};
      headers.forEach((h,i) => champ[h.trim()] = r[i] ? r[i].trim() : "");
      return champ;
    });
    renderChampions();
  });

function changeRole(role){
  selectedRole = role;
  renderChampions();
}

function renderChampions(){
  const grid = document.getElementById("champGrid");
  grid.innerHTML = "";

  champions
    .filter(c => c[selectedRole] && c[selectedRole].toLowerCase() !== "x")
    .sort((a,b) => tierOrder.indexOf(a[selectedRole]) - tierOrder.indexOf(b[selectedRole]))
    .forEach(c => {
      const card = document.createElement("div");
      card.className = "champ-card";
      const champName = c.Champion;
      const champTier = c[selectedRole];
      const champImg = `https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/${normalizeChampion(champName)}.png`;
      card.innerHTML = `
        <img src="${champImg}" alt="${champName}">
        <h4>${champName}</h4>
        <p>Tier: ${champTier}</p>
      `;
      grid.appendChild(card);
    });
}
</script>
</body>
</html>
