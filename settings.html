<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings – LoL Fundamentals</title>
<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
  color: #e6edf3;
  text-align: center;
  overflow-x: hidden;
}

/* Header */
header {
  background: rgba(13,17,23,0.95);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 26px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 30px auto 20px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Settings Container */
.settings-container {
  margin: 50px auto;
  max-width: 600px;
  background: rgba(13,17,23,0.95);
  border: 1px solid #2f81f7;
  padding: 40px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 0 15px rgba(47,129,247,0.3);
}

.settings-container h2 {
  color: #c9aa71;
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Cancel button */
.cancel-button {
  display: inline-block;
  padding: 12px 25px;
  background: linear-gradient(135deg, #8b0000, #b22222);
  color: #fff;
  text-decoration: none;
  font-weight: bold;
  border-radius: 8px;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(178,34,34,0.5);
}
.cancel-button:hover {
  background: linear-gradient(135deg, #a00000, #d62d2d);
  box-shadow: 0 0 15px rgba(255,80,80,0.8);
}

/* Thank you / sorry message */
.message {
  margin-top: 25px;
  color: #e6edf3;
  font-size: 16px;
  opacity: 0.85;
}

@media (max-width: 600px) {
  .settings-container {
    padding: 25px;
    margin: 30px 15px;
  }
  .cancel-button {
    padding: 10px 20px;
  }
}
</style>
</head>
<body>

<header>Account Settings</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div class="settings-container">
  <h2>Manage Subscription</h2>
  <a href="mailto:support@lolfundamentals.com?subject=Cancel%20My%20Subscription" class="cancel-button">Cancel Subscription</a>
  <p class="message">We’re sorry to see you go, and thank you for supporting LoL Fundamentals!</p>
</div>

</body>
</html>
