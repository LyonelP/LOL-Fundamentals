<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ekko Jungle Guide – Members Hub</title>
<style>
  :root {
    --gold: #c9aa71;
    --bg: rgba(13,17,23,0.95);
    --card-bg: rgba(20,25,35,0.85);
    --accent: #2f81f7;
  }

  body{
    margin:0;
    font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
    background: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_0.jpg') no-repeat center center fixed;
    background-size: cover;
    color:#e6edf3;
    text-align:center;
    overflow-x:hidden;
  }

  /* overlay */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background: rgba(10,15,20,0.75);
    z-index:-1;
  }

  header{
    background: var(--bg);
    border-bottom: 2px solid var(--gold);
    padding:20px 10px;
    font-weight:700;
    font-size:26px;
    text-transform:uppercase;
    color:var(--gold);
    letter-spacing:1px;
  }

  .back-button{
    display:inline-block;
    margin:20px auto 10px;
    padding:10px 20px;
    background: linear-gradient(135deg,var(--gold),#e0c77b);
    color:#000;
    text-decoration:none;
    border-radius:8px;
    font-weight:700;
    transition: all .3s;
    box-shadow: 0 0 10px rgba(201,170,113,0.45);
  }
  .back-button::before{ content:"← "; }
  .back-button:hover{
    background: linear-gradient(135deg,#e6c97f,#f0d88b);
    box-shadow: 0 0 15px rgba(255,215,0,0.8);
  }

  #section-select-container{ margin:20px auto; }
  #section-select{
    padding:10px 15px;
    font-size:16px;
    border-radius:6px;
    border:none;
    background:#0f1722;
    color:var(--gold);
    cursor:pointer;
  }

  #section-info{
    margin:30px auto;
    max-width:900px;
    background: var(--bg);
    border:1px solid var(--accent);
    padding:20px;
    border-radius:10px;
    text-align:left;
    color:#fff;
    min-height:220px;
    position:relative;
  }
  #section-info:hover{ box-shadow:0 0 15px rgba(47,129,247,0.5); }

  /* header inside section */
  #section-info h3{
    position:absolute;
    top:10px;
    left:20px;
    color:var(--gold);
    margin:0;
    font-size:22px;
    text-transform:capitalize; /* only first letter capitalized */
  }

  #section-info p{ margin:32px 0 16px; line-height:1.6; }
  #section-info ul{ margin-left:20px; }

  /* icons */
  .icon{
    width:36px;
    height:36px;
    vertical-align:middle;
    border-radius:6px;
    margin-right:8px;
    transition: .15s ease;
  }
  .icon:hover{ filter: drop-shadow(0 0 6px var(--gold)); transform:scale(1.05); }

  /* rune layout */
  .rune-container{ display:flex; flex-direction:column; align-items:flex-start; gap:12px; margin-top:44px; }
  .rune-info{ display:flex; align-items:center; gap:10px; max-width:720px; }
  .rune-info strong{ color:#e0c77b; display:block; }
  .stat-shards{ display:flex; flex-direction:column; gap:8px; margin-top:12px; }
  .stat-shards div{ display:flex; align-items:center; gap:8px; }

  /* card layout for build/pathing */
  .card-container{ display:flex; flex-direction:column; gap:12px; margin-top:28px; }
  .card{ background: var(--card-bg); border:1px solid var(--gold); border-radius:10px; padding:14px; transition:all .2s; }
  .card strong{ display:block; margin-bottom:8px; color:#e0c77b; font-weight:700; text-transform:capitalize; }

  .build-flow{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center; margin-top:8px; }
  .build-flow .item{ border:1px solid var(--gold); border-radius:8px; padding:8px 10px; min-width:140px; background:rgba(20,25,35,0.9); display:flex; align-items:center; gap:10px; justify-content:center; }
  .build-arrow{ font-size:18px; color:var(--gold); }

  /* small helpers */
  .muted{ color:#cbd5e1; font-size:14px; }
  .note{ font-size:13px; color:#d1d5db; }

  @media (max-width:600px){
    #section-info h3{ position:static; margin-bottom:8px; text-align:left; }
    .build-flow{ flex-direction:column; }
  }
</style>
</head>
<body>

<header>Ekko Jungle – Members Hub Guide</header>
<a class="back-button" href="membershub.html">Back to Members Hub</a>

<div id="section-select-container">
  <select id="section-select" aria-label="Select guide section">
    <option disabled selected>Select a section</option>
    <option>Intro</option>
    <option>Runes</option>
    <option>Build</option>
    <option>Summoner spells</option>
    <option>Abilities</option>
    <option>Combos</option>
    <option>Level 1</option>
    <option>Pathing</option>
    <option>Hardest matchups</option>
    <option>Team fighting</option>
    <option>Closing out the game</option>
  </select>
</div>

<div id="section-info">
  <p>Select a section from above to view details.</p>
</div>

<script>
  // require login
  if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
    window.location.href = 'index.html';
  }

  const sectionSelect = document.getElementById('section-select');
  const sectionInfo = document.getElementById('section-info');

  sectionSelect.addEventListener('change', () => {
    const value = sectionSelect.value;
    let header = `<h3>${value}</h3>`;
    let content = `<p>Coming soon!</p>`;

    /* Intro */
    if (value === "Intro") {
      content = `
        ${header}
        <p>Why Ekko jungle? Ekko excels in the jungle because his mobility, crowd control, and burst allow for strong ganks and objective control. Smite synergizes perfectly with his kit — the slow and burst from blue smite make securing kills and objectives easy. His W, ult, and passive thrive in flanks, dives, and skirmishes. Plus, he's incredibly fun to play!</p>
      `;
    }

    /* Runes */
    if (value === "Runes") {
      content = `
        ${header}
        <div class="rune-container">
          <div class="rune-info">
            <img class="icon" src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/DarkHarvest/DarkHarvest.png" alt="Dark Harvest"> 
            <div><strong>Dark Harvest</strong><div class="muted">Scales perfectly with Ekko's burst and resets; lets you one-shot in late fights.</div></div>
          </div>

          <div class="rune-info">
            <img class="icon" src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/SuddenImpact/SuddenImpact.png" alt="Sudden Impact">
            <div><strong>Sudden Impact</strong><div class="muted">Synergizes with E dash for consistent magic penetration after engages.</div></div>
          </div>

          <div class="rune-info">
            <img class="icon" src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/EyeballCollection/EyeballCollection.png" alt="Eyeball Collection">
            <div><strong>Eyeball Collection</strong><div class="muted">Free AP from takedowns; helps Ekko scale mid-game.</div></div>
          </div>

          <div class="rune-info">
            <img class="icon" src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/TreasureHunter/TreasureHunter.png" alt="Treasure Hunter">
            <div><strong>Treasure Hunter</strong><div class="muted">Snowball gold on takedowns — speeds early powerspikes.</div></div>
          </div>

          <div class="rune-info">
            <img class="icon" src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/MagicalFootwear/MagicalFootwear.png" alt="Magical Footwear">
            <div><strong>Magical Footwear</strong><div class="muted">Free boots; saves gold and gives movement advantage for roams/ganks.</div></div>
          </div>

          <div class="rune-info">
            <img class="icon" src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/CosmicInsight/CosmicInsight.png" alt="Cosmic Insight">
            <div><strong>Cosmic Insight</strong><div class="muted">Cooldown reduction for summoners/abilities: excellent on Ekko (smite/flash/ult uptime).</div></div>
          </div>

          <div class="stat-shards">
            <div><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsAttackSpeedIcon.png" alt="Attack Speed"><span>Attack Speed</span></div>
            <div><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsAdaptiveForceIcon.png" alt="Adaptive Force"><span>Adaptive Force</span></div>
            <div><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsHealthScalingIcon.png" alt="Scaling Health"><span>Scaling Health</span></div>
          </div>
        </div>
      `;
    }

    /* Build */
    if (value === "Build") {
      // Using item images from Data Dragon where appropriate.
      // Mosstomper Seedling uses a placeholder item image (health potion id) as requested attempt.
      content = `
        ${header}
        <div class="card-container">

          <div class="card">
            <strong>Starting items</strong>
            <div class="build-flow">
              <div class="item"><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/2003.png" alt="Mosstomper Seedling (placeholder)">Mosstomper Seedling</div>
              <div class="build-arrow">→</div>
              <div class="item"><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/1082.png" alt="Dark Seal">Dark Seal</div>
              <div class="build-arrow">→</div>
              <div class="item"><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/1052.png" alt="Amp Tome">Amp Tome</div>
              <div class="build-arrow">→</div>
              <div class="item"><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/1001.png" alt="Boots of Speed">Tier-1 Boots</div>
            </div>
          </div>

          <div class="card">
            <strong>Core items</strong>
            <div class="build-flow">
              <div class="item"><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3111.png" alt="Mercury's Treads">Mercury's Treads</div>
              <div class="build-arrow">→</div>
              <div class="item"><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3115.png" alt="Nashor's Tooth">Nashor's Tooth</div>
              <div class="build-arrow">→</div>
              <div class="item"><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3100.png" alt="Lich Bane">Lich Bane</div>
              <div class="build-arrow">→</div>
              <div class="item"><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3089.png" alt="Rabadon's Deathcap">Rabadon's Deathcap</div>
            </div>
          </div>

          <div class="card">
            <strong>Final items</strong>
            <div class="build-flow">
              <div class="item"><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3157.png" alt="Zhonya's Hourglass">Zhonya's Hourglass</div>
              <div class="build-arrow">→</div>
              <div class="item"><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3135.png" alt="Void Staff">Void Staff</div>
              <div class="build-arrow">→</div>
              <div class="item"><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/2138.png" alt="Elixir">Elixir(s)</div>
            </div>
          </div>

        </div>
        <p class="note">Note: images use Riot Data Dragon icons. Mosstomper Seedling is a custom lore item — currently shown with an available potion icon as a placeholder; tell me if you'd like a different placeholder or a custom uploaded logo.</p>
      `;
    }

    /* Summoner spells */
    if (value === "Summoner spells") {
      content = `
        ${header}
        <p><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/SummonerFlash.png" alt="Flash Icon"> <strong>Flash:</strong> Essential for outplays and mobility.</p>
        <p><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/SummonerSmite.png" alt="Smite Icon"> <strong>Smite:</strong> Must-have for jungle clears, objective control, and upgraded blue smite plays.</p>
      `;
    }

    /* Abilities */
    if (value === "Abilities") {
      content = `
        ${header}
        <p><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/passive/Ekko_P.png" alt="Passive"> <strong>Passive – Z-Drive Resonance:</strong> Every 3rd hit deals bonus magic damage and grants movement speed; important for clears and trades.</p>
        <p><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoQ.png" alt="Q"> <strong>Q – Timewinder:</strong> Poke and wide clear tool — aim to hit twice on monsters or champions for full damage.</p>
        <p><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoW.png" alt="W"> <strong>W – Parallel Convergence:</strong> Cast from fog or flank; shield + stun zone for teamfights and ganks.</p>
        <p><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoE.png" alt="E"> <strong>E – Phase Dive:</strong> Mobility + auto reset — use through walls and to secure executes.</p>
        <p><img class="icon" src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoR.png" alt="R"> <strong>R – Chronobreak:</strong> Rewind to safety, heal, and deal burst at your origin point — excellent outplay tool.</p>
      `;
    }

    /* Combos */
    if (value === "Combos") {
      content = `
        ${header}
        <p><strong>W E E Q AA:</strong> Basic gank combo; open with W from fog.</p>
        <p><strong>E E Q AA W AA:</strong> Extended trade when in range.</p>
        <p><strong>E Q E AA:</strong> Burst combo when Q is guaranteed.</p>
        <p><strong>Q AA E:</strong> Quick trades or finishing.</p>
        <p><strong>W E Q:</strong> Safe slow into passive proc.</p>
      `;
    }

    /* Level 1 */
    if (value === "Level 1") {
      content = `
        ${header}
        <p>Blue side: Ward tri-bush, move mid, throw W toward pixel brush. Use W on starting camp around 1:27. Last auto timing should consider Hunter's Talisman / jungle item damage.</p>
        <p>Red side: Mirror path; tri-bush ward is lower priority for top-side starts.</p>
      `;
    }

    /* Pathing (reverted and cleaned up, no icons) */
    if (value === "Pathing") {
      content = `
        ${header}
        <p><strong>First clear</strong></p>
        <p>Red buff → Raptors → Wolves → Blue buff → Gromp → Scuttle → Look for ganks or Krugs if safe.</p>

        <p><strong>Alternative clear</strong></p>
        <ul>
          <li>Blue start → Gromp → Wolves → Raptors → Red → Krugs → Scuttle</li>
          <li>Red start → Krugs → Raptors → Check mid → Wolves → Blue → Scuttle</li>
        </ul>

        <p><strong>Preferred jungle camps</strong></p>
        <ul>
          <li><strong>Raptors:</strong> Quick clear, sustain and gank pressure.</li>
          <li><strong>Krugs:</strong> High XP — great when you have time to full clear.</li>
          <li><strong>Wolves / Murk Wolves:</strong> Solid gold and pathing options.</li>
          <li><strong>Gromp:</strong> Toughest camp but good experience.</li>
          <li><strong>Blue Sentinel / Red Brambleback:</strong> Buff control for clears & ganks.</li>
          <li><strong>Scuttle Crab:</strong> Priority objective — vision and river control; take it when you can safely contest.</li>
        </ul>

        <p class="note">Tip: Smite camps to manage passive + HP efficiently; use W to speed clears and set up ganks. If lanes are pushed in, look to gank earlier instead of full clearing Krugs.</p>
      `;
    }

    /* Hardest matchups */
    if (value === "Hardest matchups") {
      content = `
        ${header}
        <p>Champions with high mobility and early burst (e.g., Nidalee, Kha'Zix) can punish Ekko's positioning and force early ult usage. Play safe, track enemy jungle, and prioritize vision.</p>
      `;
    }

    /* Team fighting */
    if (value === "Team fighting") {
      content = `
        ${header}
        <p>Proc passive on as many targets as possible. Land W to zone priority targets and set up your E/R combos. Delay R to maximize healing/damage when diving. Prioritize survival and objective control after the engage.</p>
      `;
    }

    /* Closing out the game (last) */
    if (value === "Closing out the game") {
      content = `
        ${header}
        <p>Focus Baron/Elder spawns and objective control. Use W, Q, passive to zone and force enemies away from objectives; avoid farming far from objectives and prioritize vision control. After your core items, prioritize survival and picking the correct fights.</p>
      `;
    }

    // set content
    sectionInfo.innerHTML = content;
  });
</script>

</body>
</html>
