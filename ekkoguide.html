<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekko Jungle Guide – Members Hub</title>
<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  background: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_0.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #e6edf3;
  text-align: center;
  overflow-x: hidden;
}

/* Overlay */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(10,15,20,0.75);
  z-index: -1;
}

/* Header */
header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 26px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 20px auto 10px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Dropdown */
#section-select-container {
  margin: 20px auto;
}
#section-select {
  padding: 10px 15px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #0f1722;
  color: #c9aa71;
  cursor: pointer;
}

/* Section display */
#section-info {
  margin: 30px auto;
  max-width: 900px;
  background: rgba(13,17,23,0.95);
  border: 1px solid #2f81f7;
  padding: 20px;
  border-radius: 10px;
  text-align: left;
  color: #fff;
  min-height: 200px;
}

#section-info:hover { box-shadow: 0 0 15px rgba(47,129,247,0.5); }

#section-info h3 {
  color: #c9aa71;
  margin-top: 16px;
  text-align: center;
  text-transform: uppercase;
}

#section-info p {
  margin: 8px 0 16px;
  line-height: 1.6;
}

#section-info ul {
  margin-left: 20px;
}

/* Icons */
.icon {
  width: 36px;
  height: 36px;
  vertical-align: middle;
  border-radius: 6px;
  margin-right: 6px;
  transition: 0.2s ease;
}
.icon:hover {
  filter: drop-shadow(0 0 6px #c9aa71);
  transform: scale(1.05);
}

/* Rune layout */
.rune-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin-top: 15px;
}
.rune-row {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}
.rune-row img {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  transition: 0.3s;
  border: 2px solid transparent;
}
.rune-row img:hover {
  border-color: #c9aa71;
  transform: scale(1.1);
}

/* Build & Runes Cards */
.card-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 10px;
  gap: 12px;
}

.card {
  background: rgba(20,25,35,0.85);
  border: 1px solid #c9aa71;
  border-radius: 10px;
  padding: 15px;
  min-width: 140px;
  flex: 1 1 120px;
  text-align: center;
  transition: all 0.3s;
}
.card:hover {
  background: rgba(30,35,45,0.95);
  box-shadow: 0 0 10px #c9aa71;
}
.card strong { display: block; margin-bottom: 6px; color: #e0c77b; }

/* Build flow */
.build-flow {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.build-flow div {
  background: rgba(20,25,35,0.85);
  border: 1px solid #c9aa71;
  border-radius: 8px;
  padding: 10px 12px;
  min-width: 120px;
  text-align: center;
}
.build-flow span {
  font-size: 18px;
  color: #c9aa71;
}

/* Media query */
@media (max-width: 600px) {
  #section-select { font-size: 14px; padding: 8px 10px; }
  .card-container { flex-direction: column; gap: 10px; }
  .build-flow { flex-direction: column; }
  .build-flow span { display: none; }
}
</style>
</head>
<body>

<header>Ekko Jungle – Members Hub Guide</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div id="section-select-container">
  <select id="section-select">
    <option disabled selected>Select a section</option>
    <option>Intro</option>
    <option>Runes</option>
    <option>Build</option>
    <option>Summoner Spells</option>
    <option>Abilities</option>
    <option>Combos</option>
    <option>Preferred Jungle Camps</option>
    <option>Level 1</option>
    <option>Jungle Routes</option>
    <option>Hardest Matchups</option>
    <option>Team Fighting</option>
    <option>Closing Out The Game</option>
  </select>
</div>

<div id="section-info">
  <p>Select a section from above to view details.</p>
</div>

<script>
// Require login
if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
  window.location.href = 'index.html';
}

const sectionSelect = document.getElementById('section-select');
const sectionInfo = document.getElementById('section-info');

sectionSelect.addEventListener('change', () => {
  let value = sectionSelect.value;
  let content = `<p>Coming soon!</p>`;

  if(value === "Intro"){
    content = `
      <h3>Intro</h3>
      <p>Why Ekko jungle? I think Ekko performs best as a jungler. Smite is the strongest summoner spell to take alongside flash on Ekko, especially once upgraded to blue smite. The range on the slow, and burst, plus the ability to secure objectives fits Ekko’s play style perfectly. Ekko has a hard time laning, and his W, ult, and passive can be best utilized in roam, gank, dive, and flank scenarios. Also, he’s really fun to play!</p>
    `;
  }

  if(value === "Runes"){
    content = `
      <h3>Runes</h3>
      <div class="rune-container">
        <div class="rune-row">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/DarkHarvest/DarkHarvest.png" title="Dark Harvest">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/SuddenImpact/SuddenImpact.png" title="Sudden Impact">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/EyeballCollection/EyeballCollection.png" title="Eyeball Collection">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/TreasureHunter/TreasureHunter.png" title="Treasure Hunter">
        </div>
        <div class="rune-row">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/MagicalFootwear/MagicalFootwear.png" title="Magical Footwear">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/CosmicInsight/CosmicInsight.png" title="Cosmic Insight">
        </div>
      </div>
    `;
  }

  if(value === "Build"){
    content = `
      <h3>Build</h3>
      <div class="build-flow">
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/1082.png" class="icon">Dark Seal</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3115.png" class="icon">Nashor's Tooth</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3111.png" class="icon">Mercury's Treads</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3100.png" class="icon">Lich Bane</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3089.png" class="icon">Rabadon's Deathcap</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3157.png" class="icon">Zhonya's Hourglass</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3135.png" class="icon">Void Staff</div>
      </div>
    `;
  }

  if(value === "Summoner Spells"){
    content = `
      <h3>Summoner Spells</h3>
      <p><strong>Flash:</strong> Still the best summoner spell in the game.</p>
      <p><strong>Smite:</strong> Strongest summoner spell alongside Flash. Use upgraded blue smite for slow, burst, and objective control.</p>
    `;
  }

  if(value === "Abilities"){
    content = `
      <h3>Abilities</h3>
      <p><strong>Passive – Z-Drive Resonance:</strong> Trades that proc passive are worth it. Use movement speed to reposition while waiting for cooldowns.</p>
      <p><strong>Q – Timewinder:</strong> Fast wave pushing and lane fixing.</p>
      <p><strong>W – Parallel Convergence:</strong> Push enemies, shield yourself, tank damage, and control fights.</p>
      <p><strong>E – Phase Dive:</strong> Gap closer; use over walls and connect second part whenever possible.</p>
      <p><strong>R – Chronobreak:</strong> Tower diving, initiating fights, stealing objectives.</p>
    `;
  }

  if(value === "Combos"){
    content = `
      <h3>Combos</h3>
      <p><strong>W E E Q AA:</strong> Basic combo, lead with W out of vision.</p>
      <p><strong>E E Q AA W AA:</strong> Best when already in E range.</p>
      <p><strong>E Q E AA:</strong> Best when Q is guaranteed to hit.</p>
      <p><strong>Q AA E:</strong> Extended trades or close-range situations.</p>
      <p><strong>W E Q:</strong> Safe slow to proc passive.</p>
    `;
  }

  if(value === "Preferred Jungle Camps"){
    content = `
      <h3>Preferred Jungle Camps</h3>
      <p><strong>Raptors:</strong> Favorite, heals well, great gank positioning.</p>
      <p><strong>Krugs:</strong> High experience, time-consuming.</p>
      <p><strong>Wolf Camp:</strong> Good clear, pathing.</p>
      <p><strong>Gromp:</strong> Hardest camp, usually cleared last.</p>
      <p><strong>Scuttle Crab:</strong> Very fast with W.</p>
      <p><strong>Dragon:</strong> Clear slowly before Runic Echoes. Prioritize ganks/farming.</p>
      <p><em>Tip:</em> Smite before passive for extra damage on camps.</p>
    `;
  }

  if(value === "Level 1"){
    content = `
      <h3>Level 1</h3>
      <p>Blue side: Ward tri bush, move mid, throw W toward pixel brush. Use W on starting camp at 1:27. Last auto should wait for Hunter’s Talisman damage (approx 125).</p>
      <p>Red side: Mirror path; tri bush ward less critical for top.</p>
    `;
  }

  if(value === "Jungle Routes"){
    content = `
      <h3>Jungle Routes</h3>
      <p><strong>First Clear:</strong> Red start preferred, blue start only if enemy may cheese red.</p>
      <ul>
        <li>Red Buff → Raptors → Wolves → Blue Buff → Gromp/gank → Scuttle → Ganks/Invade</li>
        <li>Red Buff → Raptors → Krugs → Enemy Blue → Wolf/Gromp → Scuttle</li>
        <li>Blue Buff → Gromp → Wolf → Raptors → Red Buff → Krugs → Scuttle</li>
        <li>Red Buff → Krugs → Raptors → Check Mid → Wolves → Blue → Scuttle</li>
      </ul>
      <p><strong>Second Clear:</strong> Path to respawned camps or look for ganks.</p>
    `;
  }

  if(value === "Hardest Matchups"){
    content = `
      <h3>Hardest Matchups</h3>
      <p>Champions with high mobility and burst (e.g., Nidalee, Kha’Zix) are difficult. They can force early ult and still kill Ekko at original position.</p>
    `;
  }

  if(value === "Team Fighting"){
    content = `
      <h3>Team Fighting</h3>
      <p>Proc passive on as many targets as possible, land W on priority targets. Delay ult for max healing/damage. Use movement speed to dodge melee autos. W passive + ult liberally, especially on squishies.</p>
    `;
  }

  if(value === "Closing Out The Game"){
    content = `
      <h3>Closing Out The Game</h3>
      <p>Focus on Baron/Elder. Use W, passive, Q to zone and fast push waves to objectives. Avoid farming far from objectives. Post-core items, prioritize survival/objectives over kills.</p>
    `;
  }

  sectionInfo.innerHTML = content;
});
</script>

</body>
</html>
