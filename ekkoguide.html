<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekko Jungle Guide – Members Hub</title>
<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  background: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_0.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #e6edf3;
  text-align: center;
  overflow-x: hidden;
}

/* Overlay */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(10,15,20,0.75);
  z-index: -1;
}

/* Header */
header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 26px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 20px auto 10px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Dropdown */
#section-select-container {
  margin: 20px auto;
}
#section-select {
  padding: 10px 15px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #0f1722;
  color: #c9aa71;
  cursor: pointer;
}

/* Section display */
#section-info {
  margin: 30px auto;
  max-width: 900px;
  background: rgba(13,17,23,0.95);
  border: 1px solid #2f81f7;
  padding: 20px;
  border-radius: 10px;
  text-align: left;
  color: #fff;
  min-height: 200px;
}

#section-info:hover { box-shadow: 0 0 15px rgba(47,129,247,0.5); }

#section-info h3 {
  color: #c9aa71;
  margin-top: 16px;
  text-align: center;
  text-transform: uppercase;
}

#section-info p {
  margin: 8px 0 16px;
  line-height: 1.6;
}

#section-info ul {
  margin-left: 20px;
}

/* Icons */
.icon {
  width: 36px;
  height: 36px;
  vertical-align: middle;
  border-radius: 6px;
  margin-right: 6px;
  transition: 0.2s ease;
}
.icon:hover {
  filter: drop-shadow(0 0 6px #c9aa71);
  transform: scale(1.05);
}

/* Rune layout */
.rune-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin-top: 15px;
}
.rune-row {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  align-items: center;
}
.rune-info {
  display: flex;
  align-items: center;
  justify-content: left;
  gap: 10px;
  margin: 8px auto;
  max-width: 600px;
  text-align: left;
}

/* Build & Runes Cards */
.card-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 10px;
  gap: 12px;
}

.card {
  background: rgba(20,25,35,0.85);
  border: 1px solid #c9aa71;
  border-radius: 10px;
  padding: 15px;
  min-width: 140px;
  flex: 1 1 120px;
  text-align: center;
  transition: all 0.3s;
}
.card:hover {
  background: rgba(30,35,45,0.95);
  box-shadow: 0 0 10px #c9aa71;
}
.card strong { display: block; margin-bottom: 6px; color: #e0c77b; }

/* Build flow */
.build-flow {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.build-flow div {
  background: rgba(20,25,35,0.85);
  border: 1px solid #c9aa71;
  border-radius: 8px;
  padding: 10px 12px;
  min-width: 120px;
  text-align: center;
}
.build-flow span {
  font-size: 18px;
  color: #c9aa71;
}

/* Media query */
@media (max-width: 600px) {
  #section-select { font-size: 14px; padding: 8px 10px; }
  .card-container { flex-direction: column; gap: 10px; }
  .build-flow { flex-direction: column; }
  .build-flow span { display: none; }
}
</style>
</head>
<body>

<header>Ekko Jungle – Members Hub Guide</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div id="section-select-container">
  <select id="section-select">
    <option disabled selected>Select a section</option>
    <option>Intro</option>
    <option>Runes</option>
    <option>Build</option>
    <option>Summoner Spells</option>
    <option>Abilities</option>
    <option>Combos</option>
    <option>Preferred Jungle Camps</option>
    <option>Level 1</option>
    <option>Jungle Routes</option>
    <option>Hardest Matchups</option>
    <option>Team Fighting</option>
    <option>Closing Out The Game</option>
  </select>
</div>

<div id="section-info">
  <p>Select a section from above to view details.</p>
</div>

<script>
if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
  window.location.href = 'index.html';
}

const sectionSelect = document.getElementById('section-select');
const sectionInfo = document.getElementById('section-info');

sectionSelect.addEventListener('change', () => {
  let value = sectionSelect.value;
  let content = `<p>Coming soon!</p>`;

  if(value === "Intro"){
    content = `
      <h3>Intro</h3>
      <p>Why Ekko jungle? Ekko excels in the jungle because his mobility, crowd control, and burst allow for strong ganks and objective control. Smite synergizes perfectly with his kit — the slow and burst from blue smite make securing kills and objectives easy. His W, ult, and passive thrive in flanks, dives, and skirmishes. Plus, he's incredibly fun to play!</p>
    `;
  }

  if(value === "Runes"){
    content = `
      <h3>Runes</h3>
      <div class="rune-container">
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/DarkHarvest/DarkHarvest.png" class="icon">
          <span><strong>Dark Harvest:</strong> Scales perfectly with Ekko's burst and resets; lets you one-shot in late fights.</span>
        </div>
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/SuddenImpact/SuddenImpact.png" class="icon">
          <span><strong>Sudden Impact:</strong> Synergizes with E dash for consistent magic pen after every engage.</span>
        </div>
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/EyeballCollection/EyeballCollection.png" class="icon">
          <span><strong>Eyeball Collection:</strong> Free AP for kills and assists; snowballs Ekko's mid-game power.</span>
        </div>
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/TreasureHunter/TreasureHunter.png" class="icon">
          <span><strong>Treasure Hunter:</strong> Gives extra gold; helps snowball early Ekko powerspikes.</span>
        </div>
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/MagicalFootwear/MagicalFootwear.png" class="icon">
          <span><strong>Magical Footwear:</strong> Free boots for faster core build; movement speed advantage.</span>
        </div>
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/CosmicInsight/CosmicInsight.png" class="icon">
          <span><strong>Cosmic Insight:</strong> CDR on Smite, Flash, and Ult; crucial for Ekko jungle rotations.</span>
        </div>
        <div class="rune-row">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsAdaptiveForceIcon.png" title="Adaptive Force">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsAdaptiveForceIcon.png" title="Adaptive Force">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsHealthScalingIcon.png" title="Health Scaling">
        </div>
      </div>
    `;
  }

  if(value === "Build"){
    content = `
      <h3>Build</h3>
      <div class="build-flow">
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/1082.png" class="icon">Green Pet</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/1082.png" class="icon">Dark Seal</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3115.png" class="icon">Nashor's Tooth</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3020.png" class="icon">Sorcerer's Shoes</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/6672.png" class="icon">Hextech Rocketbelt</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3089.png" class="icon">Rabadon's Deathcap</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3100.png" class="icon">Lich Bane</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3135.png" class="icon">Void Staff</div><span>→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3157.png" class="icon">Zhonya's Hourglass</div>
      </div>
    `;
  }

  if(value === "Summoner Spells"){
    content = `
      <h3>Summoner Spells</h3>
      <p><strong>Flash:</strong> Essential for outplays and mobility.</p>
      <p><strong>Smite:</strong> Must-have for jungle clears, objective control, and ekko combos with blue smite.</p>
    `;
  }

  if(value === "Abilities"){
    content = `
      <h3>Abilities</h3>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/passive/Ekko_P.png" class="icon"><strong>Passive – Z-Drive Resonance:</strong> Every 3rd hit deals bonus magic damage and grants move speed. Key for early clears and extended fights.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoQ.png" class="icon"><strong>Q – Timewinder:</strong> Main poke and clear tool. Double hit for max damage — aim so it hits twice on camps or enemies.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoW.png" class="icon"><strong>W – Parallel Convergence:</strong> Shield and stun zone. Best when cast from fog before a gank or dive; gives massive outplay potential.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoE.png" class="icon"><strong>E – Phase Dive:</strong> Mobility + auto reset. Use through walls or in quick burst combos with Q.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoR.png" class="icon"><strong>R – Chronobreak:</strong> Rewind time, heal, and burst. Perfect for tower dives or baiting assassins.</p>
    `;
  }

  if(value === "Combos"){
    content = `
      <h3>Combos</h3>
      <p><strong>W E E Q AA:</strong> Basic combo, lead with W from fog of war.</p>
      <p><strong>E E Q AA W AA:</strong> Best for extended trades.</p>
      <p><strong>E Q E AA:</strong> Guaranteed burst if Q hits.</p>
      <p><strong>Q AA E:</strong> Quick trades or finishing off targets.</p>
      <p><strong>W E Q:</strong> Safe slow + passive proc.</p>
    `;
  }

  if(value === "Preferred Jungle Camps"){
    content = `
      <h3>Preferred Jungle Camps</h3>
      <p><strong>Raptors:</strong> Fast clear, good for early ganks.</p>
      <p><strong>Krugs:</strong> Best for XP and gold.</p>
      <p><strong>Wolves:</strong> Efficient clear, flexible pathing.</p>
      <p><strong>Gromp:</strong> Usually cleared last; strong scaling XP.</p>
      <p><strong>Scuttle Crab:</strong> Quick and heals well with W.</p>
      <p><strong>Dragon:</strong> Clear after first clear; prioritize objectives.</p>
      <p><em>Tip:</em> Smite camps at low HP to optimize passive.</p>
    `;
  }

  if(value === "Level 1"){
    content = `
      <h3>Level 1</h3>
      <p>Blue side: Ward tri bush, move mid, throw W toward pixel brush. Use W on starting camp at 1:27. Last auto should wait for Hunter’s Talisman damage (approx 125).</p>
      <p>Red side: Mirror path; tri bush ward less critical for top.</p>
    `;
  }

  if(value === "Jungle Routes"){
    content = `
      <h3>Jungle Routes</h3>
      <p><strong>First Clear:</strong> Red → Raptors → Wolves → Blue → Gromp → Scuttle → Ganks</p>
      <p><strong>Alternative:</strong> Blue → Gromp → Wolves → Raptors → Red → Krugs → Scuttle</p>
      <p><strong>Second Clear:</strong> Path to respawned camps or look for ganks.</p>
    `;
  }

  if(value === "Hardest Matchups"){
    content = `
      <h3>Hardest Matchups</h3>
      <p>Champions with high mobility and burst like Nidalee and Kha'Zix are difficult. They can force early ult usage and punish Ekko's positioning.</p>
    `;
  }

  if(value === "Team Fighting"){
    content = `
      <h3>Team Fighting</h3>
      <p>Proc passive on as many targets as possible. Land W on priority targets. Delay ult for maximum healing/damage. Use mobility to dodge key abilities. W + passive + ult are crucial for squishy targets.</p>
    `;
  }

  if(value === "Closing Out The Game"){
    content = `
      <h3>Closing Out The Game</h3>
      <p>Focus objectives like Baron/Elder. Use W, passive, Q to zone enemies and push waves. Avoid farming far from objectives. After core items, prioritize survival and objectives over kills.</p>
    `;
  }

  sectionInfo.innerHTML = content;
});
</script>

</body>
</html>
