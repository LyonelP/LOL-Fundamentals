<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekko Jungle Guide – Members Hub</title>
<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  background: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_0.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #e6edf3;
  text-align: center;
  overflow-x: hidden;
}

/* Overlay */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(10,15,20,0.75);
  z-index: -1;
}

/* Header */
header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 26px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 20px auto 10px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Dropdown */
#section-select-container {
  margin: 20px auto;
}
#section-select {
  padding: 10px 15px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #0f1722;
  color: #c9aa71;
  cursor: pointer;
}

/* Section display */
#section-info {
  margin: 30px auto;
  max-width: 900px;
  background: rgba(13,17,23,0.95);
  border: 1px solid #2f81f7;
  padding: 20px;
  border-radius: 10px;
  text-align: left;
  color: #fff;
  min-height: 200px;
  position: relative;
}

#section-info:hover { box-shadow: 0 0 15px rgba(47,129,247,0.5); }

#section-info h3 {
  position: absolute;
  top: 10px;
  left: 20px;
  color: #c9aa71;
  margin: 0;
  font-size: 22px;
  text-transform: capitalize;
}

#section-info p {
  margin: 28px 0 16px;
  line-height: 1.6;
}

#section-info ul {
  margin-left: 20px;
}

/* Icons */
.icon {
  width: 36px;
  height: 36px;
  vertical-align: middle;
  border-radius: 6px;
  margin-right: 6px;
  transition: 0.2s ease;
}
.icon:hover {
  filter: drop-shadow(0 0 6px #c9aa71);
  transform: scale(1.05);
}

/* Rune layout */
.rune-container {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 12px;
  margin-top: 35px;
}
.rune-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 10px;
}
.rune-row span { margin-left: 8px; }

/* Build & Runes Cards */
.card-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 25px;
}

.card {
  background: rgba(20,25,35,0.85);
  border: 1px solid #c9aa71;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  transition: all 0.3s;
}
.card strong { display: block; margin-bottom: 6px; color: #e0c77b; }

/* Build flow */
.build-flow {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.build-flow div {
  border: 1px solid #c9aa71;
  border-radius: 8px;
  padding: 10px 12px;
  min-width: 120px;
  text-align: center;
}
.build-flow span {
  font-size: 18px;
  color: #c9aa71;
}

/* Media query */
@media (max-width: 600px) {
  #section-select { font-size: 14px; padding: 8px 10px; }
  .card-container { flex-direction: column; gap: 10px; }
  .build-flow { flex-direction: column; }
  .build-flow span { display: none; }
  #section-info h3 { position: static; margin-bottom: 12px; }
}
</style>
</head>
<body>

<header>Ekko Jungle – Members Hub Guide</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div id="section-select-container">
  <select id="section-select">
    <option disabled selected>Select a section</option>
    <option>Intro</option>
    <option>Runes</option>
    <option>Build</option>
    <option>Summoner spells</option>
    <option>Abilities</option>
    <option>Combos</option>
    <option>Level 1</option>
    <option>Pathing</option>
    <option>Hardest matchups</option>
    <option>Team fighting</option>
    <option>Closing out the game</option>
  </select>
</div>

<div id="section-info">
  <p>Select a section from above to view details.</p>
</div>

<script>
// Require login
if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
  window.location.href = 'index.html';
}

const sectionSelect = document.getElementById('section-select');
const sectionInfo = document.getElementById('section-info');

sectionSelect.addEventListener('change', () => {
  let value = sectionSelect.value;
  let content = `<p>Coming soon!</p>`;
  let header = `<h3>${value}</h3>`;

  if(value === "Intro"){
    content = `
      ${header}
      <p>Why Ekko jungle? Ekko excels in the jungle because his mobility, crowd control, and burst allow for strong ganks and objective control. Smite synergizes perfectly with his kit — the slow and burst from blue smite make securing kills and objectives easy. His W, ult, and passive thrive in flanks, dives, and skirmishes. Plus, he's incredibly fun to play!</p>
    `;
  }

  if(value === "Runes"){
    content = `
      ${header}
      <div class="rune-container">
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/DarkHarvest/DarkHarvest.png" class="icon">
          <span><strong>Dark Harvest</strong></span>
        </div>
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/SuddenImpact/SuddenImpact.png" class="icon">
          <span><strong>Sudden Impact</strong></span>
        </div>
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/EyeballCollection/EyeballCollection.png" class="icon">
          <span><strong>Eyeball Collection</strong></span>
        </div>
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/TreasureHunter/TreasureHunter.png" class="icon">
          <span><strong>Treasure Hunter</strong></span>
        </div>
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/MagicalFootwear/MagicalFootwear.png" class="icon">
          <span><strong>Magical Footwear</strong></span>
        </div>
        <div class="rune-info">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/CosmicInsight/CosmicInsight.png" class="icon">
          <span><strong>Cosmic Insight</strong></span>
        </div>
        <div class="rune-row">
          <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsAttackSpeedIcon.png" class="icon"><span>Attack Speed</span></div>
          <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsAdaptiveForceIcon.png" class="icon"><span>Adaptive Force</span></div>
          <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsHealthScalingIcon.png" class="icon"><span>Scaling Health</span></div>
        </div>
      </div>
    `;
  }

  if(value === "Build"){
    content = `
      ${header}
      <div class="card-container">
        <div class="card"><strong>Starting items</strong>
          <div class="build-flow">
            <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/2031.png" class="icon">Mosstomper Seedling</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/1082.png" class="icon">Dark Seal</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/1052.png" class="icon">Amp Tome</div>
          </div>
        </div>
        <div class="card"><strong>Core items</strong>
          <div class="build-flow">
            <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3115.png" class="icon">Nashor's Tooth</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3100.png" class="icon">Lich Bane</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3089.png" class="icon">Rabadon's Deathcap</div>
          </div>
        </div>
        <div class="card"><strong>Final items</strong>
          <div class="build-flow">
            <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3157.png" class="icon">Zhonya's Hourglass</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/3135.png" class="icon">Void Staff</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/item/2138.png" class="icon">Elixir(s)</div>
          </div>
        </div>
      </div>
    `;
  }

  if(value === "Summoner spells"){
    content = `
      ${header}
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/SummonerFlash.png" class="icon"><strong>Flash:</strong> Essential for outplays and mobility.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/SummonerSmite.png" class="icon"><strong>Smite:</strong> Must‑have for jungle clears, objective control, and Ekko combos with blue smite.</p>
    `;
  }

  if(value === "Abilities"){
    content = `
      ${header}
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/passive/Ekko_P.png" class="icon"><strong>Passive – Z‑Drive Resonance:</strong> Every 3rd hit deals bonus magic damage and grants movespeed.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoQ.png" class="icon"><strong>Q – Timewinder:</strong> Main poke and clear tool.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoW.png" class="icon"><strong>W – Parallel Convergence:</strong> Shield & stun zone.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoE.png" class="icon"><strong>E – Phase Dive:</strong> Mobility + auto‑reset.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoR.png" class="icon"><strong>R – Chronobreak:</strong> Rewind time, heal, burst.</p>
    `;
  }

  if(value === "Combos"){
    content = `
      ${header}
      <p><strong>W E E Q AA:</strong> Basic combo.</p>
      <p><strong>E E Q AA W AA:</strong> Best for extended trades.</p>
      <p><strong>E Q E AA:</strong> Guaranteed burst if Q hits.</p>
      <p><strong>Q AA E:</strong> Quick trades or finishing off targets.</p>
      <p><strong>W E Q:</strong> Safe slow + passive proc.</p>
    `;
  }

  if(value === "Level 1"){
    content = `
      ${header}
      <p>Blue side: Ward tri bush, move mid, throw W toward pixel brush. Use W on starting camp at 1:27.</p>
      <p>Red side: Mirror path; tri bush ward less critical.</p>
    `;
  }

  if(value === "Pathing"){
    content = `
      ${header}
      <div class="card-container">
        <div class="card"><strong>First clear</strong>
          <div class="build-flow">
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/ScuttleCrab.png" class="icon">Scuttle Crab</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/BlueSentinel.png" class="icon">Blue Sentinel</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/RedBrambleback.png" class="icon">Red Brambleback</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Raptors.png" class="icon">Raptors</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/MurkWolves.png" class="icon">Murk Wolves</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Krugs.png" class="icon">Krugs</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Gromp.png" class="icon">Gromp</div>
          </div>
        </div>
        <div class="card"><strong>Second clear / gank transition</strong>
          <div class="build-flow">
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/ScuttleCrab.png" class="icon">Scuttle Crab</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/RedBrambleback.png" class="icon">Red Brambleback</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/MurkWolves.png" class="icon">Murk Wolves</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Krugs.png" class="icon">Krugs</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/BlueSentinel.png" class="icon">Blue Sentinel</div>
            <span>→</span>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Gromp.png" class="icon">Gromp</div>
          </div>
        </div>
      </div>
      <p>Preferred jungle camps: Blue Sentinel, Red Brambleback, Raptors, Murk Wolves, Krugs, Gromp, Scuttle Crab for vision and control.</p>
    `;
  }

  if(value === "Hardest matchups"){
    content = `
      ${header}
      <p>Champions with high mobility and burst like Nidalee and Kha’Zix are difficult. They can force early ult usage and punish Ekko’s positioning.</p>
    `;
  }

  if(value === "Team fighting"){
    content = `
      ${header}
      <p>Proc passive on as many targets as possible. Land W on priority targets. Delay ult for maximum healing/damage. Use mobility to dodge key abilities. W + passive + ult are crucial for squishy targets.</p>
    `;
  }

  if(value === "Closing out the game"){
    content = `
      ${header}
      <p>Focus objectives like Baron/Elder. Use W, passive, Q to zone enemies and push waves. Avoid farming far from objectives. After core items, prioritize survival and objectives over kills.</p>
    `;
  }

  sectionInfo.innerHTML = content;
});
</script>

</body>
</html>
