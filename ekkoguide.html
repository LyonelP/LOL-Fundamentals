<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekko Jungle Guide – Members Hub</title>
<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  background: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_0.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #e6edf3;
  text-align: center;
  overflow-x: hidden;
}

/* Overlay */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(10,15,20,0.75);
  z-index: -1;
}

/* Header */
header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 26px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 20px auto 10px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Dropdown */
#section-select-container {
  margin: 20px auto;
}
#section-select {
  padding: 10px 15px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #0f1722;
  color: #c9aa71;
  cursor: pointer;
}

/* Section display */
#section-info {
  margin: 30px auto;
  max-width: 900px;
  background: rgba(13,17,23,0.95);
  border: 1px solid #2f81f7;
  padding: 20px;
  border-radius: 10px;
  text-align: left;
  color: #fff;
  min-height: 300px;
  position: relative;
}

#section-info h3 {
  position: absolute;
  top: 12px;
  left: 20px;
  color: #c9aa71;
  margin: 0;
  text-transform: capitalize;
  font-size: 22px;
}

#section-info p {
  margin: 8px 0 16px;
  line-height: 1.6;
}

#section-info ul {
  margin-left: 20px;
}

/* Icons */
.icon {
  width: 36px;
  height: 36px;
  vertical-align: middle;
  border-radius: 6px;
  margin-right: 6px;
  transition: 0.2s ease;
}
.icon:hover {
  filter: drop-shadow(0 0 6px #c9aa71);
  transform: scale(1.05);
}

/* Rune layout */
.rune-container {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 20px;
  margin-top: 45px;
}
.rune-info {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
}

/* Stat shards */
.stat-shards {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}

/* Build & Runes Cards */
.card-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 10px;
  gap: 12px;
  border: 1px solid #c9aa71;
  padding: 10px;
  border-radius: 8px;
}

/* Build flow */
.build-flow {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.build-flow div {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(20,25,35,0.85);
  border: 1px solid #c9aa71;
  border-radius: 8px;
  padding: 10px 12px;
  min-width: 120px;
  text-align: center;
}
.build-flow span {
  font-size: 22px;
  color: #c9aa71;
  margin: 0 4px;
}

/* Media query */
@media (max-width: 600px) {
  #section-select { font-size: 14px; padding: 8px 10px; }
  .card-container { flex-direction: column; gap: 10px; }
  .build-flow { flex-direction: column; }
  .build-flow span { display: none; }
}
</style>
</head>
<body>

<header>Ekko Jungle – Members Hub Guide</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div id="section-select-container">
  <select id="section-select">
    <option disabled selected>Select a section</option>
    <option>Intro</option>
    <option>Runes</option>
    <option>Build</option>
    <option>Summoner Spells</option>
    <option>Abilities</option>
    <option>Combos</option>
    <option>Pathing</option>
    <option>Level 1</option>
    <option>Hardest Matchups</option>
    <option>Team Fighting</option>
    <option>Closing Out the Game</option>
  </select>
</div>

<div id="section-info">
  <p>Select a section from above to view details.</p>
</div>

<script>
if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
  window.location.href = 'index.html';
}

const sectionSelect = document.getElementById('section-select');
const sectionInfo = document.getElementById('section-info');

sectionSelect.addEventListener('change', () => {
  let value = sectionSelect.value;
  let content = `<p>Coming soon!</p>`;

  if(value === "Intro"){
    content = `
      <h3>Intro</h3>
      <p>Why Ekko jungle? Ekko excels in the jungle because his mobility, crowd control, and burst allow for strong ganks and objective control. Smite synergizes perfectly with his kit — the slow and burst from blue smite make securing kills and objectives easy. His W, ult, and passive thrive in flanks, dives, and skirmishes. Plus, he's incredibly fun to play!</p>
    `;
  }

  if(value === "Runes"){
    content = `
      <h3>Runes</h3>
      <div class="rune-container">
        <div class="rune-info">
          <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/DarkHarvest/DarkHarvest.png" class="icon"> <strong>Dark Harvest:</strong> Scales perfectly with Ekko's burst and resets; lets you one-shot in late fights.</div>
          <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/SuddenImpact/SuddenImpact.png" class="icon"> <strong>Sudden Impact:</strong> Synergizes with E dash for consistent magic pen after every engage.</div>
          <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/EyeballCollection/EyeballCollection.png" class="icon"> <strong>Eyeball Collection:</strong> Free AP for doing what you already want — killing and ganking.</div>
          <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Domination/TreasureHunter/TreasureHunter.png" class="icon"> <strong>Treasure Hunter:</strong> Snowball rune; stacks give you an early AP lead to dominate mid-game.</div>
          <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/MagicalFootwear/MagicalFootwear.png" class="icon"> <strong>Magical Footwear:</strong> Free boots means faster core build; gives valuable movement speed.</div>
          <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/Styles/Inspiration/CosmicInsight/CosmicInsight.png" class="icon"> <strong>Cosmic Insight:</strong> CDR for Smite, Flash, and Ult — vital for an assassin jungler like Ekko.</div>
          <div class="stat-shards">
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsAttackSpeedIcon.png" class="icon"> Attack Speed</div>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsAdaptiveForceIcon.png" class="icon"> Adaptive Force</div>
            <div><img src="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/StatModsHealthScalingIcon.png" class="icon"> Scaling Health</div>
          </div>
        </div>
      </div>
    `;
  }

  if(value === "Build"){
    content = `
      <h3>Build</h3>
      <h4 style="color:#c9aa71; margin-top:45px;">Starting Items</h4>
      <div class="build-flow">
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/item/2031.png" class="icon"><br>Mosstomper Seedling</div>
        <span class="arrow">→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/item/1052.png" class="icon"><br>Dark Seal</div>
        <span class="arrow">→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/item/1052.png" class="icon"><br>Amp Tome</div>
        <span class="arrow">→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/item/1001.png" class="icon"><br>Boots</div>
      </div>
      <h4 style="color:#c9aa71;">Core Items</h4>
      <div class="build-flow">
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/item/3115.png" class="icon"><br>Nashor's Tooth</div>
        <span class="arrow">→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/item/3022.png" class="icon"><br>Mercury Treads</div>
        <span class="arrow">→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/item/3090.png" class="icon"><br>Lich Bane</div>
        <span class="arrow">→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/item/3089.png" class="icon"><br>Deathcap</div>
      </div>
      <h4 style="color:#c9aa71;">Final Items</h4>
      <div class="build-flow">
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/item/3157.png" class="icon"><br>Hourglass</div>
        <span class="arrow">→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/item/3135.png" class="icon"><br>Void Staff</div>
        <span class="arrow">→</span>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/item/2003.png" class="icon"><br>Elixirs</div>
      </div>
    `;
  }

  if(value === "Pathing"){
    content = `
      <h3>Pathing</h3>
      <div class="build-flow">
        <div>Red Brambleback</div>
        <span class="arrow">→</span>
        <div>Krugs</div>
        <span class="arrow">→</span>
        <div>Raptors</div>
        <span class="arrow">→</span>
        <div>Murk Wolves</div>
        <span class="arrow">→</span>
        <div>Blue Sentinel</div>
        <span class="arrow">→</span>
        <div>Gromp</div>
      </div>
      <p>Start at Red Brambleback, then clear Krugs → Raptors → Murk Wolves → Blue → Gromp. Focus on efficient smite usage and pathing to maximize XP and gold while preparing for early ganks. Your objective is to reach level 3 quickly for early pressure and invade opportunities.</p>
    `;
  }

  // Other sections (Abilities, Summoner Spells, Combos, Level 1, Hardest Matchups, Team Fighting, Closing Out the Game)
  if(value === "Abilities"){
    content = `
      <h3>Abilities</h3>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/passive/Ekko_P.png" class="icon"><strong>Passive – Z-Drive Resonance:</strong> Every 3rd hit deals bonus magic damage and grants move speed. Key for early clears and extended fights.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoQ.png" class="icon"><strong>Q – Timewinder:</strong> Main poke and clear tool. Double hit for max damage — aim so it hits twice on camps or enemies.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoW.png" class="icon"><strong>W – Parallel Convergence:</strong> Shield and stun zone. Best when cast from fog before a gank or dive; gives massive outplay potential.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoE.png" class="icon"><strong>E – Phase Dive:</strong> Mobility + auto reset. Use through walls or in quick burst combos with Q.</p>
      <p><img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/spell/EkkoR.png" class="icon"><strong>R – Chronobreak:</strong> Rewind time, heal, and burst. Perfect for tower dives or baiting assassins.</p>
    `;
  }

  if(value === "Summoner Spells"){
    content = `
      <h3>Summoner spells</h3>
      <div class="rune-info">
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/spell/SummonerSmite.png" class="icon"> Smite</div>
        <div><img src="https://ddragon.leagueoflegends.com/cdn/13.16.1/img/spell/SummonerFlash.png" class="icon"> Flash</div>
      </div>
    `;
  }

  if(value === "Combos"){
    content = `
      <h3>Combos</h3>
      <ul>
        <li>E → Q → Auto → W (for all-in engages)</li>
        <li>Flash → W → Q → E (surprise gank or tower dive)</li>
        <li>R to dodge key enemy spells and reset fight</li>
      </ul>
    `;
  }

  if(value === "Level 1"){
    content = `
      <h3>Level 1</h3>
      <p>Start at Red Brambleback with Mosstomper Seedling. Pull early leash for smooth clear. Level Q first to help with early jungle pressure and ganks.</p>
    `;
  }

  if(value === "Hardest Matchups"){
    content = `
      <h3>Hardest matchups</h3>
      <ul>
        <li>Warwick – strong early dueling and sustain</li>
        <li>Lee Sin – mobile, can punish early mistakes</li>
        <li>Hecarim – fast clears, can gank before you can respond</li>
      </ul>
    `;
  }

  if(value === "Team Fighting"){
    content = `
      <h3>Team fighting</h3>
      <p>Look for flanks using E and W to engage. Use R for resets or to negate focused CC. Target backline squishies for maximum burst potential.</p>
    `;
  }

  if(value === "Closing Out the Game"){
    content = `
      <h3>Closing out the game</h3>
      <p>Prioritize vision control, Baron/Dragon setups, and pick opportunities. Use R strategically to bait enemies and secure objectives. Keep pressure on side lanes while team groups mid for 5v5s.</p>
    `;
  }

  sectionInfo.innerHTML = content;
});
</script>

</body>
</html>
