<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub</title>
<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  background: url('https://64.media.tumblr.com/594ac290bec6d5e9ad98b5f53404f00b/245c4c3ee469f81d-e4/s1280x1920/1cda4284320eb2031758a9859dfe14ff8bbc50ba.jpg') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 250px;
  background: rgba(13,17,23,0.95);
  border-right: 2px solid #c9aa71;
  padding-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: stretch;
}

.sidebar a {
  color: #fff;
  text-decoration: none;
  padding: 15px 20px;
  border-left: 4px solid transparent;
  transition: all 0.3s;
  font-weight: bold;
}

.sidebar a:hover, .sidebar a.active {
  background: rgba(201,170,113,0.2);
  border-left: 4px solid #c9aa71;
  color: #c9aa71;
}

/* Main content */
.main-content {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

.main-content h2 {
  color: #c9aa71;
  margin-bottom: 10px;
}

.skill-list {
  margin-top: 15px;
  list-style-type: none;
  padding: 0;
}

.skill-list li {
  background: rgba(0,0,0,0.85);
  border: 2px solid #c9aa71;
  border-radius: 10px;
  padding: 12px 15px;
  margin-bottom: 10px;
  font-size: 16px;
  transition: transform 0.25s, box-shadow 0.3s;
}

.skill-list li:hover {
  background: rgba(0,0,0,0.95);
  box-shadow: 0 0 15px rgba(255,215,0,0.7);
  transform: scale(1.02);
}

/* Header */
.header {
  display: none;
}

/* Back button (if needed) */
.back-button {
  display: inline-block;
  margin-bottom: 20px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}

.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  font-size: 14px;
  color: #bbb;
}

/* Mobile adjustments */
@media(max-width: 700px){
  body {
    flex-direction: column;
  }
  .sidebar {
    width: 100%;
    display: flex;
    flex-direction: row;
    overflow-x: auto;
  }
  .sidebar a {
    flex: 1;
    text-align: center;
    border-left: none;
    border-bottom: 4px solid transparent;
  }
  .sidebar a.active, .sidebar a:hover {
    border-left: none;
    border-bottom: 4px solid #c9aa71;
  }
  .main-content {
    padding: 20px;
  }
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar"></div>

<div class="main-content">
  <a href="membershub.html" class="back-button">Back to Members Hub</a>
  <div id="skills-container"></div>
</div>

<footer>© 2025 LoL Fundamentals · All rights reserved</footer>

<script>
// Login requirement
if(localStorage.getItem('lolfundamentals_logged_in') !== 'true'){
  window.location.href = 'login.html';
}

// Skill data
const skillData = {
  "Pre Game": { desc: "Skills to focus on before the game starts", skills: ["Champion Select","Mouse Accuracy","Summoner Spells","Matchups","Communication","Build"] },
  "Early Game": { desc: "First 14 minutes of the game", skills: ["Level 1","Farming","Trading","Wave Control","Back Timings","Build","Power Spikes","Pathing","Laning","Map Awareness","Ganking","Roaming"] },
  "Mid Game": { desc: "14-25 minutes of the game", skills: ["Teamwork","Split Pushing","Sieging","Baiting","Lane Assignments","Vision"] },
  "Late Game": { desc: "25 minutes onward", skills: ["Damage","Target Selection","Tab Screen","Win Conditions","Rotations"] },
  "Advanced": { desc: "High level skills", skills: ["Animation Cancelling","Reading Players","Kiting","Positioning"] },
  "Out of Game": { desc: "Skills to focus on when not playing", skills: ["Setup","Mindset","Not Raging/Blaming","Reaction Time","Meta"] }
};

// Build sidebar and content
const sidebar = document.getElementById('sidebar');
const container = document.getElementById('skills-container');

function loadSection(sectionName){
  const data = skillData[sectionName];
  container.innerHTML = `<h2>${sectionName}</h2><p style="color:#f0d88b;">${data.desc}</p>`;
  const ul = document.createElement('ul');
  ul.className = 'skill-list';
  data.skills.forEach(skill => {
    const li = document.createElement('li');
    li.textContent = skill;
    ul.appendChild(li);
  });
  container.appendChild(ul);
}

// Sidebar links
Object.keys(skillData).forEach((section, i) => {
  const a = document.createElement('a');
  a.href = '#';
  a.textContent = section;
  if(i === 0) a.classList.add('active');
  a.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.sidebar a').forEach(link => link.classList.remove('active'));
    a.classList.add('active');
    loadSection(section);
  });
  sidebar.appendChild(a);
});

// Load first section by default
loadSection(Object.keys(skillData)[0]);
</script>

</body>
</html>
