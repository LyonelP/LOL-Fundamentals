<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub</title>

<script>
  if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
    window.location.replace('login.html');
  }
</script>

<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  background: url('https://64.media.tumblr.com/594ac290bec6d5e9ad98b5f53404f00b/245c4c3ee469f81d-e4/s1280x1920/1cda4284320eb2031758a9859dfe14ff8bbc50ba.jpg') no-repeat center center fixed;
  background-size: cover;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Overlay */
body::before {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(10,15,20,0.25);
  z-index: -1;
}

/* Header */
header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #c9aa71;
  padding: 20px;
  font-weight: bold;
  font-size: 26px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
  text-align: center;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 50;
}

/* Sidebar */
.sidebar {
  position: fixed;
  top: 62px;
  left: 0;
  width: 250px;
  height: calc(100vh - 62px);
  background: rgba(13,17,23,0.95);
  border-right: 2px solid #c9aa71;
  display: flex;
  flex-direction: column;
  padding-top: 20px;
  box-sizing: border-box;
  z-index: 10;
}

.sidebar a {
  color: #fff;
  text-decoration: none;
  padding: 15px 20px;
  border-left: 4px solid transparent;
  transition: all 0.3s;
  font-weight: bold;
  text-align: center;
}

.sidebar a:hover,
.sidebar a.active {
  background: rgba(201,170,113,0.2);
  border-left: 4px solid #c9aa71;
  color: #c9aa71;
}

/* Main content */
.main-content {
  padding: 100px 40px 50px 40px; /* top padding for header */
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 900px;
  margin: 0 auto; /* center content under header */
  position: relative;
}

/* Back button */
.back-button {
  display: inline-block;
  margin-bottom: 20px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Footer */
footer {
  text-align: center;
  padding: 15px;
  font-size: 14px;
  color: #fff;
  margin-top: auto;
}

/* Mobile adjustments */
@media(max-width: 700px){
  .sidebar {
    position: relative;
    width: 100%;
    height: auto;
    flex-direction: row;
    overflow-x: auto;
    border-right: none;
    border-bottom: 2px solid #c9aa71;
    top: 62px;
  }
  .sidebar a {
    flex: 1;
    text-align: center;
    border-left: none;
    border-bottom: 4px solid transparent;
    padding: 12px 10px;
  }
  .sidebar a.active,
  .sidebar a:hover {
    border-bottom: 4px solid #c9aa71;
  }
  .main-content {
    padding: 120px 20px 30px 20px;
    max-width: 100%;
  }
}
</style>
</head>
<body>

<header>LoL Fundamentals – Skills Hub</header>

<div class="sidebar" id="sidebar"></div>

<div class="main-content">
  <a href="membershub.html" class="back-button">Back to Members Hub</a>
  <div id="skills-container" class="skills-center"></div>
</div>

<footer>© 2025 LoL Fundamentals · All rights reserved</footer>

<script>
// Login requirement
if(localStorage.getItem('lolfundamentals_logged_in') !== 'true'){
  window.location.href = 'login.html';
}

// Skill data
const skillData = {
  "Pre Game": ["Champion Select","Mouse Accuracy","Summoner Spells","Matchups","Communication","Build"],
  "Early Game": ["Level 1","Farming","Trading","Wave Control","Back Timings","Build","Power Spikes","Pathing","Laning","Map Awareness","Ganking","Roaming"],
  "Mid Game": ["Teamwork","Split Pushing","Sieging","Baiting","Lane Assignments","Vision"],
  "Late Game": ["Damage","Target Selection","Tab Screen","Win Conditions","Rotations"],
  "Advanced": ["Animation Cancelling","Reading Players","Kiting","Positioning"],
  "Out of Game": ["Setup","Mindset","Not Raging/Blaming","Reaction Time","Meta"]
};

const sidebar = document.getElementById('sidebar');
const container = document.getElementById('skills-container');

// Remove the detailed skill cards, just show the section title
function loadSection(sectionName){
  container.innerHTML = `<h2>${sectionName}</h2>`;
}

// Sidebar links
Object.keys(skillData).forEach((section, i) => {
  const a = document.createElement('a');
  a.href = '#';
  a.textContent = section;
  if(i === 0) a.classList.add('active');
  a.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.sidebar a').forEach(link => link.classList.remove('active'));
    a.classList.add('active');
    loadSection(section);
  });
  sidebar.appendChild(a);
});

// Load first section by default
loadSection(Object.keys(skillData)[0]);
</script>

</body>
</html>
