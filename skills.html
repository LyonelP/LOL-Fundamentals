<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub</title>
<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  text-align: center;
  background: url('https://64.media.tumblr.com/594ac290bec6d5e9ad98b5f53404f00b/245c4c3ee469f81d-e4/s1280x1920/1cda4284320eb2031758a9859dfe14ff8bbc50ba.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* Header */
header {
  background: rgba(13,17,23,0.85);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 26px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 20px auto 10px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Skills grid */
.skills-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 18px;
  padding: 30px;
  max-width: 1300px;
  margin: 0 auto;
}

/* Skill card */
.skill-card {
  background: rgba(13,17,23,0.6);
  border: 2px solid #c9aa71;
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  color: #fff;
  transition: transform 0.25s, box-shadow 0.3s;
  cursor: pointer;
}
.skill-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 15px rgba(201,170,113,0.6);
}

.skill-card img {
  width: 40px;
  height: 40px;
  filter: brightness(0) invert(1);
  margin-bottom: 10px;
}

.skill-card h3 {
  margin: 0;
  font-size: 15px;
  color: #fff;
}

@media (max-width: 500px) {
  header { font-size: 22px; padding: 15px 5px; }
  .skills-container { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
}
</style>
</head>
<body>

<header>LoL Fundamentals – Skills Hub</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div class="skills-container" id="skills-container"></div>

<script>

  "Farming": "https://img.icons8.com/ios-filled/50/ffffff/wheat.png",
  "Positioning": "https://img.icons8.com/ios-filled/50/ffffff/compass.png",
  "Vision": "https://img.icons8.com/ios-filled/50/ffffff/eye.png",
  "Teamwork": "https://img.icons8.com/ios-filled/50/ffffff/group.png",
  "Pathing": "https://img.icons8.com/ios-filled/50/ffffff/route.png",
  "Trading": "https://img.icons8.com/ios-filled/50/ffffff/swords.png",
  "Wave Control": "https://img.icons8.com/ios-filled/50/ffffff/planning.png",
  "Power Spikes": "https://img.icons8.com/ios-filled/50/ffffff/bicep.png",

  "Kiting": "https://img.icons8.com/ios-filled/50/ffffff/moving-backwards.png",
  "Ganking": "https://img.icons8.com/ios-filled/50/ffffff/surprise.png",

  "Mid Game": "https://img.icons8.com/ios-filled/50/ffffff/noon.png",
  "Late Game": "https://img.icons8.com/ios-filled/50/ffffff/moon.png",
  "Champion Select": "https://img.icons8.com/ios-filled/50/ffffff/lobby.png",
  "Team Compositions": "https://img.icons8.com/ios-filled/50/ffffff/organization.png",
  "APM": "https://img.icons8.com/ios-filled/50/ffffff/speed.png",
  "Wave Clear": "https://img.icons8.com/ios-filled/50/ffffff/dead-enemy.png",

  "Not Raging/Blaming": "https://img.icons8.com/ios-filled/50/ffffff/peace.png"
};

const container = document.getElementById('skills-container');
for (const [name, icon] of Object.entries(skills)) {
  const card = document.createElement('div');
  card.className = 'skill-card';
  card.innerHTML = `<img src="${icon}" alt="${name} Icon"><h3>${name}</h3>`;
  container.appendChild(card);
}
</script>

</body>
</html>
