<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub</title>

<script>
  // Redirect if not logged in
  if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
    window.location.replace('login.html');
  }
</script>

<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  background: linear-gradient(to bottom, #0b0f16, #111827);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 28px 20px 20px;
  text-align: center;
  border-bottom: 4px solid #c9aa71; /* gold line */
}

header h1 {
  margin: 0;
  font-size: 28px;
  color: #c9aa71;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.container {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  padding: 30px 20px 60px;
  box-sizing: border-box;
}

/* Mastery Bar */
.mastery-wrap {
  margin-bottom: 30px;
}

.mastery-label {
  font-size: 14px;
  margin-bottom: 8px;
  opacity: 0.8;
}

.mastery-bar {
  width: 100%;
  height: 14px;
  background: #1f2937;
  border-radius: 30px;
  overflow: hidden;
}

.mastery-fill {
  height: 100%;
  width: 0%;
  background: #c9aa71; /* gold fill */
  transition: width 0.45s ease;
  border-radius: 30px;
}

/* Tabs */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 30px;
}

.tab {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid rgba(201,170,113,0.4);
  background: transparent;
  color: #c9aa71;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s ease;
}

.tab.active {
  background: #c9aa71;
  color: #000;
}

/* Skills Grid */
.skill-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  list-style: none;
  padding: 0;
  margin: 0;
}

@media (min-width: 900px) {
  .skill-list {
    grid-template-columns: 1fr 1fr;
  }
}

.skill-list li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111827;
  border: 1px solid rgba(201,170,113,0.2);
  border-radius: 12px;
  padding: 16px 20px;
  transition: 0.2s ease, box-shadow 0.3s;
  cursor: pointer;
}

.skill-list li:hover {
  border-color: rgba(201,170,113,0.6);
  transform: translateY(-2px);
}

.skill-name {
  text-decoration: none;
  color: #fff;
  font-size: 16px;
}

.checkmark {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid #c9aa71;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #c9aa71;
  font-size: 16px;
  transition: 0.2s ease, box-shadow 0.3s, transform 0.3s;
}

.checkmark.completed {
  background: #c9aa71;
  color: #000;
  box-shadow: 0 0 12px rgba(201,170,113,0.8);
  transform: scale(1.15);
}

footer {
  margin-top: auto;
  text-align: center;
  padding: 20px;
  font-size: 13px;
  opacity: 0.5;
}
</style>
</head>

<body>

<header>
  <h1>Skills Hub</h1>
</header>

<div class="container">

  <!-- Total Mastery -->
  <div class="mastery-wrap">
    <div class="mastery-label" id="masteryLabel">0% Total Mastery</div>
    <div class="mastery-bar">
      <div class="mastery-fill" id="masteryFill"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Skills -->
  <ul class="skill-list" id="skill-list"></ul>

</div>

<footer>© 2026 LoL Fundamentals</footer>

<script>
const skillData = {
  "Pre Game": ["Champion Select","Mouse Accuracy","Summoner Spells","Matchups","Communication","Build"],
  "Early Game": ["Level 1","Farming","Trading","Wave Control","Back Timings","Power Spikes","Pathing","Laning","Map Awareness","Ganking","Roaming"],
  "Mid Game": ["Teamwork","Split Pushing","Sieging","Baiting","Lane Assignments","Vision"],
  "Late Game": ["Damage","Target Selection","Tab Screen","Win Conditions","Rotations"],
  "Advanced": ["Animation Cancelling","Reading Players","Kiting","Positioning"],
  "Out of Game": ["Setup","Mindset","Not Raging/Blaming","Reaction Time","Meta"]
};

let skillProgress = JSON.parse(localStorage.getItem("skillProgress") || "{}");

Object.keys(skillData).forEach(section => {
  skillProgress[section] = skillProgress[section] || {};
  skillData[section].forEach(skill => skillProgress[section][skill] ??= false);
});

function saveProgress() {
  localStorage.setItem("skillProgress", JSON.stringify(skillProgress));
}

const masteryFill = document.getElementById("masteryFill");
const masteryLabel = document.getElementById("masteryLabel");
const skillList = document.getElementById("skill-list");
const tabs = document.getElementById("tabs");

function updateMastery() {
  let total = 0, done = 0;
  Object.values(skillProgress).forEach(section => {
    Object.values(section).forEach(value => {
      total++;
      if (value) done++;
    });
  });
  const pct = Math.round((done / total) * 100);
  masteryFill.style.width = pct + "%";
  masteryLabel.textContent = pct === 100
    ? "🏆 Fundamentals Mastered"
    : `${pct}% Total Mastery`;
}

function toggleCheck(section, skill, el) {
  skillProgress[section][skill] = !skillProgress[section][skill];
  saveProgress();
  el.classList.toggle("completed");
  el.innerHTML = el.classList.contains("completed") ? "✔" : "";
  updateMastery();
}

function renderSkills(section) {
  skillList.innerHTML = skillData[section].map(skill => {
    const completed = skillProgress[section][skill] ? "completed" : "";
    const link = skill.toLowerCase().replace(/[^a-z0-9]/g,'') + ".html";
    return `
      <li onclick="toggleCheck('${section}','${skill}', this.querySelector('.checkmark'))">
        <a class="skill-name" href="${link}" onclick="event.stopPropagation()">${skill}</a>
        <div class="checkmark ${completed}">
          ${completed ? "✔" : ""}
        </div>
      </li>
    `;
  }).join("");
}

tabs.innerHTML = Object.keys(skillData).map(section =>
  `<div class="tab" data-section="${section}">${section}</div>`
).join("");

tabs.addEventListener("click", e => {
  if (!e.target.classList.contains("tab")) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  e.target.classList.add("active");
  const section = e.target.dataset.section;
  localStorage.setItem("lastSection", section);
  renderSkills(section);
});

const lastSection = localStorage.getItem("lastSection") || "Pre Game";
renderSkills(lastSection);
document.querySelector(`[data-section="${lastSection}"]`).classList.add("active");
updateMastery();
</script>

</body>
</html>
