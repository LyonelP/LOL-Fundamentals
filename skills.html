<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub</title>
<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  text-align: center;
  background: url('https://64.media.tumblr.com/594ac290bec6d5e9ad98b5f53404f00b/245c4c3ee469f81d-e4/s1280x1920/1cda4284320eb2031758a9859dfe14ff8bbc50ba.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* Header */
header {
  background: rgba(13,17,23,0.95);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 28px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
  text-shadow: 0 0 5px #000;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 20px auto 10px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Phase container */
.phase-container {
  width: 90%;
  max-width: 700px;
  margin: 30px auto 60px;
  text-align: left;
}

/* Phase buttons */
.phase-btn {
  width: 100%;
  background: rgba(201,170,113,0.85);
  border: none;
  padding: 15px 25px;
  font-size: 18px;
  font-weight: bold;
  color: #000;
  border-radius: 12px;
  cursor: pointer;
  margin-bottom: 5px;
  transition: 0.3s;
}
.phase-btn:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
  transform: translateY(-2px);
}

/* Skills container */
.skills-container {
  display: none; /* hidden by default */
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 10px 20px 20px 20px;
  margin-bottom: 15px;
  border-left: 2px solid #c9aa71; /* indentation line */
  border-radius: 0 8px 8px 0;
}

/* Skill cards */
.skill-card {
  display: inline-block;
  background: rgba(13,17,23,0.85);
  border: 2px solid #c9aa71;
  border-radius: 10px;
  padding: 10px 15px;
  color: #fff;
  font-size: 14px;
  text-decoration: none;
  cursor: pointer;
  transition: 0.25s;
  box-shadow: 0 0 8px rgba(201,170,113,0.3);
}
.skill-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 15px rgba(201,170,113,0.7);
  color: #f9d949;
}

/* Footer */
footer {
  text-align: center;
  padding: 15px 10px;
  font-size: 14px;
  color: #8b949e;
  margin-top: 20px;
}

/* Responsive tweaks */
@media(max-width:600px){
  .phase-container { width: 95%; }
  .phase-btn { font-size: 16px; padding: 12px 18px; }
  .skills-container { gap: 10px; padding-left: 15px; }
}
</style>
</head>

<body>
<header>LoL Fundamentals – Skills Hub</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div class="phase-container" id="phase-container"></div>

<footer>© 2025 LoL Fundamentals · All rights reserved</footer>

<script>
// Skills by phase
const skillCategories = {
  "Pre Game": ["Champion Select","Mouse Accuracy","Summoner Spells","Matchups"],
  "Early Game": ["Farming","Positioning","Trading","Wave Control","Back Timings","Power Spikes","Pathing","Laning","Map Awareness","Kiting"],
  "Mid Game": ["Roaming","Vision","Teamwork","Ganking","Split Pushing","Sieging","Baiting","Reaction Time","Mid Game"],
  "Late Game": ["Late Game","Damage","Target Selection","Tab Screen","Lane Assignments","Early Game"],
  "Advanced": ["Animation Cancelling","Reading Players","Win Conditions"],
  "Out of Game": ["Setup","Mindset","Not Raging/Blaming","Communication"]
};

// Build dropdowns
const phaseContainer = document.getElementById('phase-container');

for (const [phase, skills] of Object.entries(skillCategories)) {
  const btn = document.createElement('button');
  btn.className = 'phase-btn';
  btn.textContent = phase;

  const skillsDiv = document.createElement('div');
  skillsDiv.className = 'skills-container';

  skills.forEach(skill => {
    const card = document.createElement('a');
    card.className = 'skill-card';
    card.textContent = skill;
    card.href = skill.toLowerCase().replace(/[^a-z0-9]/g,'') + '.html';
    skillsDiv.appendChild(card);
  });

  btn.addEventListener('click', () => {
    skillsDiv.style.display = skillsDiv.style.display === 'flex' ? 'none' : 'flex';
  });

  phaseContainer.appendChild(btn);
  phaseContainer.appendChild(skillsDiv);
}
</script>
</body>
</html>
