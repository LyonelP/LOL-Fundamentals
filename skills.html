<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub</title>
<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  text-align: center;
  background: url('https://64.media.tumblr.com/594ac290bec6d5e9ad98b5f53404f00b/245c4c3ee469f81d-e4/s1280x1920/1cda4284320eb2031758a9859dfe14ff8bbc50ba.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* Header */
header {
  background: rgba(13,17,23,0.95);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 28px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
  text-shadow: 0 0 5px #000;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 20px auto 10px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #f9d949, #ffe47a);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Phase buttons area */
.phase-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin: 40px 20px 20px;
  gap: 20px;
  padding: 25px;
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
}

/* Phase buttons */
.phase-btn {
  background: rgba(201,170,113,0.85);
  border: none;
  padding: 15px 25px;
  font-size: 18px;
  font-weight: bold;
  color: #000;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}
.phase-btn:hover, .phase-btn.active {
  background: #f9d949; /* gold hover */
  transform: translateY(-3px);
}

/* Skills grid */
#skills-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 20px;
  max-width: 1400px;
  margin: 20px auto 60px;
}

.skill-card {
  background: rgba(13,17,23,0.85);
  border: 2px solid #c9aa71;
  border-radius: 10px;
  padding: 20px 15px;
  text-align: center;
  color: #fff;
  font-size: 15px;
  text-decoration: none;
  cursor: pointer;
  transition: 0.25s;
  box-shadow: 0 0 8px rgba(201,170,113,0.3);
}
.skill-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 20px rgba(201,170,113,0.7);
  color: #f9d949;
}

/* Footer */
footer {
  text-align: center;
  padding: 15px 10px;
  font-size: 14px;
  color: #8b949e;
  margin-top: 20px;
}

@media(max-width:500px){
  header{ font-size:24px; padding:15px 5px; }
  .phase-btn{ font-size:16px; padding:12px 18px; }
  #skills-container{ grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
}
</style>
</head>

<body>
<header>LoL Fundamentals – Skills Hub</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div class="phase-buttons">
  <button class="phase-btn" data-phase="pre-skills">Pre Game</button>
  <button class="phase-btn" data-phase="early-skills">Early Game</button>
  <button class="phase-btn" data-phase="mid-skills">Mid Game</button>
  <button class="phase-btn" data-phase="late-skills">Late Game</button>
  <button class="phase-btn" data-phase="advanced-skills">Advanced</button>
  <button class="phase-btn" data-phase="out-skills">Out of Game</button>
</div>

<div id="skills-container"></div>

<script>
// Full original skill list
const skillCategories = {
  "pre-skills": ["Champion Select","Mouse Accuracy","Summoner Spells","Matchups"],
  "early-skills": ["Farming","Positioning","Trading","Wave Control","Back Timings","Power Spikes","Pathing","Laning","Map Awareness","Kiting"],
  "mid-skills": ["Roaming","Vision","Teamwork","Ganking","Split Pushing","Sieging","Baiting","Reaction Time","Mid Game"],
  "late-skills": ["Late Game","Damage","Target Selection","Tab Screen","Lane Assignments","Early Game"],
  "advanced-skills": ["Animation Cancelling","Reading Players","Win Conditions"],
  "out-skills": ["Setup","Mindset","Not Raging/Blaming","Communication"]
};

// Render skills for selected phase
const container = document.getElementById('skills-container');
function showSkills(phase) {
  container.innerHTML = "";
  // Highlight active button
  document.querySelectorAll('.phase-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.phase-btn[data-phase="${phase}"]`).classList.add('active');

  skillCategories[phase].forEach(skill => {
    const card = document.createElement('a');
    card.className = 'skill-card';
    card.textContent = skill;
    card.href = skill.toLowerCase().replace(/[^a-z0-9]/g,'') + '.html';
    container.appendChild(card);
  });
}

// Click events
document.querySelectorAll('.phase-btn').forEach(btn => {
  btn.addEventListener('click', () => showSkills(btn.dataset.phase));
});

// Optional: load Pre Game by default
showSkills("pre-skills");
</script>

<footer>© 2025 LoL Fundamentals · All rights reserved</footer>
</body>
</html>
