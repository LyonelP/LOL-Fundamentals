<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub</title>

<script>
  if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
    window.location.replace('login.html');
  }
</script>

<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  text-align: center;
  background: url('https://64.media.tumblr.com/594ac290bec6d5e9ad98b5f53404f00b/245c4c3ee469f81d-e4/s1280x1920/1cda4284320eb2031758a9859dfe14ff8bbc50ba.jpg') no-repeat center center fixed;
  background-size: cover;
}

header {
  background: rgba(13,17,23,0.95);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 28px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
  text-shadow: 0 0 5px #000;
}

.back-button {
  display: inline-block;
  margin: 20px auto 10px;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

.skill-section {
  padding: 25px 15px;
  max-width: 1300px;
  margin: 40px auto;
  text-align: center;
}
.skill-section h2 {
  color: #c9aa71;
  font-size: 26px;
  margin-bottom: 20px;
  border-bottom: 2px solid #c9aa71;
  display: inline-block;
  padding-bottom: 5px;
  text-shadow: 0 0 5px #000;
}

.skills-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  margin-top: 15px;
  justify-content: center;
}

.skill-card {
  background: rgba(13,17,23,0.85);
  border: 2px solid #c9aa71;
  border-radius: 8px;
  padding: 20px 10px;
  text-align: center;
  color: #fff;
  transition: transform 0.25s, box-shadow 0.3s;
  cursor: pointer;
  font-size: 14px;
  text-decoration: none;
  display: block;
}
.skill-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 15px rgba(201,170,113,0.6);
  color: #f9d949;
}

footer {
  text-align: center;
  padding: 15px 10px;
  font-size: 14px;
  color: #8b949e;
  margin-top: 20px;
}

@media (max-width: 500px) {
  header { font-size: 24px; padding: 15px 5px; }
  .skills-container { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
}
</style>
</head>

<body>

<header>LoL Fundamentals – Skills Hub</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div class="skill-section">
  <h2>Pre Game</h2>
  <div class="skills-container" id="pre-skills"></div>
</div>

<div class="skill-section">
  <h2>Early Game</h2>
  <div class="skills-container" id="early-skills"></div>
</div>

<div class="skill-section">
  <h2>Mid Game</h2>
  <div class="skills-container" id="mid-skills"></div>
</div>

<div class="skill-section">
  <h2>Late Game</h2>
  <div class="skills-container" id="late-skills"></div>
</div>

<div class="skill-section">
  <h2>Advanced</h2>
  <div class="skills-container" id="advanced-skills"></div>
</div>

<div class="skill-section">
  <h2>Out of Game</h2>
  <div class="skills-container" id="out-skills"></div>
</div>

<script>
// All original skills categorized properly
const skillCategories = {
  "pre-skills": ["Champion Select", "Mouse Accuracy", "Summoner Spells"],
  "early-skills": ["Farming", "Positioning", "Trading", "Wave Control", "Back Timings", "Power Spikes", "Pathing", "Laning", "Map Awareness"],
  "mid-skills": ["Roaming", "Vision", "Teamwork", "Ganking", "Split Pushing", "Sieging", "Baiting", "Reaction Time", "Mid Game"],
  "late-skills": ["Late Game", "Damage", "Target Selection", "Tab Screen", "Lane Assignments"],
  "advanced-skills": ["Animation Cancelling", "Reading Players", "Win Conditions"],
  "out-skills": ["Setup", "Mindset", "Not Raging/Blaming", "Communication"]
};

// Render skills
for (const [categoryId, skills] of Object.entries(skillCategories)) {
  const container = document.getElementById(categoryId);
  skills.forEach(skill => {
    const link = document.createElement('a');
    link.className = 'skill-card';
    const fileName = skill.toLowerCase().replace(/[^a-z0-9]/g, '');
    link.href = fileName + '.html';
    link.textContent = skill;
    container.appendChild(link);
  });
}
</script>

<footer>© 2025 LoL Fundamentals · All rights reserved</footer>

</body>
</html>
