<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub</title>
<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  text-align: center;
  background: url('https://64.media.tumblr.com/594ac290bec6d5e9ad98b5f53404f00b/245c4c3ee469f81d-e4/s1280x1920/1cda4284320eb2031758a9859dfe14ff8bbc50ba.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* Header */
header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 28px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 20px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Section cards */
.section {
  width: 80%;
  max-width: 600px;
  margin: 20px auto;
  text-align: left;
}

.section-header {
  background: rgba(0,0,0,0.85);
  border: 2px solid #c9aa71;
  border-radius: 12px;
  padding: 18px 20px;
  font-size: 20px;
  font-weight: bold;
  color: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: transform 0.25s, box-shadow 0.3s, background 0.3s;
  position: relative;
}

.section-header .description {
  font-size: 14px;
  font-weight: normal;
  color: #f0d88b; /* GOLD */
  margin-left: 10px;
}

.section-header::after {
  content: "➤";
  font-size: 18px;
  color: #fff; /* WHITE ARROW */
  transition: transform 0.3s;
}

.section-header.active::after {
  transform: rotate(90deg);
}

/* Hover effect for section headers and skills */
.hover-effect {
  background: rgba(0,0,0,0.95) !important;
  box-shadow: 0 0 15px rgba(255,215,0,0.7);
  transform: scale(1.02);
}

/* Skills list */
.skills-list {
  display: none;
  margin-top: 8px;
}

.skill-link {
  display: block;
  background: rgba(0,0,0,0.85);
  border: 2px solid #c9aa71;
  border-radius: 10px;
  padding: 12px 15px;
  margin-bottom: 8px;
  font-size: 16px;
  color: #fff;
  text-decoration: none;
  transition: transform 0.25s, box-shadow 0.3s, background 0.3s;
}

.skill-link:hover {
  background: rgba(0,0,0,0.95);
  box-shadow: 0 0 15px rgba(255,215,0,0.7);
  transform: scale(1.02);
  color: #fff;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  font-size: 14px;
  color: #bbb;
}

/* Mobile adjustments */
@media(max-width: 500px){
  .section {
    max-width: 95%;
  }
  .section-header {
    font-size: 18px;
    padding: 15px;
    flex-direction: column;
    align-items: flex-start;
  }
  .section-header .description {
    display: block;
    margin-left: 0;
    margin-top: 5px;
  }
  .skill-link {
    font-size: 15px;
    padding: 10px 12px;
  }
}
</style>
</head>
<body>

<header>LoL Fundamentals – Skills Hub</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div id="sections"></div>

<footer>© 2025 LoL Fundamentals · All rights reserved</footer>

<script>
// Login requirement
if(localStorage.getItem('lolfundamentals_logged_in') !== 'true'){
  window.location.href = 'login.html';
}

const skillData = {
  "Pre Game": { desc: "Skills to focus on before the game starts", skills: ["Champion Select","Mouse Accuracy","Summoner Spells","Matchups","Communication","Build"] },
  "Early Game": { desc: "First 14 minutes of the game", skills: ["Level 1","Farming","Trading","Wave Control","Back Timings","Build","Power Spikes","Pathing","Laning","Map Awareness","Ganking","Roaming"] },
  "Mid Game": { desc: "14-25 minutes of the game", skills: ["Teamwork","Split Pushing","Sieging","Baiting","Lane Assignments","Vision"] },
  "Late Game": { desc: "25 minutes onward", skills: ["Damage","Target Selection","Tab Screen","Win Conditions","Rotations"] },
  "Advanced": { desc: "High level skills", skills: ["Animation Cancelling","Reading Players","Kiting","Positioning"] },
  "Out of Game": { desc: "Skills to focus on when not playing", skills: ["Setup","Mindset","Not Raging/Blaming","Reaction Time","Meta"] }
};

const container = document.getElementById('sections');

Object.entries(skillData).forEach(([section, data]) => {
  const wrapper = document.createElement('div');
  wrapper.className = 'section';

  const header = document.createElement('div');
  header.className = 'section-header';

  const title = document.createElement('span');
  title.textContent = section;

  const desc = document.createElement('span');
  desc.className = 'description';
  desc.textContent = data.desc;

  header.appendChild(title);
  header.appendChild(desc);

  // Hover effect for section header
  header.addEventListener('mouseover', () => header.classList.add('hover-effect'));
  header.addEventListener('mouseout', () => header.classList.remove('hover-effect'));

  const list = document.createElement('div');
  list.className = 'skills-list';

  data.skills.forEach(skill => {
    const a = document.createElement('a');
    a.className = 'skill-link';
    a.textContent = skill;
    a.href = skill.toLowerCase().replace(/[^a-z0-9]/g, '') + '.html';
    list.appendChild(a);
  });

  header.addEventListener('click', () => {
    const isActive = header.classList.contains('active');
    document.querySelectorAll('.section-header').forEach(h => h.classList.remove('active'));
    document.querySelectorAll('.skills-list').forEach(l => l.style.display = 'none');

    if(!isActive){
      header.classList.add('active');
      list.style.display = 'block';
    }
  });

  wrapper.appendChild(header);
  wrapper.appendChild(list);
  container.appendChild(wrapper);
});
</script>

</body>
</html>
