<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub</title>

<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  text-align: center;
  background: url('https://64.media.tumblr.com/594ac290bec6d5e9ad98b5f53404f00b/245c4c3ee469f81d-e4/s1280x1920/1cda4284320eb2031758a9859dfe14ff8bbc50ba.jpg') 
    no-repeat center center fixed;
  background-size: cover;
}

/* Header */
header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #c9aa71;
  padding: 20px 10px;
  font-weight: bold;
  font-size: 28px;
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
}

/* Back button */
.back-button {
  display: inline-block;
  margin: 20px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.7);
}

/* Dropdown sections */
.section {
  width: 90%;
  max-width: 800px;
  margin: 0 auto 20px;
  text-align: left;
}

.section-header {
  width: 100%;
  background: rgba(201,170,113,0.85);
  border: 2px solid #c9aa71;
  padding: 15px 20px;
  font-size: 20px;
  font-weight: bold;
  color: #000;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}
.section-header:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 12px rgba(255,215,0,0.7);
  transform: translateY(-2px);
}

/* Skills list */
.skills-list {
  display: none;
  background: rgba(13,17,23,0.85);
  border-left: 2px solid #c9aa71;
  border-bottom: 2px solid #c9aa71;
  border-right: 2px solid #c9aa71;
  border-radius: 0 0 10px 10px;
  padding: 15px 20px;
  margin-top: -3px;
}

.skill-link {
  display: block;
  background: rgba(13,17,23,0.7);
  padding: 10px 12px;
  border: 2px solid #c9aa71;
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 16px;
  color: #fff;
  text-decoration: none;
  transition: 0.25s;
}
.skill-link:hover {
  background: rgba(13,17,23,0.95);
  transform: translateY(-2px);
  box-shadow: 0 0 15px rgba(201,170,113,0.7);
  color: #f9d949;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  font-size: 14px;
  color: #bbb;
}
</style>
</head>

<body>

<header>LoL Fundamentals – Skills Hub</header>
<a href="membershub.html" class="back-button">Back to Members Hub</a>

<div id="sections"></div>

<footer>© 2025 LoL Fundamentals · All rights reserved</footer>

<script>
const skillData = {
  "Pre Game": [
    "Champion Select","Mouse Accuracy","Summoner Spells","Matchups"
  ],
  "Early Game": [
    "Farming","Positioning","Trading","Wave Control","Back Timings",
    "Power Spikes","Pathing","Laning","Map Awareness","Kiting"
  ],
  "Mid Game": [
    "Roaming","Vision","Teamwork","Ganking","Split Pushing","Sieging",
    "Baiting","Reaction Time"
  ],
  "Late Game": [
    "Damage","Target Selection","Tab Screen","Lane Assignments"
  ],
  "Advanced": [
    "Animation Cancelling","Reading Players","Win Conditions"
  ],
  "Out of Game": [
    "Setup","Mindset","Not Raging/Blaming","Communication"
  ]
};

const container = document.getElementById('sections');

Object.entries(skillData).forEach(([section, skills]) => {
  const wrapper = document.createElement('div');
  wrapper.className = 'section';

  const header = document.createElement('div');
  header.className = 'section-header';
  header.textContent = section;

  const list = document.createElement('div');
  list.className = 'skills-list';

  skills.forEach(skill => {
    const a = document.createElement('a');
    a.className = 'skill-link';
    a.textContent = skill;
    a.href = skill.toLowerCase().replace(/[^a-z0-9]/g, '') + '.html';
    list.appendChild(a);
  });

  header.addEventListener('click', () => {
    list.style.display = list.style.display === 'block' ? 'none' : 'block';
  });

  wrapper.appendChild(header);
  wrapper.appendChild(list);
  container.appendChild(wrapper);
});
</script>

</body>
</html>
