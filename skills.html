<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Fundamentals – Skills Hub</title>

<!-- Login check -->
<script>
  if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
    window.location.replace('login.html');
  }
</script>

<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  background: url('https://64.media.tumblr.com/594ac290bec6d5e9ad98b5f53404f00b/245c4c3ee469f81d-e4/s1280x1920/1cda4284320eb2031758dfe14ff8bbc50ba.jpg') no-repeat center center fixed;
  background-size: cover;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* Overlay for readability */
body::before {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(10,15,20,0.25);
  z-index: -1;
}

/* Header */
header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #c9aa71;
  padding: 20px;
  font-weight: bold;
  font-size: 26px; /* Champion Select size */
  text-transform: uppercase;
  color: #c9aa71;
  letter-spacing: 1px;
  text-align: center;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 50;
}

/* Sidebar */
.sidebar {
  position: fixed;
  top: 62px; /* just below header */
  left: 0;
  width: 250px;
  height: calc(100vh - 62px);
  background: rgba(13,17,23,0.95);
  border-right: 2px solid #c9aa71;
  display: flex;
  flex-direction: column;
  padding-top: 20px;
  box-sizing: border-box;
  z-index: 10;
}

.sidebar a {
  color: #fff;
  text-decoration: none;
  padding: 15px 20px;
  border-left: 4px solid transparent;
  transition: all 0.3s;
  font-weight: bold;
  text-align: center;
}

.sidebar a:hover,
.sidebar a.active {
  background: rgba(201,170,113,0.2);
  border-left: 4px solid #c9aa71;
  color: #c9aa71;
}

/* Main content */
.main-content {
  padding: 100px 40px 50px 40px; /* leave space for header */
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 900px;
  margin-left: 250px; /* leave space for sidebar */
  position: relative;
}

/* Back button */
.back-button {
  display: inline-block;
  margin-bottom: 20px;
  padding: 18px 30px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 18px;
  transition: all 0.3s;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }
.back-button:hover {
  background: linear-gradient(135deg, #e6c97f, #f0d88b);
  box-shadow: 0 0 15px rgba(255,215,0,0.8);
}

/* Footer */
footer {
  text-align: center;
  padding: 15px;
  font-size: 14px;
  color: #fff;
  margin-top: auto;
}

/* Mobile adjustments */
@media(max-width: 700px){
  .sidebar {
    position: relative;
    width: 100%;
    height: auto;
    flex-direction: row;
    overflow-x: auto;
    border-right: none;
    border-bottom: 2px solid #c9aa71;
    top: 62px;
  }
  .sidebar a {
    flex: 1;
    text-align: center;
    border-left: none;
    border-bottom: 4px solid transparent;
    padding: 12px 10px;
  }
  .sidebar a.active,
  .sidebar a:hover {
    border-bottom: 4px solid #c9aa71;
  }
  .main-content {
    margin-left: 0;
    padding: 120px 20px 30px 20px;
    max-width: 100%;
  }
  .back-button {
    padding: 14px 24px;
    font-size: 16px;
  }
}
</style>
</head>
<body>

<header>LoL Fundamentals – Skills Hub</header>

<div class="sidebar" id="sidebar"></div>

<div class="main-content">
  <a href="membershub.html" class="back-button">Back to Members Hub</a>
  <!-- Skills section intentionally left empty -->
</div>

<footer>© 2025 LoL Fundamentals · All rights reserved</footer>

<script>
// Login requirement
if(localStorage.getItem('lolfundamentals_logged_in') !== 'true'){
  window.location.href = 'login.html';
}

// Sidebar links
const skillSections = ["Pre Game","Early Game","Mid Game","Late Game","Advanced","Out of Game"];
const sidebar = document.getElementById('sidebar');

skillSections.forEach(section => {
  const a = document.createElement('a');
  a.href = "#";
  a.textContent = section;
  a.addEventListener('click', (e) => {
    e.preventDefault();
    alert("Section clicked: " + section); // placeholder for future content
  });
  sidebar.appendChild(a);
});
</script>

</body>
</html>
