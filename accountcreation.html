<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LoL Fundamentals – Account Creation</title>
<style>
body {
margin: 0;
font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
background: #0a0f14;
color: #e6edf3;
line-height: 1.6;
}

/* Header */
header {
background: linear-gradient(90deg, #0a0f14, #1b2838);
border-bottom: 2px solid #c9aa71;
padding: 15px 20px;
text-align: center;
font-weight: bold;
font-size: 22px;
letter-spacing: 1px;
text-transform: uppercase;
color: #c9aa71;
}

/* Account Creation Form */
#accountSection {
max-width: 400px;
margin: 80px auto;
text-align: center;
background: #161b22;
border: 1px solid #2f81f7;
padding: 30px;
border-radius: 8px;
box-shadow: 0 0 10px rgba(47,129,247,0.2);
}
#accountSection h2 {
color: #c9aa71;
margin-bottom: 20px;
}
input, button {
padding: 12px;
margin: 10px 0;
border-radius: 4px;
border: none;
}
input {
width: 80%;
text-align: center;
}
button {
width: 85%;
background: #2f81f7;
color: white;
font-weight: bold;
cursor: pointer;
}
button:hover {
background: #4795ff;
}
.message {
margin-top: 10px;
font-size: 0.95em;
}
footer {
text-align: center;
padding: 30px;
color: #8b949e;
font-size: 14px;
background: #0a0f14;
border-top: 1px solid #1f2937;
}
footer a {
color: #c9aa71;
text-decoration: none;
}
footer a:hover {
text-decoration: underline;
}
</style>
</head>
<body>

<header>LoL Fundamentals</header>

<section id="accountSection">
<h2>Create Your Member Account</h2>
<p>Thank you for your payment! Please create your account to access exclusive content.</p>
<input type="email" id="createEmail" placeholder="Enter your email" />
<input type="password" id="createPassword" placeholder="Choose a password" />
<button onclick="createAccount()">Create Account</button>
<p class="message" id="createMsg"></p>
</section>

<footer>
© 2025 LoL Fundamentals · Contact:
<a href="mailto:arcsecond@lolfundamentals.com">arcsecond@lolfundamentals.com</a>
</footer>

<script>
function createAccount() {
const email = document.getElementById('createEmail').value.trim();
const password = document.getElementById('createPassword').value.trim();
const msg = document.getElementById('createMsg');

if(!email || !password){
msg.style.color = 'red';
msg.textContent = "Please fill in both fields.";
return;
}

// Simple manual account storage using localStorage
let users = JSON.parse(localStorage.getItem('users') || '{}');

if(users[email]){
msg.style.color = 'red';
msg.textContent = "This email is already registered. Try logging in.";
} else {
users[email] = { password: password, active: true };
localStorage.setItem('users', JSON.stringify(users));
msg.style.color = 'green';
msg.textContent = "Account created! You can now log in.";
document.getElementById('createEmail').value = '';
document.getElementById('createPassword').value = '';
}
}
</script>

</body>
</html>
