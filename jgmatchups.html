<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Damage Ekko – Matchup Hub</title>

<script>
if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
  window.location.replace('login.html');
}
</script>

<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;

  /* CLEAN Diana-style overlay */
  background:
    linear-gradient(rgba(10,15,20,0.25), rgba(10,15,20,0.25)),
    url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_TrueDamage.jpg')
    no-repeat center top;
  background-size: cover;
  background-attachment: fixed;
}

header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #c9aa71;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  text-transform: uppercase;
  color: #c9aa71;
  text-align: center;
}

.back-button {
  margin: 20px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  box-shadow: 0 0 10px rgba(201,170,113,0.5);
}
.back-button::before { content: "← "; }

#champion-search {
  width: 400px;
  max-width: 90%;
  margin: 20px auto 30px;
  padding: 8px 12px;
  border-radius: 6px;
  border: 2px solid #c9aa71;
  background: #161b22;
  color: #e6edf3;
}

.champion-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto 50px;
  padding: 0 20px;
}

.champion-card {
  background: linear-gradient(135deg, #161b22, #21262d);
  border-radius: 12px;
  border-left: 6px solid #c9aa71;
  padding: 15px;
  text-align: center;
  text-decoration: none;
  color: inherit;
  transition: transform .25s, box-shadow .25s;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.champion-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 25px rgba(0,0,0,.45);
}

.champion-card img {
  width: 80px;
  height: 80px;
  border-radius: 8px;
}

.champion-name {
  margin-top: 8px;
  font-size: 14px;
  color: #c9aa71;
  font-weight: bold;
}

footer {
  margin-top: auto;
  padding: 25px;
  text-align: center;
  font-size: 14px;
  color: #8b949e;
}
</style>
</head>

<body>

<header>True Damage Ekko Matchups</header>

<a href="membershub.html" class="back-button">Back to Members Hub</a>

<input id="champion-search" placeholder="Search junglers...">

<div class="champion-grid" id="champion-grid">

<a href="jgdiana.html" class="champion-card">
  <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Diana.png">
  <div class="champion-name">Diana</div>
</a>

<a href="jgzed.html" class="champion-card">
  <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Zed.png">
  <div class="champion-name">Zed</div>
</a>

<a href="jgevelynn.html" class="champion-card">
  <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Evelynn.png">
  <div class="champion-name">Evelynn</div>
</a>

<a href="jgkha-zix.html" class="champion-card">
  <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Khazix.png">
  <div class="champion-name">Kha'Zix</div>
</a>

<a href="jgekko.html" class="champion-card">
  <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Ekko.png">
  <div class="champion-name">Ekko</div>
</a>

</div>

<footer>© 2026 LoL Fundamentals</footer>

<script>
const input = document.getElementById('champion-search');
const grid = document.getElementById('champion-grid');
const cards = [...grid.getElementsByClassName('champion-card')];

input.addEventListener('input', () => {
  const q = input.value.toLowerCase().trim();

  const matching = [];
  cards.forEach(card => {
    const name = card.querySelector('.champion-name').textContent.toLowerCase();
    if (name.includes(q)) {
      card.style.display = 'flex';
      matching.push(card);
    } else {
      card.style.display = 'none';
    }
  });

  matching.forEach(card => grid.appendChild(card));
});
</script>

</body>
</html>
