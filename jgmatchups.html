<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;

  /* TRUE DAMAGE EKKO FIXED SPLASH */
  background:
    radial-gradient(circle at top, rgba(0,255,213,0.10), transparent 60%),
    linear-gradient(rgba(5,8,12,0.55), rgba(5,8,12,0.88)),
    url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_5.jpg') no-repeat center top;

  background-size: cover;
  background-attachment: fixed;
}

header {
  background: rgba(10,12,18,0.92);
  border-bottom: 2px solid #00ffd5;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  text-transform: uppercase;

  color: transparent;
  background-image: linear-gradient(90deg, #00ffd5, #7c3aed, #00bfa5);
  -webkit-background-clip: text;
  background-clip: text;

  text-align: center;
  letter-spacing: 1px;
}

.back-button {
  margin: 20px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, #00ffd5, #00bfa5);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  box-shadow: 0 0 10px rgba(0,255,213,0.5);
}
.back-button::before { content: "← "; }

#champion-search {
  width: 400px;
  max-width: 90%;
  margin: 20px auto 30px;
  padding: 8px 12px;
  border-radius: 6px;
  border: 2px solid #00ffd5;
  background: #161b22;
  color: #e6edf3;
}

.champion-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto 50px;
  padding: 0 20px;
}

.champion-card {
  background: linear-gradient(135deg, #161b22, #21262d);
  border-radius: 12px;
  border-left: 6px solid #00ffd5;
  padding: 15px;
  text-align: center;
  text-decoration: none;
  color: inherit;
  transition: transform .25s, box-shadow .25s;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.champion-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 25px rgba(0,0,0,.45);
}

.champion-card img {
  width: 80px;
  height: 80px;
  border-radius: 8px;
}

.champion-name {
  margin-top: 8px;
  font-size: 14px;
  color: #00ffd5;
  font-weight: bold;
}

footer {
  margin-top: auto;
  padding: 25px;
  text-align: center;
  font-size: 14px;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCFRcEV7wdivqONnkjJubAZOjPMixrHMBI",
  authDomain: "lol-fundamentals.firebaseapp.com",
  projectId: "lol-fundamentals",
  storageBucket: "lol-fundamentals.firebasestorage.app",
  messagingSenderId: "1038440427584",
  appId: "1:1038440427584:web:a82207151fd370dbedefa5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function redirect() {
  localStorage.removeItem('lolfundamentals_logged_in');
  localStorage.removeItem('lolfundamentals_paid');
  window.location.href = 'login.html';
}

onAuthStateChanged(auth, async (user) => {
  if (!user) return redirect();

  const snap = await getDoc(doc(db, "paidUsers", user.email));

  if (!snap.exists() || !snap.data().paid) return redirect();

  localStorage.setItem('lolfundamentals_logged_in', 'true');
  localStorage.setItem('lolfundamentals_paid', 'true');
});
</script>
