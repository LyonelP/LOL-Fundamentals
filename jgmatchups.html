#champion-search {

.champion-grid {

  margin: 0 auto 50px;
  padding: 0 20px;
}

/* CARD */
.champion-card {
  background: linear-gradient(135deg, #0b0f14, #141824);

  border-left: 5px solid #00f5ff;
  padding: 15px;
  text-align: center;
  text-decoration: none;
  color: inherit;
  transition: 0.2s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.champion-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 20px rgba(255,61,242,0.25);
  border-left: 5px solid #ff3df2;
}

.champion-card img {
  width: 80px;
  height: 80px;
  border-radius: 8px;
}

.champion-name {

  font-size: 14px;
  color: #00f5ff;
  font-weight: bold;
}

/* SIMPLE FOOTER (TEXT ONLY, NO BOX) */
