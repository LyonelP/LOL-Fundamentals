<style>
body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;

  background: linear-gradient(rgba(10,15,20,0.25), rgba(10,15,20,0.25)),

  background-attachment: fixed;

header {
  background: rgba(13,17,23,0.9);
  border-bottom: 2px solid #00ffd5;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  text-transform: uppercase;
  color: #00ffd5;
  text-align: center;
}

.back-button {
  margin: 20px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, #00ffd5, #00bfa5);
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  box-shadow: 0 0 10px rgba(0,255,213,0.5);
}
.back-button::before { content: "← "; }

#champion-search {
  width: 400px;
  max-width: 90%;
  margin: 20px auto 30px;
  padding: 8px 12px;
  border-radius: 6px;
  border: 2px solid #00ffd5;
  background: #161b22;
  color: #e6edf3;
}

.champion-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 20px;
  max-width: 1000px;
  margin: 0 auto 50px;
  padding: 0 20px;
}

.champion-card {
  background: linear-gradient(135deg, #161b22, #21262d);
  border-radius: 12px;
  border-left: 6px solid #00ffd5;
  padding: 15px;
  text-align: center;
  text-decoration: none;
  color: inherit;
  transition: transform .25s, box-shadow .25s;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.champion-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 25px rgba(0,0,0,.45);
}

.champion-card img {
  width: 80px;
  height: 80px;
  border-radius: 8px;
}

.champion-name {
  margin-top: 8px;
  font-size: 16px;
  color: #00ffd5;
  font-weight: bold;
}

.champion-tag {
  margin-top: 6px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: #000;
  background: linear-gradient(135deg, #c9aa71, #e0c77b);
  border-radius: 999px;
  padding: 4px 10px;
}

footer {
  margin-top: auto;
  padding: 25px;
  text-align: center;
  font-size: 14px;
}
</style>

<script>
const input = document.getElementById('champion-search');
const grid = document.getElementById('champion-grid');
const cards = [...grid.getElementsByClassName('champion-card')];

input.addEventListener('input', () => {
  const q = input.value.toLowerCase().trim();

  const matching = [];
  cards.forEach(card => {
    const name = card.querySelector('.champion-name').textContent.toLowerCase();
    if (name.includes(q)) {
      card.style.display = 'flex';
      matching.push(card);
    } else {
      card.style.display = 'none';
    }
  });

  matching.forEach(card => grid.appendChild(card));
});
</script>
