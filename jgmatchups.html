<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Damage Ekko – Matchup Hub</title>

<script>
if (localStorage.getItem('lolfundamentals_logged_in') !== 'true') {
  window.location.replace('login.html');
}
</script>

<style>
:root{
  --bg-dark:#07060a;
  --panel:#0f0b14;
  --neon-pink:#ff3df2;
  --neon-purple:#7c3aed;
  --neon-cyan:#00ffd5;
  --text:#e9e6ff;
}

body {
  margin: 0;
  font-family: 'Beaufort for LOL', Arial, Helvetica, sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;

  /* TRUE DAMAGE EKKO VIBE */
  background:
    linear-gradient(135deg, rgba(124,58,237,0.35), rgba(255,61,242,0.18), rgba(0,0,0,0.85)),
    url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_19.jpg')
    no-repeat center top;
  background-size: cover;
  background-attachment: fixed;
}

header {
  background: rgba(7, 6, 10, 0.92);
  border-bottom: 2px solid var(--neon-pink);
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  text-transform: uppercase;
  color: var(--neon-cyan);
  text-align: center;
  letter-spacing: 2px;
  box-shadow: 0 0 25px rgba(255,61,242,0.15);
}

.back-button {
  margin: 20px auto;
  padding: 10px 20px;
  background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
  color: #000;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  box-shadow: 0 0 18px rgba(255,61,242,0.25);
}
.back-button::before { content: "← "; }

#champion-search {
  width: 400px;
  max-width: 90%;
  margin: 20px auto 30px;
  padding: 10px 12px;
  border-radius: 6px;
  border: 2px solid var(--neon-pink);
  background: #0b0810;
  color: var(--text);
  outline: none;
}

.champion-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto 50px;
  padding: 0 20px;
}

.champion-card {
  background: linear-gradient(135deg, #120b18, #0a0710);
  border-radius: 12px;
  border-left: 4px solid var(--neon-pink);
  padding: 15px;
  text-align: center;
  text-decoration: none;
  color: inherit;
  transition: transform .25s, box-shadow .25s;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 0 0 rgba(0,0,0,0);
}

.champion-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 25px rgba(255,61,242,0.18);
  border-left: 4px solid var(--neon-cyan);
}

.champion-card img {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  box-shadow: 0 0 12px rgba(124,58,237,0.35);
}

.champion-name {
  margin-top: 8px;
  font-size: 14px;
  color: var(--neon-cyan);
  font-weight: bold;
  letter-spacing: 0.5px;
}

footer {
  margin-top: auto;
  padding: 25px;
  text-align: center;
  font-size: 14px;
  color: #9aa0b4;
  background: rgba(0,0,0,0.4);
  border-top: 1px solid rgba(255,61,242,0.15);
}
</style>
</head>

<body>

<header>True Damage Ekko Matchups</header>

<a href="membershub.html" class="back-button">Back to Members Hub</a>

<input id="champion-search" placeholder="Search junglers or type 'new'...">

<div class="champion-grid" id="champion-grid">

<a href="jgamumu.html" class="champion-card">
  <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Amumu.png">
  <div class="champion-name">Amumu</div>
</a>

<a href="jgaatrox.html" class="champion-card">
  <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Aatrox.png">
  <div class="champion-name">Aatrox</div>
</a>

<a href="jgekko.html" class="champion-card">
  <img src="https://ddragon.leagueoflegends.com/cdn/14.23.1/img/champion/Ekko.png">
  <div class="champion-name">Ekko</div>
</a>

</div>

<footer>© 2026 LoL Fundamentals · All rights reserved</footer>

</body>
</html>
