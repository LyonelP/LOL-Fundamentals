<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LoL Fundamentals – Members Hub</title>

<style>
:root{
  --gold:#c9aa71;
  --bg:#0a0f14;
  --card:#161b22;
  --muted:#8b949e;
  --accent:#2f81f7;
}

html,body{height:100%;margin:0;}
body{
  font-family:"Beaufort for LOL",Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:#e6edf3;
  line-height:1.6;
  text-align:center;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#0a0f14,#1b2838);
  border-bottom:2px solid var(--gold);
  padding:14px 20px;
  color:var(--gold);
  font-weight:bold;
  font-size:20px;
  text-transform:uppercase;
  position:relative;
}

/* GRID */
.section{
  padding:12px 20px;
  max-width:1000px;
  margin:8px auto;
}

.card-grid{
  display:grid;
  gap:22px;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
}

/* BASE CARD */
.card{
  position:relative;
  height:230px;
  border-radius:12px;
  border:2px solid var(--gold);
  overflow:hidden;
  cursor:pointer;
  transform-style:preserve-3d;
  transition: transform .6s;
}

/* FLIP STATE */
.card.flipped{
  transform: rotateY(180deg);
}

/* FRONT + BACK */
.card-face{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
  backface-visibility:hidden;
}

/* FRONT */
.card-front{
  background:var(--card);
}

/* BACK */
.card-back{
  transform:rotateY(180deg);
  background:var(--card);
}

/* TEXT */
.card h3{
  color:var(--gold);
  margin:0 0 8px;
}

.card p{
  margin:0;
  font-size:0.95rem;
  opacity:0.95;
}

/* SPLASHES */
.ekko-front{
  background-image:url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_0.jpg');
  background-size:cover;
  background-position:center;
}

.ekko-back{
  background-image:url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_1.jpg');
  background-size:cover;
  background-position:center;
}

/* DARK OVERLAY */
.card-face::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

.card-face > *{
  position:relative;
  z-index:1;
}

/* KEEP OTHER CARDS SIMPLE */
.simple{
  background:var(--card);
}

/* BUTTON */
#logoutBtn{
  display:block;
  margin:18px auto;
  padding:12px 26px;
  background:#f94144;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<header>Members Hub</header>

<section class="section">
<div class="card-grid">

  <!-- DIANA -->
  <a href="dianaguide6934.html" class="card simple">
    <div class="card-face card-front">
      <h3>Diana Mid Guide</h3>
      <p>Comprehensive guide for mastering Diana.</p>
    </div>
  </a>

  <!-- DIANA MATCHUPS -->
  <a href="matchuphub.html" class="card simple">
    <div class="card-face card-front">
      <h3>Diana Matchups</h3>
      <p>Breakdowns and VODs for every mid matchup.</p>
    </div>
  </a>

  <!-- EKKO FLIP CARD -->
  <div class="card" id="ekkoCard">

    <!-- FRONT (JUNGLE GUIDE) -->
    <a href="ekkoguide.html" class="card-face card-front ekko-front">
      <h3>Ekko Jungle Guide</h3>
      <p>Pathing, mechanics, combos, fundamentals.</p>
    </a>

    <!-- BACK (MATCHUPS BEHIND) -->
    <a href="jgmatchups.html" class="card-face card-back ekko-back">
      <h3>Ekko Jungle Matchups</h3>
      <p>Click to open matchup hub</p>
    </a>

  </div>

  <!-- FUNDAMENTALS -->
  <a href="skills.html" class="card simple">
    <div class="card-face card-front">
      <h3>Fundamentals</h3>
      <p>Core skills for climbing.</p>
    </div>
  </a>

</div>
</section>

<button id="logoutBtn">Logout</button>

<script>
const ekko = document.getElementById("ekkoCard");

ekko.addEventListener("click", (e) => {
  // prevent link immediate navigation so flip is visible
  if(!ekko.classList.contains("flipped")){
    e.preventDefault();
    ekko.classList.add("flipped");
    setTimeout(() => {
      window.location.href = "jgmatchups.html";
    }, 500);
  }
});
</script>

</body>
</html>
