<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LoL Fundamentals – Members Hub</title>

<style>
:root{
  --gold:#c9aa71;
  --bg:#0a0f14;
  --card:#161b22;
  --muted:#8b949e;
  --accent:#2f81f7;
}

html,body{height:100%;margin:0;}
body{
  font-family:"Beaufort for LOL",Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:#e6edf3;
  text-align:center;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#0a0f14,#1b2838);
  border-bottom:2px solid var(--gold);
  padding:14px 20px;
  color:var(--gold);
  font-weight:bold;
  font-size:20px;
  text-transform:uppercase;
  position:relative;
}

/* GRID */
.section{
  padding:12px 20px;
  max-width:1000px;
  margin:8px auto;
}

.card-grid{
  display:grid;
  gap:22px;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
}

/* NORMAL CARDS */
.card{
  position:relative;
  height:230px;
  border-radius:12px;
  border:2px solid var(--gold);
  background:var(--card);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-decoration:none;
  color:#e6edf3;
  transition:transform .25s, box-shadow .25s;
  z-index:1;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 26px rgba(47,129,247,0.22);
}

.card h3{ color:var(--gold); margin:0 0 8px; }
.card p{ margin:0; font-size:0.95rem; opacity:0.95; }

/* ========================= */
/* EKKO STACKED CARD SYSTEM */
/* ========================= */

.ekko-stack{
  position:relative;
  height:230px;
}

/* base style for both layers */
.ekko-card{
  position:absolute;
  inset:0;
  border-radius:12px;
  border:2px solid var(--gold);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-decoration:none;
  transition:transform .3s ease, z-index .3s;
}

/* FRONT (Guide) */
.ekko-front{
  background:url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_0.jpg');
  background-size:cover;
  background-position:center;
  z-index:2;
}

/* BACK (Matchups hidden behind) */
.ekko-back{
  background:url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_1.jpg');
  background-size:cover;
  background-position:center;
  z-index:1;
  transform:scale(0.97) translateY(10px);
  opacity:0.9;
  cursor:pointer;
}

/* dark overlay */
.ekko-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
}

.ekko-card > *{
  position:relative;
  z-index:2;
}

/* hover lift ONLY visual (no swap) */
.ekko-stack:hover .ekko-back{
  transform:scale(0.99) translateY(6px);
}

/* clicked state */
.ekko-stack.active .ekko-back{
  transform:translateY(-240px);
  z-index:5;
}

/* BUTTON */
#logoutBtn{
  display:block;
  margin:18px auto;
  padding:12px 26px;
  background:#f94144;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

</style>
</head>

<body>

<header>Members Hub</header>

<section class="section">
<div class="card-grid">

  <a href="dianaguide6934.html" class="card">
    <h3>Diana Mid Guide</h3>
    <p>Comprehensive guide for mastering Diana.</p>
  </a>

  <a href="matchuphub.html" class="card">
    <h3>Diana Matchups</h3>
    <p>Breakdowns and VODs for every mid matchup.</p>
  </a>

  <!-- ===================== -->
  <!-- EKKO STACKED CARDS -->
  <!-- ===================== -->
  <div class="ekko-stack" id="ekkoStack">

    <a href="ekkoguide.html" class="ekko-card ekko-front">
      <h3>Ekko Jungle Guide</h3>
      <p>Pathing, mechanics, combos</p>
    </a>

    <a href="jgmatchups.html" class="ekko-card ekko-back" id="ekkoBack">
      <h3>Ekko Jungle Matchups</h3>
      <p>Click to open matchup hub</p>
    </a>

  </div>

  <a href="skills.html" class="card">
    <h3>Fundamentals</h3>
    <p>Core skills for climbing.</p>
  </a>

</div>
</section>

<button id="logoutBtn">Logout</button>

<script>
const stack = document.getElementById("ekkoStack");
const back = document.getElementById("ekkoBack");

back.addEventListener("click", (e) => {
  e.preventDefault();
  stack.classList.add("active");

  setTimeout(() => {
    window.location.href = "jgmatchups.html";
  }, 400);
});
</script>

</body>
</html>
