<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LoL Fundamentals – Members Hub</title>

<style>
  :root{
    --gold:#c9aa71;
    --bg:#0a0f14;
    --card:#161b22;
    --muted:#8b949e;
    --accent:#2f81f7;
  }

  html,body{height:100%;margin:0;}
  body {
    font-family:"Beaufort for LOL",Arial,Helvetica,sans-serif;
    background:var(--bg);
    color:#e6edf3;
    text-align:center;
  }

  header{
    background:linear-gradient(90deg,#0a0f14,#1b2838);
    border-bottom:2px solid var(--gold);
    padding:14px 20px;
    color:var(--gold);
    font-weight:bold;
    text-transform:uppercase;
  }

  .section{
    padding:12px 20px;
    max-width:1000px;
    margin:auto;
  }

  .card-grid{
    display:grid;
    gap:22px;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  }

  .card{
    position:relative;
    background:var(--card);
    border:2px solid var(--gold);
    border-radius:12px;
    padding:20px;
    text-decoration:none;
    color:#e6edf3;
    height:230px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    transition:0.25s;
  }

  .card::before{
    content:"";
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    opacity:0.15;
    z-index:1;
  }

  .card h3,.card p{z-index:2;margin:0;}

  .diana-guide::before{ background-image:url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Diana_11.jpg'); }
  .diana-matchups::before{ background-image:url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Diana_2.jpg'); }

  /* =========================
     EKKO CLICK SWAP SYSTEM
  ========================= */

  .ekko-stack{
    position:relative;
    height:230px;
    cursor:pointer;
  }

  .ekko-card{
    position:absolute;
    inset:0;
    transition:0.35s ease;
  }

  /* FRONT (default guide) */
  .ekko-front{
    z-index:3;
    transform:translate(0,0);
    border:2px solid var(--gold);
  }

  /* BACK (matchups hidden underneath) */
  .ekko-back{
    z-index:2;
    transform:translate(10px,10px);
    border:2px solid var(--accent);
    opacity:0.7;
  }

  .ekko-front::before{
    background-image:url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_0.jpg');
  }

  .ekko-back::before{
    background-image:url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_1.jpg');
  }

  /* ACTIVE STATE (clicked swap) */
  .ekko-stack.swapped .ekko-front{
    transform:translate(10px,10px);
    opacity:0.6;
    z-index:2;
  }

  .ekko-stack.swapped .ekko-back{
    transform:translate(0,0);
    opacity:1;
    z-index:3;
  }

  footer{
    padding:26px;
    color:var(--muted);
  }
</style>
</head>

<body>

<header>Members Hub</header>

<section class="section">
<p>Choose a section to explore:</p>

<div class="card-grid">

  <a href="dianaguide6934.html" class="card diana-guide">
    <h3>Diana Mid Guide</h3>
    <p>Master Diana mechanics and macro.</p>
  </a>

  <a href="matchuphub.html" class="card diana-matchups">
    <h3>Diana Matchups</h3>
    <p>Matchup breakdowns and VODs.</p>
  </a>

  <!-- ========================= -->
  <!-- EKKO CLICK SWAP CARD -->
  <!-- ========================= -->
  <div class="ekko-stack" id="ekkoStack">

    <a href="ekkoguide.html" class="card ekko-card ekko-front">
      <h3>Ekko Jungle Guide</h3>
      <p>Pathing, mechanics, combos.</p>
    </a>

    <a href="jgmatchups.html" class="card ekko-card ekko-back">
      <h3>Ekko Jungle Matchups</h3>
      <p>Matchup tracking + VODs.</p>
    </a>

  </div>

</div>
</section>

<footer>© 2026 LoL Fundamentals</footer>

<script>
const stack = document.getElementById("ekkoStack");

stack.addEventListener("click", () => {
  stack.classList.toggle("swapped");
});
</script>

</body>
</html>
