<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LoL Fundamentals – Members Hub</title>
<style>
body {
  margin: 0;
  font-family: "Beaufort for LOL", Arial, Helvetica, sans-serif;
  background: #0a0f14;
  color: #e6edf3;
  line-height: 1.6;
  text-align: center;
}

/* Header */
header {
  background: linear-gradient(90deg, #0a0f14, #1b2838);
  border-bottom: 2px solid #c9aa71;
  padding: 15px 20px;
  font-weight: bold;
  font-size: 24px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #c9aa71;
  position: relative;
}

/* Section */
.section {
  padding: 40px 20px;
  max-width: 1000px;
  margin: 20px auto;
}

/* Section title */
.section h2 {
  color: #c9aa71;
  margin-top: 0;
  margin-bottom: 30px;
}

/* Card Grid */
.card-grid {
  display: grid;
  gap: 25px;
  justify-items: center;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}

/* Individual Card */
.card {
  background: #161b22;
  border: 2px solid #c9aa71;
  border-radius: 12px;
  padding: 20px 15px;
  min-height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  transition: transform 0.3s, box-shadow 0.3s;
  text-decoration: none;
  color: #e6edf3;
  position: relative;
  overflow: hidden;
}

/* Card hover effect */
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(47,129,247,0.3);
}

/* Card Header */
.card h3 {
  color: #c9aa71;
  margin-bottom: 10px;
  font-size: 1.2em;
  z-index: 2;
  position: relative;
}

/* Card Description */
.card p {
  font-size: 0.9em;
  line-height: 1.3;
  z-index: 2;
  position: relative;
}

/* Card Background Image */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0.15;
  z-index: 1;
  border-radius: 10px;
}

/* Specific card backgrounds */
.card.diana-matchups::before {
  background-image: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Diana_0.jpg');
}
.card.diana-guide::before {
  background-image: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Diana_1.jpg');
}
.card.ekko-guide::before {
  background-image: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_0.jpg');
}
.card.tierlist::before {
  background: linear-gradient(to bottom, #1b2838 0%, #161b22 100%);
}
.card.fundamentals::before {
  background-image: url('https://cdn.wallpapersafari.com/92/79/MYTD9q.png');
  background-size: cover;
  background-position: center;
}
.card.coaching::before {
  background-image: url('https://m.media-amazon.com/images/I/71GlK3kDLJL.jpg');
  background-size: cover;
  background-position: center;
  opacity: 0.2;
}

/* Tierlist card visual */
.card.tierlist .tier-bar {
  margin-top: 10px;
  width: 100%;
  height: 60px;
  border-radius: 6px;
  display: flex;
  overflow: hidden;
  z-index: 2;
  position: relative;
}
.tier-s { background: #f94144; flex: 1; }
.tier-a { background: #f3722c; flex: 1; }
.tier-b { background: #f8961e; flex: 1; }
.tier-c { background: #f9c74f; flex: 1; }
.tier-d { background: #90be6d; flex: 1; }

/* Footer */
footer {
  text-align: center;
  padding: 30px;
  color: #8b949e;
  font-size: 14px;
  background: #0a0f14;
  border-top: 1px solid #1f2937;
}
footer a {
  color: #c9aa71;
  text-decoration: none;
}
footer a:hover {
  text-decoration: underline;
}

/* Logout Button */
#logoutBtn {
  display: block;
  margin: 40px auto;
  padding: 12px 25px;
  background: #f94144;
  color: #fff;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}
#logoutBtn:hover {
  background: #ff5959;
}

/* Desktop grid fix */
@media(min-width: 900px){
  .card-grid {
    grid-template-columns: repeat(3, 1fr);
  }
  .tierlist, .fundamentals, .coaching { justify-self: center; }
}
</style>
</head>
<body>
<header>LoL Fundamentals – Members Hub</header
