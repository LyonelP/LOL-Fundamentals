<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LoL Fundamentals – Members Hub</title>

<style>
:root{
  --gold:#c9aa71;
  --bg:#0a0f14;
  --card:#161b22;
  --muted:#8b949e;
  --accent:#2f81f7;
}

html,body{height:100%;margin:0;}
body {
  font-family:"Beaufort for LOL",Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:#e6edf3;
  line-height:1.6;
  text-align:center;
}

/* ===== HEADER ===== */
header{
  background:linear-gradient(90deg,#0a0f14,#1b2838);
  border-bottom:2px solid var(--gold);
  padding:14px 20px;
  color:var(--gold);
  font-weight:bold;
  font-size:20px;
  letter-spacing:1px;
  text-transform:uppercase;
  position:relative;
}

/* ===== GRID ===== */
.section{
  padding:12px 20px;
  max-width:1000px;
  margin:8px auto;
}

.card-grid{
  display:grid;
  gap:22px;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
}

/* ===== CARD ===== */
.card{
  position:relative;
  background:var(--card);
  border:2px solid var(--gold);
  border-radius:12px;
  padding:20px;
  text-decoration:none;
  color:#e6edf3;
  overflow:hidden;
  height:230px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition: transform .25s, box-shadow .25s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 26px rgba(47,129,247,0.22);
}

.card h3{ color:var(--gold); margin:0 0 8px; z-index:2; }
.card p{ margin:0; z-index:2; opacity:0.95; }

/* backgrounds */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0.15;
  z-index:1;
}

.diana-guide::before{ background-image:url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Diana_11.jpg'); }
.diana-matchups::before{ background-image:url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Diana_2.jpg'); }
.ekko-guide::before{ background-image:url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ekko_0.jpg'); }

/* ===== EKKO TOGGLE BUTTON ===== */
.ekko-toggle-btn{
  margin-top:10px;
  background:#2f81f7;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
  position:relative;
  z-index:3;
}

</style>
</head>

<body>

<header>Members Hub</header>

<section class="section">
<div class="card-grid">

  <a href="dianaguide6934.html" class="card diana-guide">
    <h3>Diana Mid Guide</h3>
    <p>Comprehensive guide for mastering Diana.</p>
  </a>

  <a href="matchuphub.html" class="card diana-matchups">
    <h3>Diana Mid Matchups</h3>
    <p>Detailed breakdowns and VODs.</p>
  </a>

  <!-- ================= EKKO TOGGLE CARD ================= -->
  <a id="ekkoCard" href="ekkoguide.html" class="card ekko-guide">
    <h3 id="ekkoTitle">Ekko Jungle Guide</h3>
    <p id="ekkoText">Pathing, combos, mechanics & jungle fundamentals.</p>

    <button class="ekko-toggle-btn" id="ekkoBtn">Switch to Matchups</button>
  </a>

</div>
</section>

<script>
let mode = "guide";

const card = document.getElementById("ekkoCard");
const title = document.getElementById("ekkoTitle");
const text = document.getElementById("ekkoText");
const btn = document.getElementById("ekkoBtn");

btn.addEventListener("click", (e) => {
  e.preventDefault();
  e.stopPropagation();

  if (mode === "guide") {
    mode = "matchups";

    card.href = "jgmatchups.html";
    title.textContent = "Ekko Jungle Matchups";
    text.textContent = "How Ekko plays into every jungle matchup.";
    btn.textContent = "Switch to Guide";
  } else {
    mode = "guide";

    card.href = "ekkoguide.html";
    title.textContent = "Ekko Jungle Guide";
    text.textContent = "Pathing, combos, mechanics & jungle fundamentals.";
    btn.textContent = "Switch to Matchups";
  }
});
</script>

</body>
</html>
